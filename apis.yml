      - GEO
    properties:
      - type: Documentation
        url: https://docs.dataforseo.com/v3/ai_overview/
      - type: OpenAPI
        url: https://github.com/dataforseo/OpenApiDocumentation

  - name: DataForSEO Social Media API
    description: >-
      Returns social engagement data including Pinterest pins and Facebook
      interaction counts for any given webpage, enabling social signal analysis
      as part of broader SEO research.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://dataforseo.com/apis/social-media-api
    baseURL: https://api.dataforseo.com
    tags:
