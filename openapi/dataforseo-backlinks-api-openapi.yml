    BacklinksBulkNewLostBacklinksLiveRequestInfo:
      type: object
      properties:
        targets:
          type: array
          items:
            type: string
          description: "domains, subdomains or webpages to get new & lost backlinks for\nrequired field\nyou can set up to 1000 domains, subdomains or webpages\nthe domain or subdomain should be specified without https:// and www.\nthe page should be specified with absolute URL (including http:// or https://)\nexample:\n\"targets\": [\n  \"forbes.com\",\n  \"cnn.com\",\n  \"bbc.com\",\n  \"yelp.com\",\n  \"https://www.apple.com/iphone/\",\n  \"https://ahrefs.com/blog/\",\n  \"ibm.com\",\n  \"https://variety.com/\",\n  \"https://stackoverflow.com/\",\n  \"www.trustpilot.com\"\n]"
        date_from:
          type: string
          description: 'starting date of the time range

            optional field

            this field indicates the date which will be used as a threshold for new and lost backlinks;

            the backlinks that appeared in our index after the specified date will be considered as new;

            the backlinks that weren’t found after the specified date, but were present before, will be considered as lost;

            default value: today’s date -(minus) one month;

            e.g. if today is 2021-10-13, default date_from will be 2021-09-13.

            minimum value equals today’s date -(minus) one year;

            e.g. if today is 2021-10-13, minimum date_from will be 2020-10-13.

            date format: "yyyy-mm-dd"

            example:

            "2021-01-01"'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - targets:
        - forbes.com
        - cnn.com
        - bbc.com
        - yelp.com
        - https://www.apple.com/iphone/
        - https://ahrefs.com/blog/
        - ibm.com
        - https://variety.com/
        - https://stackoverflow.com/
        - www.trustpilot.com
        date_from: '2026-01-15'
