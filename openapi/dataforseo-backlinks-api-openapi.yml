        domain_from_ip:
          type: string
          description: IP address of the referring domain
          nullable: true
        domain_from_country:
          type: string
          description: ISO country code of the referring domain
          nullable: true
        page_from_external_links:
          type: integer
          description: number of external links found on the referring page
          nullable: true
        page_from_internal_links:
          type: integer
          description: number of internal links found on the referring page
          nullable: true
        page_from_size:
          type: integer
          description: 'size of the referring page, in bytes

            example:

            63357'
          nullable: true
        page_from_encoding:
          type: string
          description: 'character encoding of the referring page

            example:

            utf-8'
          nullable: true
        page_from_language:
          type: string
          description: 'language of the referring page

            in ISO 639-1 format

            example:

            en'
          nullable: true
        page_from_title:
          type: string
          description: title of the referring page
          nullable: true
        page_from_status_code:
          type: integer
          description: 'HTTP status code returned by the referring page

            example:

            200'
          nullable: true
        first_seen:
          type: string
          description: 'date and time when our crawler found the backlink for the first time

            in the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”

            example:

            2019-11-15 12:57:46 +00:00'
          nullable: true
        prev_seen:
          type: string
          description: 'previous to the most recent date when our crawler visited the backlink

            in the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”

            example:

            2019-11-15 12:57:46 +00:00'
          nullable: true
        last_seen:
          type: string
          description: 'most recent date when our crawler visited the backlink

            in the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”

            example:

            2019-11-15 12:57:46 +00:00'
          nullable: true
        item_type:
          type: string
          description: 'link type

            possible values:

            anchor, image, link, meta, canonical, alternate, redirect'
          nullable: true
        attributes:
          type: array
          items:
            type: string
            nullable: true
          description: 'link attributes of the referring links

            example:

            nofollow'
          nullable: true
        dofollow:
          type: boolean
          description: 'indicates whether the backlink is dofollow

            if false, the backlink is nofollow'
          nullable: true
        original:
          type: boolean
          description: indicates whether the backlink was present on the referring page when our crawler first visited it
          nullable: true
        alt:
          type: string
          description: 'alternative text of the image

            this field will be null if backlink type is not image'
          nullable: true
        anchor:
          type: string
          description: anchor text of the backlink
          nullable: true
        text_pre:
          type: string
          description: text snippet before the anchor text
          nullable: true
        text_post:
          type: string
          description: snippet after the anchor text
          nullable: true
        semantic_location:
          type: string
          description: 'indicates semantic element in HTML where the backlink is found

            you can get the full list of semantic elements here

            examples:

            article, section, summary'
          nullable: true
        links_count:
          type: integer
          description: number of identical backlinks found on the referring page
          format: int64
          nullable: true
        group_count:
          type: integer
          description: 'indicates total number of backlinks from this domain

            for example, if mode is set to one_per_domain, this field will indicate the total number of backlinks coming from this domain'
          format: int64
          nullable: true
        is_broken:
          type: boolean
          description: 'indicates whether the backlink is broken

            if true, the backlink is pointing to a page responding with a 4xx or 5xx status code'
          nullable: true
        url_to_status_code:
          type: integer
          description: 'status code of the referenced page

            if the value is null, our crawler hasn’t yet visited the webpage the link is pointing to

            example:

            200'
          nullable: true
        url_to_spam_score:
          type: integer
          description: 'spam score of the referenced page

            if the value is null, our crawler hasn’t yet visited the webpage the link is pointing to

            learn more about how the metric is calculated on this help center page'
          nullable: true
        url_to_redirect_target:
          type: string
          description: 'target url of the redirect

            target page the redirect is pointing to'
          nullable: true
        is_indirect_link:
          type: boolean
          description: 'indicates whether the backlink is an indirect link

            if true, the backlink is an indirect link pointing to a page that either redirects to url_to, or points to a canonical page'
          nullable: true
        indirect_link_path:
          type: array
          items:
