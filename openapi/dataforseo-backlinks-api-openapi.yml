    BacklinksTimeseriesSummaryLiveRequestInfo:
      type: object
      properties:
        target:
          type: string
          description: 'domain to get data for

            required field

            a domain should be specified without https:// and www.

            example:

            "forbes.com"'
        date_from:
          type: string
          description: 'starting date of the time range

            optional field

            this field indicates the date which will be used as a threshold for summary data;

            minimum value: 2019-01-30

            maximum value shouldn’t exceed the date specified in the date_to

            date format: "yyyy-mm-dd"

            example:

            "2021-01-01"'
          nullable: true
        date_to:
          type: string
          description: 'ending date of the time range

            optional field

            if you don’t specify this field, the today’s date will be used by default

            minimum value shouldn’t preceed the date specified in the date_from

            maximum value: today’s date

            date format: "yyyy-mm-dd"

            example:

            "2021-01-15"'
          nullable: true
        group_range:
          type: string
          description: 'time range which will be used to group the results

            optional field

            default value: month

            possible values: day, week, month, year

            note: for day, we will return items corresponding to all dates between and including date_from and date_to;

            for week/month/year, we will return items corresponding to full weeks/months/years, where each item will indicate the last day of the week/month/year

            for example, if you specify:

            "group_range": "month",

            "date_from": "2022-03-23",

            "date_to": "2022-05-13"

            we will return items falling between 2022-03-01 and 2022-05-31, namely, three items corresponding to the following dates: 2022-03-31, 2022-04-30, 2022-05-31

            if there is no data for a certain  day/week/month/year, we will return 0'
          nullable: true
        include_subdomains:
          type: boolean
          description: 'indicates if the subdomains of the target will be included in the search

            optional field

            if set to false, the subdomains will be ignored

            default value: true'
          nullable: true
        rank_scale:
          type: string
          description: 'defines the scale used for calculating and displaying the rank, domain_from_rank, and page_from_rank values

            optional field

            you can use this parameter to choose whether rank values are presented on a 0–100 or 0–1000 scale

            possible values:

            one_hundred — rank values are displayed on a 0–100 scale

            one_thousand — rank values are displayed on a 0–1000 scale

            default value: one_thousand

            learn more about how this parameter works and how ranking metrics are calculated in this Help Center article'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - target: dataforseo.com
        date_from: '2026-01-15'
        date_to: '2026-03-15'
        group_range: month
    BacklinksAnchorsLiveRequestInfo:
      type: object
      properties:
        target:
          type: string
          description: 'domain, subdomain or webpage to get anchors for

            required field

            a domain or a subdomain should be specified without https:// and www.

            a page should be specified with absolute URL (including http:// or https://)'
        limit:
          type: integer
          description: 'the maximum number of returned anchors

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        offset:
          type: integer
          description: 'offset in the results array of returned anchors

            optional field

            default value: 0

            if you specify the 10 value, the first ten anchors in the results array will be omitted and the data will be provided for the successive anchors'
          nullable: true
        internal_list_limit:
          type: integer
          description: 'maximum number of elements within internal arrays

            optional field

            you can use this field to limit the number of elements within the following arrays:

            referring_links_tld

            referring_links_types

            referring_links_attributes

            referring_links_platform_types

            referring_links_semantic_locations

            default value: 10

            maximum value: 1000'
          nullable: true
        backlinks_status_type:
          type: string
          description: 'set what backlinks to return and count

            optional field

            you can use this field to choose what backlinks will be returned and used for aggregated metrics for your target;

            possible values:

            all – all backlinks will be returned and counted;

            live – backlinks found during the last check will be returned and counted;

            lost – lost backlinks will be returned and counted;

            default value: live'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, =, <>, in, not_in, like, not_like, ilike, not_ilike, match, not_match

            you can use the % operator with like and not_like to match any string of zero or more characters

            example:

            ["referring_links_types.anchors",">","1"]

            [["broken_pages",">","2"],

            "and",

            ["backlinks",">","10"]]

            [["first_seen",">","2017-10-23 11:31:45 +00:00"],

            "and",

            [["anchor","like","%seo%"],"or",["referring_domains",">","10"]]]

            The full list of possible filters is available here.'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            you should use a comma to set up a sorting type

            example:

            ["backlinks,desc"]

            note that you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["backlinks,desc","rank,asc"]'
          nullable: true
        backlinks_filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'filter the backlinks of your target

            optional field

            you can use this field to filter the initial backlinks that will be included in the dataset for aggregated metrics for your target

            you can filter the backlinks by all fields available in the response of this endpoint

            using this parameter, you can include only dofollow backlinks in the response and create a flexible backlinks dataset to calculate the metrics for

            example:

            "backlinks_filters": [["dofollow", "=", true]]'
          nullable: true
        include_subdomains:
          type: boolean
          description: 'indicates if the subdomains of the target will be included in the search

            optional field

            if set to false, the subdomains will be ignored

            default value: true'
          nullable: true
        include_indirect_links:
          type: boolean
          description: 'indicates if indirect links to the target will be included in the results

            optional field

            if set to true, the results will include data on indirect links pointing to a page that either redirects to the target, or points to a canonical page

            if set to false, indirect links will be ignored

            default value: true'
          nullable: true
        exclude_internal_backlinks:
          type: boolean
          description: 'indicates whether the backlinks from subdomains of the target are excluded

            optional field

            if set to false, the backlinks from subdomains of the target will be ommited and you won’t receive the same domain in the response;

            default value: true'
          nullable: true
        rank_scale:
          type: string
          description: 'defines the scale used for calculating and displaying the rank, domain_from_rank, and page_from_rank values

            optional field

            you can use this parameter to choose whether rank values are presented on a 0–100 or 0–1000 scale

            possible values:

            one_hundred — rank values are displayed on a 0–100 scale

            one_thousand — rank values are displayed on a 0–1000 scale

            default value: one_thousand

            learn more about how this parameter works and how ranking metrics are calculated in this Help Center article'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - target: forbes.com
        limit: 4
        order_by:
        - backlinks,desc
        filters:
        - anchor
        - like
        - '%news%'
    BacklinksBulkReferringDomainsLiveItem:
