    OnPageKeywordDensityRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: 'ID of the task

            required field

            you can get this ID in the response of the Task POST endpoint

            example:

            “07131248-1535-0216-1000-17384017ad04”'
        keyword_length:
          type: integer
          description: 'number of words for a keyword

            required field

            possible values:

            1, 2, 3, 4, 5'
        url:
          type: string
          description: 'page URL

            optional field

            if you do not specify a page here, the results will be provided for the whole website

            if you use this field, the API response will contain only keywords from the specified page

            a page should be specified with absolute URL (including http:// or https://)'
          nullable: true
        limit:
          type: integer
          description: 'the maximum number of returned keywords

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, =, <>, in, not_in, like, not_like

            you can use the % operator with like and not_like to match any string of zero or more characters

            example:

            ["keyword","=","%seo%"]

            [["keyword","=","%seo%"],

            "and",

            ["frequency","<","6"]]

            [["keyword","not_like","%seo%"],

            "and",

            [["frequency",">","6"],"or",["density",">","0.02"]]]

            The full list of possible filters is available by this link.'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            you should use a comma to set up a sorting type

            example:

            ["frequency,desc"]

            note that you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["keyword,asc","frequency,desc"]'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - id: 09101923-1535-0216-0000-2389a8854b70
        url: https://dataforseo.com/
        keyword_length: 2
        filters:
        - frequency
        - '>'
        - 5
