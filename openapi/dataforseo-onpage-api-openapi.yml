    OnPageLighthouseLiveJsonRequestInfo:
      type: object
      properties:
        url:
          type: string
          description: 'target URL

            required field

            target page should be specified with its absolute URL (including http:// or https://)

            example:

            https://dataforseo.com/'
        for_mobile:
          type: boolean
          description: 'applies mobile emulation

            optional field

            if set to true, Lighthouse will use mobile device and screen emulation to test the page against mobile environment

            if set to false, the results will be provided for desktop

            default value: false'
          nullable: true
        categories:
          type: array
          items:
            type: string
          description: 'categories of Lighthouse audits

            optional field

            each category is a collection of audits and audit groups that applies weighting and scoring to the section (see official definition)

            if you ignore this field, we will return data for all categories unless you specify audits

            use this field to get data for specific categories you indicate here

            possible values:

            seo, performance, best_practices, accessibility'
          nullable: true
        audits:
          type: array
          items:
            type: string
          description: "Lighthouse audits\noptional field\naudits are individual tests Lighthouse runs for each specific feature/optimization/metric to produce a numeric score (see official definition);  \nif you ignore this field, we will return data for all audits;\nuse this field to get data for specific audits you indicate here;\nNote: that some audits do not belong to a specific category and are stand-alone page quality measurements;\nin general, there can be several use cases:\n1. if you ignore categories, you can use this field to get data for the specified audits only\nfor example, if you ignore \"categories\" and specify \"audits\": [\"metrics/cumulative-layout-shift\",\"metrics/largest-contentful-paint\",\"metrics/total-blocking-time\"], you will get data only for these audits\n2. if you specify a category, you can use this field to additionally receive audits that do not belong to the category(-ies) you specified\nfor example, if you specify \"categories\": [\"seo\"] and \"audits\": [\"metrics/cumulative-layout-shift\",\"metrics/largest-contentful-paint\",\"metrics/total-blocking-time\"], you will get only these audits under “performance” and all audits under “seo”\nyou can get the full list of possible audits here"
          nullable: true
        version:
          type: string
          description: 'lighthouse version

            optional field

            you can obtain the results specific to a certain Lighthouse version by specifying its number

            the list of available versions is available through the Lighthouse Versions endpoint'
          nullable: true
        language_name:
          type: string
          description: 'lighthouse language name

            optional field

            you can receive the list of available languages of the search engine with their language_name by making a separate request to https://api.dataforseo.com/v3/on_page/lighthouse/languages

            default value:

            English'
          nullable: true
        language_code:
          type: string
          description: 'lighthouse language code

            optional field

            you can receive the list of available languages of the search engine with their language_code by making a separate request to https://api.dataforseo.com/v3/on_page/lighthouse/languages

            default value:

            en'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - url: https://dataforseo.com
        for_mobile: true
        tag: some_string_123
