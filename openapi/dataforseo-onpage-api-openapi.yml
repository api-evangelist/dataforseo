            optional field

            default value: 0

            if you specify the 10 value, the first ten links in the results array will be omitted and the data will be provided for the successive links'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, =, <>, in, not_in, like, not_like

            you can use the % operator with like and not_like to match any string of zero or more characters

            example:

            ["direction","=","external"]

            [["domain_to","<>","example.com"],

            "and",

            ["link_from","not_like","%example.com/blog%"]]

            [["direction","=","external"],

