    OnPagePagesRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: 'ID of the task

            required field

            you can get this ID in the response of the Task POST endpoint

            example:

            “07131248-1535-0216-1000-17384017ad04”'
        limit:
          type: integer
          description: 'the maximum number of returned pages

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        offset:
          type: integer
          description: 'offset in the results array of returned pages

            optional field

            default value: 0

            if you specify the 10 value, the first ten pages in the results array will be omitted and the data will be provided for the successive pages'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, <, <=, >, >=, =, <>, in, not_in, like, not_like

            you can use the % operator with like and not_like to match any string of zero or more characters

            example:

            ["meta.external_links_count","<=",50]["url","like","https://dataforseo.com/apis/dataforseo-labs-api"][["checks.high_waiting_time","=",false],

            "and",["resource_type","=","html"]][["page_timing.duration_time","<",100],"and",[["checks.large_page_size","=",false],"or",["checks.high_waiting_time","=",false]]]The full list of possible filters is available by this link.'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            you should use a comma to set up a sorting type

            example:

            ["meta.external_links_count,desc"]

            note that you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["page_timing.dom_complete,asc","size,desc"]'
          nullable: true
        search_after_token:
          type: string
          description: 'token for subsequent requests

            optional field

            provided in the identical filed of the response to each request;

            use this parameter to avoid timeouts while trying to obtain over 20,000 results in a single request;

            by specifying the unique search_after_token value from the response array, you will get the subsequent results of the initial task;

            search_after_token values are unique for each subsequent task ;

            Note: if the search_after_token is specified in the request, all other parameters should be identical to the previous request'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - id: 07281559-0695-0216-0000-c269be8b7592
        filters:
        - - resource_type
          - '='
          - html
        - and
        - - meta.scripts_count
          - '>'
          - 40
        order_by:
        - meta.content.plain_text_word_count,desc
        limit: 10
