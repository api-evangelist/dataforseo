    OnPageLighthouseLiveJsonRequestInfo:
      type: object
      properties:
        url:
          type: string
          description: "target URL\nrequired field\ntarget page should be specified with its absolute URL (including http://
            or https://)\nexample:\nhttps://dataforseo.com/"
        for_mobile:
          type: boolean
          description: "applies mobile emulation\noptional field\nif set to true, Lighthouse will use mobile device and screen
            emulation to test the page against mobile environment\nif set to false, the results will be provided for desktop\n\
            default value: false"
          nullable: true
        categories:
          type: array
          items:
            type: string
          description: "categories of Lighthouse audits\noptional field\neach category is a collection of audits and audit
            groups that applies weighting and scoring to the section (see official definition)\nif you ignore this field,
            we will return data for all categories unless you specify audits\nuse this field to get data for specific categories
            you indicate here\npossible values:\nseo, performance, best_practices, accessibility"
          nullable: true
        audits:
          type: array
          items:
            type: string
          description: "Lighthouse audits\noptional field\naudits are individual tests Lighthouse runs for each specific feature/optimization/metric
            to produce a numeric score (see official definition);  \nif you ignore this field, we will return data for all
            audits;\nuse this field to get data for specific audits you indicate here;\nNote: that some audits do not belong
            to a specific category and are stand-alone page quality measurements;\nin general, there can be several use cases:\n\
            1. if you ignore categories, you can use this field to get data for the specified audits only\nfor example, if
            you ignore \"categories\" and specify \"audits\": [\"metrics/cumulative-layout-shift\",\"metrics/largest-contentful-paint\"\
            ,\"metrics/total-blocking-time\"], you will get data only for these audits\n2. if you specify a category, you
            can use this field to additionally receive audits that do not belong to the category(-ies) you specified\nfor
            example, if you specify \"categories\": [\"seo\"] and \"audits\": [\"metrics/cumulative-layout-shift\",\"metrics/largest-contentful-paint\"\
            ,\"metrics/total-blocking-time\"], you will get only these audits under “performance” and all audits under “seo”\n\
            you can get the full list of possible audits here"
          nullable: true
        version:
          type: string
          description: "lighthouse version\noptional field\nyou can obtain the results specific to a certain Lighthouse version
            by specifying its number\nthe list of available versions is available through the Lighthouse Versions endpoint"
          nullable: true
        language_name:
          type: string
          description: "lighthouse language name\noptional field\nyou can receive the list of available languages of the search
            engine with their language_name by making a separate request to https://api.dataforseo.com/v3/on_page/lighthouse/languages\n\
            default value:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "lighthouse language code\noptional field\nyou can receive the list of available languages of the search
            engine with their language_code by making a separate request to https://api.dataforseo.com/v3/on_page/lighthouse/languages\n\
            default value:\nen"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - url: https://dataforseo.com
        for_mobile: true
        tag: some_string_123
    OnPageContentParsingRequestInfo:
      type: object
      properties:
        url:
          type: string
          description: "URL of the content to parse\nrequired field\nURL of the page to parse\nexample:\nhttps://dataforseo.com/blog/a-versatile-alternative-to-google-trends-exploring-the-power-of-dataforseo-trends-api"
        id:
          type: string
          description: "ID of the task\nrequired field\nyou can get this ID in the response of the Task POST endpoint\nnote:
            the enable_content_parsing parameter in the POST request must be set to true\nexample:\n\"07131248-1535-0216-1000-17384017ad04\""
        markdown_view:
          type: boolean
          description: "return page content as markdown\noptional field\nif set to true, the markdown-formatted content of
            the page will be returned in the page_as_markdown field of the response;\ndefault value: false"
          nullable: true
      example:
      - url: 
          https://dataforseo.com/blog/a-versatile-alternative-to-google-trends-exploring-the-power-of-dataforseo-trends-api
        id: 11161551-1535-0216-0000-500b3f307f92
    OnPageMicrodataRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: "ID of the task\nrequired field\nyou can get this ID in the response of the Task POST endpoint\nexample:\n\
            \"07131248-1535-0216-1000-17384017ad04\""
        url:
          type: string
          description: "resource URL\nrequired field\nyou can get this URL in the response of the Pages endpoint\nexample:\n\
            https://dataforseo.com/apis"
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - id: 02241700-1535-0216-0000-034137259bc1
        url: https://dataforseo.com/apis
    OnPageContentParsingLiveRequestInfo:
      type: object
      properties:
        url:
          type: string
          description: "URL of the content to parse\nrequired field\nURL of the page to parse\nexample:\nhttps://www.fujielectric.com/"
        custom_user_agent:
          type: string
          description: "custom user agent\noptional field\ncustom user agent for crawling a website\nexample: Mozilla/5.0
            (Macintosh; Intel Mac OS X 10_15_5) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36\n\
            \ndefault value: Mozilla/5.0 (compatible; RSiteAuditor)"
          nullable: true
        browser_preset:
          type: string
          description: "preset for browser screen parameters\noptional field\nif you use this field, you don’t need to indicate
            browser_screen_width, browser_screen_height, browser_screen_scale_factor\npossible values:\ndesktop, mobile, tablet\n\
            desktop preset will apply the following values:\nbrowser_screen_width: 1920\nbrowser_screen_height: 1080\nbrowser_screen_scale_factor:
            1\nmobile preset will apply the following values:\nbrowser_screen_width: 390\nbrowser_screen_height: 844\nbrowser_screen_scale_factor:
            3\ntablet preset will apply the following values:\nbrowser_screen_width: 1024\nbrowser_screen_height: 1366\nbrowser_screen_scale_factor:
            2\nNote: to use this parameter, set enable_javascript or enable_browser_rendering to true"
          nullable: true
        browser_screen_width:
          type: integer
          description: "browser screen width\noptional field\nyou can set a custom browser screen width to perform audit for
            a particular device;\nif you use this field, you don’t need to indicate browser_preset as it will be ignored;\n\
            Note: to use this parameter, set enable_javascript or enable_browser_rendering to true\nminimum value, in pixels:
            240\nmaximum value, in pixels: 9999"
          format: int64
          nullable: true
        browser_screen_height:
          type: integer
          description: "browser screen height\noptional field\nyou can set a custom browser screen height to perform audit
            for a particular device;\nif you use this field, you don’t need to indicate browser_preset as it will be ignored;\n\
            Note: to use this parameter, set enable_javascript or enable_browser_rendering to true\nminimum value, in pixels:
            240\nmaximum value, in pixels: 9999"
          nullable: true
        browser_screen_scale_factor:
          type: number
          description: "browser screen scale factor\noptional field\nyou can set a custom browser screen resolution ratio
            to perform audit for a particular device;\nif you use this field, you don’t need to indicate browser_preset as
            it will be ignored;\nNote: to use this parameter, set enable_javascript or enable_browser_rendering to true\n\
            minimum value: 0.5\nmaximum value: 3"
          nullable: true
        store_raw_html:
          type: boolean
          description: "store HTML of a crawled page\noptional field\nset to true if you want to get the HTML of the page
            using the OnPage Raw HTML endpoint\ndefault value: false"
          nullable: true
        disable_cookie_popup:
          type: boolean
          description: "disable the cookie popup \noptional field\nset to true if you want to disable the popup requesting
            cookie consent from the user;\ndefault value:\nfalse"
          nullable: true
        accept_language:
          type: string
          description: "language header for accessing the website\noptional field\nall locale formats are supported (xx, xx-XX,
            xxx-XX, etc.)\nNote: if you do not specify this parameter, some websites may deny access; in this case, pages
            will be returned with the \"type\":\"broken in the response array"
          nullable: true
        enable_javascript:
          type: boolean
          description: "load javascript on a page\noptional field\nset to true if you want to load the scripts available on
            a page\ndefault value: false\nNote: if you use this parameter, additional charges will apply; learn more about
            the cost of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        enable_browser_rendering:
          type: boolean
          description: "emulate browser rendering to measure Core Web Vitals\noptional field\nby using this parameter you
            will be able to emulate a browser when loading a web page;\nenable_browser_rendering loads styles, images, fonts,
            animations, videos, and other resources on a page;\ndefault value: false\nset to true to obtain Core Web Vitals
            (FID, CLS, LCP) metrics in the response;\nif you use this field, enable_javascript, and load_resources parameters
            must be set to true\nNote: if you use this parameter, additional charges will apply; learn more about the cost
            of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        enable_xhr:
          type: boolean
          description: "enable XMLHttpRequest on a page\noptional field\nset to true if you want our crawler to request data
            from a web server using the XMLHttpRequest object\ndefault value:\nfalse\nif you use this field, enable_javascript
            must be set to true;"
          nullable: true
        switch_pool:
          type: boolean
          description: "switch proxy pool\noptional field\nif true, additional proxy pools will be used to obtain the requested
            data;\nthe parameter can be used if a multitude of tasks is set simultaneously, resulting in occasional rate-limit
            and/or site_unreachable errors"
          nullable: true
        ip_pool_for_scan:
          type: string
          description: "proxy pool\noptional field\nyou can choose a location of the proxy pool that will be used to obtain
            the requested data;\nthe parameter can be used if page content is inaccessible in one of the locations, resulting
            in occasional site_unreachable errors\npossible values: us, de"
          nullable: true
        markdown_view:
          type: boolean
          description: "return page content as markdown\noptional field\nif set to true, the markdown-formatted content of
            the page will be returned in the page_as_markdown field of the response;\ndefault value: false"
          nullable: true
      example:
