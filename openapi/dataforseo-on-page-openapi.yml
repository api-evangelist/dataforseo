          nullable: true
        limit:
          type: integer
          description: "the maximum number of returned keywords\noptional field\ndefault value: 100\nmaximum value: 1000"
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: "array of results filtering parameters\noptional field\nyou can add several filters at once (8 filters
            maximum)\nyou should set a logical operator and, or between the conditions\nthe following operators are supported:\n\
            regex, not_regex, =, <>, in, not_in, like, not_like\nyou can use the % operator with like and not_like to match
            any string of zero or more characters\nexample:\n[\"keyword\",\"=\",\"%seo%\"]\n[[\"keyword\",\"=\",\"%seo%\"\
            ],\n\"and\",\n[\"frequency\",\"<\",\"6\"]]\n[[\"keyword\",\"not_like\",\"%seo%\"],\n\"and\",\n[[\"frequency\"\
            ,\">\",\"6\"],\"or\",[\"density\",\">\",\"0.02\"]]]\nThe full list of possible filters is available by this link."
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: "results sorting rules\noptional field\nyou can use the same values as in the filters array to sort
            the results\npossible sorting types:\nasc – results will be sorted in the ascending order\ndesc – results will
            be sorted in the descending order\nyou should use a comma to set up a sorting type\nexample:\n[\"frequency,desc\"\
            ]\nnote that you can set no more than three sorting rules in a single request\nyou should use a comma to separate
            several sorting rules\nexample:\n[\"keyword,asc\",\"frequency,desc\"]"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - id: 09101923-1535-0216-0000-2389a8854b70
        url: https://dataforseo.com/
        keyword_length: 2
        filters:
        - frequency
        - '>'
        - 5
