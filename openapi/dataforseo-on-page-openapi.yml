          type: integer
          description: "position in the document\nthe total number of characters between the resource and the top of HTML"
          nullable: true
    OnPageErrorsRequestInfo:
      type: object
      properties:
        limit:
          type: integer
          description: "the maximum number of returned tasks that responded with an error\noptional field\ndefault value:
            1000\nmaximum value: 1000"
          nullable: true
        offset:
          type: integer
          description: "offset in the results array of returned tasks\noptional field\ndefault value: 0\nif you specify the
            10 value, the first ten tasks in the results array will be omitted and the data will be provided for the successive
            tasks"
          nullable: true
        filtered_function:
          type: string
          description: "return tasks with a certain function\nuse this field to obtain a list of tasks that returned an error
            filtered by a certain function\nyou can filter the results by the values you receive in the function fields of
            the API response\ni.e., once you receive unfiltered results, you can call this API again to filter them by function\n\
            example: on_page/task_post, postback_url, pingback_url"
          nullable: true
        datetime_from:
          type: string
          description: "start time for filtering results\noptional field\nallows filtering results by the datetime parameter
            within the range of the last 7 days;\nmust be specified in the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”\nexample:\n\
            2021-11-15 12:57:46 +00:00"
          nullable: true
        datetime_to:
          type: string
          description: "finish time for filtering results\noptional field\nallows filtering results by the datetime parameter
            within the range of the last 7 days;\nmust be specified in the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”\nexample:\n\
            2021-11-15 13:57:46 +00:00"
          nullable: true
      example:
      - limit: 10
        offset: 0
        filtered_function: pingback_url
    OnPageLinksRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: "ID of the task\nrequired field\nyou can get this ID in the response of the Task POST endpoint\nexample:\n\
            “07131248-1535-0216-1000-17384017ad04”"
        page_from:
          type: string
          description: "relative page URL\noptional field\nif you use this field, the API response will contain only links
            from the specified page\nnote that in this field you can specify relative URLs only"
          nullable: true
        page_to:
          type: string
          description: "relative page URL\noptional field\nif you use this field, the API response will contain only internal
            links pointing to the specified page\nnote that in this field you can specify relative URLs only"
          nullable: true
        limit:
          type: integer
          description: "the maximum number of returned links\noptional field\ndefault value: 100\nmaximum value: 1000"
          nullable: true
        offset:
          type: integer
          description: "offset in the results array of returned links\noptional field\ndefault value: 0\nif you specify the
            10 value, the first ten links in the results array will be omitted and the data will be provided for the successive
            links"
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: "array of results filtering parameters\noptional field\nyou can add several filters at once (8 filters
            maximum)\nyou should set a logical operator and, or between the conditions\nthe following operators are supported:\n\
            regex, not_regex, =, <>, in, not_in, like, not_like\nyou can use the % operator with like and not_like to match
            any string of zero or more characters\nexample:\n[\"direction\",\"=\",\"external\"]\n[[\"domain_to\",\"<>\",\"\
            example.com\"],\n\"and\",\n[\"link_from\",\"not_like\",\"%example.com/blog%\"]]\n[[\"direction\",\"=\",\"external\"\
            ],\n\"and\",\n[[\"link_from\",\"like\",\"%example.com/blog%\"],\"or\",[\"link_from\",\"like\",\"%example.com/help%\"\
            ]]]\nThe full list of possible filters is available by this link."
          nullable: true
        search_after_token:
          type: string
          description: "token for subsequent requests\noptional field\nprovided in the identical filed of the response to
            each request;\nuse this parameter to avoid timeouts while trying to obtain over 20,000 results in a single request;\n\
            by specifying the unique search_after_token value from the response array, you will get the subsequent results
            of the initial task;\nsearch_after_token values are unique for each subsequent task ;\nNote: if the search_after_token
            is specified in the request, all other parameters should be identical to the previous request"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - id: 07281559-0695-0216-0000-c269be8b7592
        page_from: /apis/google-trends-api
        filters:
        - - dofollow
          - =
          - true
        - and
        - - direction
          - =
          - external
        limit: 10
