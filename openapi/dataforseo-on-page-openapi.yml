          type: integer
          description: "crawled pages limit\nrequired field\nthe number of pages to crawl on the specified domain\nNote:\n\
            if you set max_crawl_pages to 1 and do not specify start_url or set a homepage in it, the following sitewide checks
            will be disabled:\ntest_canonicalization, enable_www_redirect_check, test_hidden_server_signature, test_page_not_found,
            test_directory_browsing, test_https_redirect\nto enable them anyway, set force_sitewide_checks to trueif you set
            max_crawl_pages to 1 and specify start_url other than a homepage, all sitewide checks will be disabled;\nto enable
            them anyway, set force_sitewide_checks to true"
        start_url:
          type: string
          description: "the first url to crawl \noptional field\nNote: you should specify an absolute URL\nif you want to
            crawl a single page, specify its URL in this field and additionally set the max_crawl_pages parameter to 1\nyou
            can also use the live Instant Pages endpoint to get page-specific data"
          nullable: true
        force_sitewide_checks:
          type: boolean
          description: "enable sitewide checks when crawling a single page\noptional field\nset to true to get data on sitewide
            checks when crawling a single page;\ndefault value: false"
          nullable: true
        priority_urls:
          type: array
          items:
            type: string
          description: "urls to be crawled bypassing the queue\noptional field\nURLs specified in this array will be crawled
            in the first instance, bypassing the crawling queue;\nNote: you should specify the absolute URL;\nyou can specify
            up to 20 URLs;\nall URLs in the array must belong to the target domain;\nsubdomains will be ignored unless the
            allow_subdomains parameter is set to trueexample:\n\"priority_urls\": [\n\"https://dataforseo.com/apis/serp-api\"\
            ,\n\"https://dataforseo.com/contact\"\n]"
          nullable: true
        max_crawl_depth:
          type: integer
          description: "crawl depth\noptional field\nthe linking depth of the pages to crawl;\nfor example, starting page
            of the crawl is level 0, pages that have links from that page are level 1, etc."
          nullable: true
        crawl_delay:
          type: integer
          description: "delay between hits, ms\noptional field\nthe custom delay between crawler hits to the server\ndefault
            value: 2000"
          nullable: true
        store_raw_html:
          type: boolean
          description: "store HTML of crawled pages\noptional field\nset to true if you want to get the HTML of the page using
            the OnPage Raw HTML endpoint\ndefault value: false"
          nullable: true
        enable_content_parsing:
          type: boolean
          description: "parse content on crawled pages\noptional field\nset to true to use the OnPage Content Parsing endpoint\n\
            default value: false"
          nullable: true
        support_cookies:
          type: boolean
          description: "support cookies on crawled pages\noptional field\nset to true to support cookies when crawling the
            pages\ndefault value: false"
          nullable: true
        accept_language:
          type: string
          description: "language header for accessing the website\noptional field\nall locale formats are supported (xx, xx-XX,
            xxx-XX, etc.)\nNote: if you do not specify this parameter, some websites may deny access; in this case, pages
            will be returned with the \"type\":\"broken in the response array"
          nullable: true
        custom_robots_txt:
          type: string
          description: "custom robots.txt settings\noptional field\nexample: Disallow: /directory1/"
          nullable: true
        robots_txt_merge_mode:
          type: string
          description: "merge with or override robots.txt settings\noptional field\npossible values: merge, override;\nset
            to override if you want to ignore website crawling restrictions and other robots.txt settings\ndefault value:
            merge;\nNote: if set to override, specify the custom_robots_txt parameter"
          nullable: true
        custom_user_agent:
          type: string
          description: "custom user agent\noptional field\ncustom user agent for crawling a website\nexample: Mozilla/5.0
            (Macintosh; Intel Mac OS X 10_15_5) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36\n\
            \ndefault value: Mozilla/5.0 (compatible; RSiteAuditor)"
          nullable: true
        browser_preset:
          type: string
          description: "preset for browser screen parameters\noptional field\nif you use this field, you don’t need to indicate
            browser_screen_width, browser_screen_height, browser_screen_scale_factorpossible values:\ndesktop, mobile, tabletdesktop
            preset will apply the following values:browser_screen_width: 1920\nbrowser_screen_height: 1080\nbrowser_screen_scale_factor:
            1mobile preset will apply the following values:browser_screen_width: 390\nbrowser_screen_height: 844\nbrowser_screen_scale_factor:
            3tablet preset will apply the following values:browser_screen_width: 1024\nbrowser_screen_height: 1366\nbrowser_screen_scale_factor:
            2\nNote: to use this parameter, set enable_javascript or enable_browser_rendering to true"
          nullable: true
        browser_screen_width:
          type: integer
          description: "browser screen width\noptional field\nyou can set a custom browser screen width to perform audit for
            a particular device;\nif you use this field, you don’t need to indicate browser_preset as it will be ignored;\n\
            Note: to use this parameter, set enable_javascript or enable_browser_rendering to trueminimum value, in pixels:
            240\nmaximum value, in pixels: 9999"
          format: int64
          nullable: true
        browser_screen_height:
          type: integer
          description: "browser screen height\noptional field\nyou can set a custom browser screen height to perform an audit
            for a particular device;\nif you use this field, you don’t need to indicate browser_preset as it will be ignored;\n\
            Note: to use this parameter, set enable_javascript or enable_browser_rendering to trueminimum value, in pixels:
            240\nmaximum value, in pixels: 9999"
          nullable: true
        browser_screen_scale_factor:
          type: number
          description: "browser screen scale factor\noptional field\nyou can set a custom browser screen resolution ratio
            to perform audit for a particular device;\nif you use this field, you don’t need to indicate browser_preset as
            it will be ignored;\nNote: to use this parameter, set enable_javascript or enable_browser_rendering to trueminimum
            value: 0.5\nmaximum value: 3"
          nullable: true
        respect_sitemap:
          type: boolean
          description: "respect sitemap when crawling\noptional field\nset to true if you want to follow the order of pages
            indicated in the primary sitemap when crawling;\ndefault value: false\nNote: if set to true, the click_depth value
            in the API response will equal 0;\nthe max_crawl_depth field of the request will be ignored, you can specify the
            number of pages to crawl using the max_crawl_pages parameter"
          nullable: true
        custom_sitemap:
          type: string
          description: "custom sitemap url\noptional field\nthe URL of the page where the alternative sitemap is located\n\
            Note: if you want to use this parameter, respect_sitemap should be true"
          nullable: true
        crawl_sitemap_only:
          type: boolean
          description: "crawl only pages indicated in the sitemap\noptional field\nset to true if you want to crawl only the
            pages indicated in the sitemap\nif you set this parameter to true and do not specify custom_sitemap, we will crawl
            the default sitemap\ndefault value: false\nNote: if you want to use this parameter, respect_sitemap should be
            true"
          nullable: true
        load_resources:
          type: boolean
          description: "load resources\noptional field\nset to true if you want to load image, stylesheets, scripts, and broken
            resources\ndefault value: false\nNote: if you use this parameter, additional charges will apply; learn more about
            the cost of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        enable_www_redirect_check:
          type: boolean
          description: "check if the domain implemented the www redirection\noptional field\nset to true if you want to check
            if the requested domain implemented the www to non-www or non-www to www redirect;\ndefault value: false"
          nullable: true
        enable_javascript:
          type: boolean
          description: "load javascript on a page\noptional field\nset to true if you want to load the scripts available on
            a page\ndefault value: false\nNote: if you use this parameter, additional charges will apply; learn more about
            the cost of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        enable_xhr:
          type: boolean
          description: "enable XMLHttpRequest on a page\noptional field\nset to true if you want our crawler to request data
            from a web server using the XMLHttpRequest object\ndefault value: false;if you use this field, enable_javascript
            must be set to true;"
          nullable: true
        enable_browser_rendering:
          type: boolean
          description: "emulate browser rendering to measure Core Web Vitals\noptional field\nby using this parameter you
            will be able to emulate a browser when loading a web page;\nenable_browser_rendering loads styles, images, fonts,
            animations, videos, and other resources on a page;\ndefault value: false\nset to true to obtain Core Web Vitals
            (FID, CLS, LCP) metrics in the response;\nif you use this field, enable_javascript, and load_resources parameters
            must be set to true\nNote: if you use this parameter, additional charges will apply; learn more about the cost
            of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        disable_cookie_popup:
          type: boolean
          description: "disable the cookie popup\noptional field\nset to true if you want to disable the popup requesting
            cookie consent from the user;\ndefault value:\nfalse"
          nullable: true
        custom_js:
          type: string
          description: "custom javascript\noptional field\nNote that the execution time for the script you enter here should
            be 700 ms maximum, for example, you can use the following JS snippet to check if the website contains Google Tag
            Manager as a scr attribute:\nlet meta = { haveGoogleAnalytics: false, haveTagManager: false };\\r\\nfor (var i
            = 0; i < document.scripts.length; i++) {\\r\\n let src = document.scripts[i].getAttribute(\\\"src\\\");\\r\\n
            if (src != undefined) {\\r\\n if (src.indexOf(\\\"analytics.js\\\") >= 0)\\r\\n      meta.haveGoogleAnalytics
            = true;\\r\\n\\tif (src.indexOf(\\\"gtm.js\\\") >= 0)\\r\\n      meta.haveTagManager = true;\\r\\n  }\\r\\n}\\
            r\\nmeta;the returned value depends on what you specified in this field. For instance, if you specify the following
            script:\nmeta = {}; meta.url = document.URL; meta.test = 'test'; meta;\nas a response you will receive the following
            data:\n\"custom_js_response\": {\n\"url\": \"https://dataforseo.com/\",\n\"test\": \"test\"\n}\nNote: the length
            of the script you enter must be no more than 2000 characters\nNote: if you use this parameter, additional charges
            will apply; learn more about the cost of tasks with this parameter in our help article; the cost can be calculated
            on the Pricing Page"
          nullable: true
        validate_micromarkup:
          type: boolean
          description: "enable microdata validation\noptional field\nset to true if you want to use the OnPage API Microdata
            endpoint\ndefault value: false"
          nullable: true
        allow_subdomains:
          type: boolean
          description: "include pages on subdomains\noptional field\nset to true if you want to crawl all subdomains of a
            target website\ndefault value: false"
          nullable: true
        allowed_subdomains:
          type: array
          items:
            type: string
          description: "subdomains to crawl\noptional field\nspecify subdomains that you want to crawl\nexample: [\"blog.site.com\"\
            , \"my.site.com\", \"shop.site.com\"]\nNote: to use this parameter, the allow_subdomains parameter should be set
            to false;\notherwise, the content of allowed_subdomains field will be ignored and the results will be returned
            for all subdomains"
          nullable: true
        disallowed_subdomains:
          type: array
          items:
            type: string
          description: "subdomains not to crawl\noptional field\nspecify subdomains that you don’t want to crawl\nexample:
            [\"status.site.com\", \"docs.site.com\"]\nNote: to use this parameter, the allow_subdomains parameter should be
            set to true"
          nullable: true
        check_spell:
          type: boolean
          description: "check spelling\noptional field\nset to true to check spelling on a website using Hunspell library\n\
            default value: false"
          nullable: true
        check_spell_language:
          type: string
          description: "language of the spell check\noptional field\nsupported languages: ‘hy’, ‘eu’, ‘bg’, ‘ca’, ‘hr’, ‘cs’,
            ‘da’, ‘nl’, ‘en’, ‘eo’, ‘et’, ‘fo’, ‘fa’, ‘fr’, ‘fy’, ‘gl’, ‘ka’, ‘de’, ‘el’, ‘he’, ‘hu’, ‘is’, ‘ia’, ‘ga’, ‘it’,
            ‘rw’, ‘la’, ‘lv’, ‘lt’, ‘mk’, ‘mn’, ‘ne’, ‘nb’, ‘nn’, ‘pl’, ‘pt’, ‘ro’, ‘gd’, ‘sr’, ‘sk’, ‘sl’, ‘es’, ‘sv’, ‘tr’,
            ‘tk’, ‘uk’, ‘vi’\nNote: if no language is specified, it will be set automatically based on page content"
          nullable: true
        check_spell_exceptions:
          type: array
          items:
            type: string
          description: "words excluded from spell check\noptional field\nspecify the words that you want to exclude from spell
            check\nmaximum word length: 100 characters\nmaximum amount of words: 1000\nexample: \"SERP\", \"minifiers\", \"\
            JavaScript\""
          nullable: true
        calculate_keyword_density:
          type: boolean
          description: "calculate keyword density for the target domain\noptional field\nset to true if you want to calculate
            keyword density for website pages\ndefault value: false\nNote: if you use this parameter, additional charges will
            apply; learn more about the cost of tasks with this parameter in our help article\nonce the crawl is completed,
            you can obtain keyword density values with the Keyword Density endpoint"
          nullable: true
        checks_threshold:
          type: object
          additionalProperties:
            type: integer
            format: int64
            nullable: true
          description: "custom threshold values for checks\noptional field\nyou can specify custom threshold values for the
            parameters included in the checks object of OnPage API responses;\nNote: only integer threshold values can be
            modified;\nfor example, the high_loading_time and large_page_size parameters are set to 3 seconds and 1 megabyte
            respectively by default;\nif you want to change these thresholds to 1 second and 1000 kbytes, use the following
            snippet:\n\"checks_threshold\": {\n\"high_loading_time\": 1,\n\"large_page_size\": 1000\n}available customizable
            parameters with default values:\n\"title_too_short\", default value: 30, type: \"int\"\n\"title_too_long\", default
            value: 65, type: \"int\"\n\"small_page_size\", default value: 1024, type: \"int\"\n\"large_page_size\", default
            value: 1048576 (1024 * 1024), type: \"int\"\n\"low_character_count\", default value: 1024, type: \"int\"\n\"high_character_count\"\
            , default value: 256000 (250 * 1024), type: \"int\"\n\"low_content_rate\", default value: 0.1, type: \"float\"\
            \n\"high_content_rate\", default value: 0.9, type: \"float\"\n\"high_loading_time\", default value: 3000, type:
            \"int\"\n\"high_waiting_time\", default value: 1500, type: \"int\"\n\"low_readability_rate\", default value: 15.0,
            type: \"float\"\n\"irrelevant_description\", default value: 0.2, type: \"float\"\n\"irrelevant_title\", default
            value: 0.3, type: \"float\"\n\"irrelevant_meta_keywords\", default value: 0.6, type: \"float\""
          nullable: true
        disable_sitewide_checks:
          type: array
          items:
            type: string
          description: "prevent certain sitewide checks from running\noptional field\nspecify the following checks to prevent
            them from running on the target website:\n\"test_page_not_found\"\n\"test_canonicalization\"\n\"test_https_redirect\"\
            \n\"test_directory_browsing\"example:\n\"disable_sitewide_checks\": [\"test_directory_browsing\", \"test_page_not_found\"\
            ]learn more on our help center"
          nullable: true
        disable_page_checks:
          type: array
          items:
            type: string
          description: "prevent certain page checks from running\noptional field\nspecify certain checks to prevent them from
            running and impacting the onpage_scoreexample:\n\"disable_page_checks\": [\"is_5xx_code\", \"is_4xx_code\"]"
          nullable: true
        switch_pool:
          type: boolean
          description: "switch proxy pool\noptional field\nif true, additional proxy pools will be used to obtain the requested
            data;\nthe parameter can be used if a multitude of tasks is set simultaneously, resulting in occasional rate-limit
            and/or site_unreachable errors"
          nullable: true
        return_despite_timeout:
          type: boolean
          description: "return data on pages despite the timeout error\noptional field\nif true, the data will be provided
            on pages that failed to load within 120 seconds and responded with a timeout error;\ndefault value: false"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified\nyou can use the ‘$id’ string as a $id variable and ‘$tag’ as
            urlencoded $tag variable. We will set the necessary values before sending the request.\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23\nlearn more on our Help Center"
          nullable: true
      example:
      - target: dataforseo.com
        max_crawl_pages: 10
        load_resources: true
        enable_javascript: true
        custom_js: 'meta = {}; meta.url = document.URL; meta;'
        tag: some_string_123
        pingback_url: https://your-server.com/pingscript?id=$id&tag=$tag
    OnPageResourcesResponseInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseInfo'
      - type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/OnPageResourcesTaskInfo'
              nullable: true
            description: array of tasks
            nullable: true
    OnPageResourcesTaskInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseTaskInfo'
      - type: object
        properties:
          result:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/OnPageResourcesResultInfo'
              nullable: true
            description: array of results
            nullable: true
    OnPageResourcesResultInfo:
      type: object
      properties:
        crawl_progress:
          type: string
          description: "status of the crawling session\npossible values: in_progress, finished"
          nullable: true
        crawl_status:
          type: object
          oneOf:
          - $ref: '#/components/schemas/CrawlStatusInfo'
          description: details of the crawling session
          nullable: true
        search_after_token:
          type: string
          nullable: true
        current_offset:
          type: integer
          nullable: true
        total_items_count:
          type: integer
          description: total number of relevant items crawled
          format: int64
          nullable: true
        items_count:
          type: integer
          description: number of items in the results array
          format: int64
          nullable: true
        items:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/BaseOnPageResourceItem'
            nullable: true
          description: items array
          nullable: true
    OnPageMicrodataResponseInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseInfo'
      - type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/OnPageMicrodataTaskInfo'
              nullable: true
            description: array of tasks
            nullable: true
    OnPageMicrodataTaskInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseTaskInfo'
      - type: object
        properties:
          result:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/OnPageMicrodataResultInfo'
              nullable: true
            description: array of results
            nullable: true
    OnPageMicrodataResultInfo:
      type: object
      properties:
        crawl_progress:
          type: string
          description: "status of the crawling session\npossible values: in_progress, finished"
          nullable: true
        crawl_status:
          type: object
          oneOf:
          - $ref: '#/components/schemas/CrawlStatusInfo'
          description: details of the crawling session
          nullable: true
        test_summary:
          type: object
          oneOf:
          - $ref: '#/components/schemas/TestSummary'
          description: microdata validation test results
          nullable: true
        items_count:
          type: integer
          description: number of items in the results array
          format: int64
          nullable: true
        items:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/OnPageMicrodataInfoItem'
            nullable: true
          description: items array
          nullable: true
    OnPageMicrodataInfoItem:
      type: object
      properties:
        type:
          type: string
          description: type of element
          nullable: true
        inspection_info:
          type: object
          oneOf:
          - $ref: '#/components/schemas/MicrodataInspectionInfo'
          description: information related to microdata validation
          nullable: true
    MicrodataInspectionInfo:
      type: object
      properties:
        types:
          type: array
          items:
            type: string
            nullable: true
          description: "parent microdata types\nfor a full list of available types, please visit schema.org"
          nullable: true
        fields:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/MicrodataFieldsInfo'
            nullable: true
          description: "microdata fields\nan array of objects containing data fields related to the certain microdata type"
          nullable: true
    MicrodataFieldsInfo:
      type: object
      properties:
        name:
          type: string
          description: "field name\nname of the data field"
          nullable: true
        types:
          type: array
          items:
            type: string
            nullable: true
          description: list of microdata types
          nullable: true
        value:
          type: string
          description: "microdata value\nmicrodata value specified on a target web page"
          nullable: true
        test_results:
          type: object
          oneOf:
          - $ref: '#/components/schemas/MessageInfo'
          description: "microdata validation test results\nsub-type microdata test results that contain detected errors and
            related messages"
          nullable: true
        fields:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/MicrodataFieldsInfo'
            nullable: true
          description: "microdata fields\nan array of objects containing data fields related to the certain microdata type"
          nullable: true
    MessageInfo:
      type: object
      properties:
        level:
          type: string
          description: "level of error\ncan take the following values: fatal, error, warning, info"
          nullable: true
        message:
          type: string
          description: "message associated with an error\nmessage providing the details of the detected error"
          nullable: true
    TestSummary:
      type: object
      properties:
        fatal:
          type: integer
          description: number of fatal microdata errors
          nullable: true
        error:
          type: integer
          description: number of serious microdata errors
          nullable: true
        warning:
          type: integer
          description: number of microdata warnings
          nullable: true
        info:
          type: integer
          description: number of microdata information flags
          nullable: true
    OnPageForceStopRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: "ID of the task\nrequired field\nyou can get this ID in the response of the Task POST endpoint\nexample:\n\
            “07131248-1535-0216-1000-17384017ad04”\nnote: you can set up to 1000 id values as separate objects in the POST
            array"
      example:
      - id: 08121600-1535-0216-0000-37b4c7a34453
      - id: 08121600-1535-0216-0000-d6a5000b6897
    OnPageRawHtmlRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: "ID of the task\nrequired field\nyou can get this ID in the response of the Task POST endpoint\nexample:\n\
            “07131248-1535-0216-1000-17384017ad04”"
        url:
          type: string
          description: "page url\nrequired field\nthe absolute URL of a page to request HTML\nNote: this field is optional
            if the task was set using the Instant Pages endpoint"
      example:
      - id: 07281559-0695-0216-0000-c269be8b7592
        url: https://dataforseo.com/apis
    OnPageLighthouseTaskPostRequestInfo:
      type: object
      properties:
        url:
          type: string
          description: target URLrequired fieldtarget page should be specified with its absolute URL (including http:// 
            or https://)example:https://dataforseo.com/
        for_mobile:
          type: boolean
          description: 'applies mobile emulationoptional fieldif set to true, Lighthouse will use mobile device and screen
            emulation to test the page against mobile environmentif set to false, the results will be provided for desktopdefault
            value: false'
          nullable: true
        categories:
          type: array
          items:
            type: string
          description: 'categories of Lighthouse auditsoptional fieldeach category is a collection of audits and audit groups
            that applies weighting and scoring to the section (see official definition)if you ignore this field, we will return
            data for all categories unless you specify auditsuse this field to get data for specific categories you indicate
            herepossible values:seo, performance, best_practices, accessibility'
          nullable: true
        audits:
          type: array
          items:
            type: string
          description: 'Lighthouse auditsoptional fieldaudits are individual tests Lighthouse runs for each specific feature/optimization/metric
            to produce a numeric score (see official definition)if you ignore this field, we will return data for all auditsuse
            this field to get data for specific audits you indicate herenote that some audits do not belong to a specific
            category and are stand-alone page quality measurementsin general, there can be several use cases:1. if you ignore
            categories, you can use this field to get data for the specified audits onlyfor example, if you ignore "categories"
            and specify "audits": ["metrics/cumulative-layout-shift","metrics/largest-contentful-paint","metrics/total-blocking-time"],
            you will get data only for these audits2. if you specify a category, you can use this field to additionally receive
            audits that do not belong to the category(-ies) you specifiedfor example, if you specify "categories": ["seo"]
            and "audits": ["metrics/cumulative-layout-shift","metrics/largest-contentful-paint","metrics/total-blocking-time"],
            you will get only these audits under "performance" and all audits under "seo"you can get the full list of possible
            audits here'
          nullable: true
        version:
          type: string
          description: lighthouse versionoptional fieldyou can obtain the results specific to a certain Lighthouse 
            version by specifying its numberthe list of available versions is available through the Lighthouse Versions 
            endpoint
          nullable: true
        language_name:
          type: string
          description: lighthouse language nameoptional fieldyou can receive the list of available languages of the 
            search engine with their language_name by making a separate request to 
            https://api.dataforseo.com/v3/on_page/lighthouse/languagesdefault value:English
          nullable: true
        language_code:
          type: string
          description: lighthouse language codeoptional fieldyou can receive the list of available languages of the 
            search engine with their language_code by making a separate request to 
            https://api.dataforseo.com/v3/on_page/lighthouse/languagesdefault value:en
          nullable: true
        tag:
          type: string
          description: user-defined task identifieroptional fieldthe character limit is 255you can use this parameter to
            identify the task and match it with the resultyou will find the specified tag value in the data object of 
            the response
          nullable: true
        pingback_url:
          type: string
          description: 'notification URL of a completed taskoptional fieldwhen a task is completed we will notify you by GET
            request sent to the URL you have specifiedyou can use the ‘$id’ string as a $id variable and ‘$tag’ as urlencoded
            $tag variable. We will set the necessary values before sending the request.example:http://your-server.com/pingscript?id=$idhttp://your-server.com/pingscript?id=$id&tag=$tagNote:
            special characters in pingback_url will be urlencoded;i.a., the # character will be encoded into %23learn more
            on our Help Center'
          nullable: true
      example:
      - url: https://dataforseo.com
        for_mobile: true
        tag: some_string_123
        pingback_url: https://your-server.com/pingscript?id=$id&tag=$tag
    OnPageInstantPagesRequestInfo:
      type: object
      properties:
        url:
          type: string
          description: "target page url\nrequired field\nabsolute URL of the target page;\nNote #1: results will be returned
            for the specified URL only;\nNote #2: to prevent denial-of-service events, tasks that contain a duplicate crawl
            host will be returned with a 40501 error;\nto prevent this error from occurring, avoid setting tasks with the
            same domain if at least one of your previous tasks with this domain (including a page URL on the domain) is still
            in a crawling queue"
        custom_user_agent:
          type: string
          description: "custom user agent\noptional field\ncustom user agent for crawling a website\nexample: Mozilla/5.0
            (Macintosh; Intel Mac OS X 10_15_5) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36\n\
            \ndefault value: Mozilla/5.0 (compatible; RSiteAuditor)"
          nullable: true
        browser_preset:
          type: string
          description: "preset for browser screen parameters\noptional field\nif you use this field, you don’t need to indicate
            browser_screen_width, browser_screen_height, browser_screen_scale_factorpossible values:\ndesktop, mobile, tabletdesktop
            preset will apply the following values:\nbrowser_screen_width: 1920\nbrowser_screen_height: 1080\nbrowser_screen_scale_factor:
            1\nmobile preset will apply the following values:\nbrowser_screen_width: 390\nbrowser_screen_height: 844\nbrowser_screen_scale_factor:
            3\ntablet preset will apply the following values:\nbrowser_screen_width: 1024\nbrowser_screen_height: 1366\nbrowser_screen_scale_factor:
            2\nNote: to use this parameter, set enable_javascript or enable_browser_rendering to true"
          nullable: true
        browser_screen_width:
          type: integer
          description: "browser screen width\noptional field\nyou can set a custom browser screen width to perform audit for
            a particular device;\nif you use this field, you don’t need to indicate browser_preset as it will be ignored;Note:
            to use this parameter, set enable_javascript or enable_browser_rendering to trueminimum value, in pixels: 240\n\
            maximum value, in pixels: 9999"
          format: int64
          nullable: true
        browser_screen_height:
          type: integer
          description: "browser screen height\noptional field\nyou can set a custom browser screen height to perform audit
            for a particular device;\nif you use this field, you don’t need to indicate browser_preset as it will be ignored;Note:
            to use this parameter, set enable_javascript or enable_browser_rendering to trueminimum value, in pixels: 240\n\
            maximum value, in pixels: 9999"
          nullable: true
        browser_screen_scale_factor:
          type: number
          description: "browser screen scale factor\noptional field\nyou can set a custom browser screen resolution ratio
            to perform audit for a particular device;\nif you use this field, you don’t need to indicate browser_preset as
            it will be ignored;Note: to use this parameter, set enable_javascript or enable_browser_rendering to trueminimum
            value: 0.5\nmaximum value: 3"
          nullable: true
        store_raw_html:
          type: boolean
          description: "store HTML of a crawled page\noptional field\nset to true if you want get the HTML of the page using
            the OnPage Raw HTML endpoint\ndefault value: false"
          nullable: true
        accept_language:
          type: string
          description: "language header for accessing the website\noptional field\nall locale formats are supported (xx, xx-XX,
            xxx-XX, etc.)\nNote: if you do not specify this parameter, some websites may deny access; in this case, pages
            will be returned with the \"type\":\"broken in the response array"
          nullable: true
        load_resources:
          type: boolean
          description: "load resources\noptional field\nset to true if you want to load image, stylesheets, scripts, and broken
            resources\ndefault value: false\nNote: if you use this parameter, additional charges will apply; learn more about
            the cost of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        enable_javascript:
          type: boolean
          description: "load javascript on a page\noptional field\nset to true if you want to load the scripts available on
            a page\ndefault value: false\nNote: if you use this parameter, additional charges will apply; learn more about
            the cost of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        enable_browser_rendering:
          type: boolean
          description: "emulate browser rendering to measure Core Web Vitals\noptional field\nby using this parameter you
            will be able to emulate a browser when loading a web page;\nenable_browser_rendering loads styles, images, fonts,
            animations, videos, and other resources on a page;\ndefault value: false\nset to true to obtain Core Web Vitals
            (FID, CLS, LCP) metrics in the response;\nif you use this field, parameters enable_javascript, and load_resources
            are enabled automatically;\nNote: if you use this parameter, additional charges will apply; learn more about the
            cost of tasks with this parameter in our help article; the cost can be calculated on the Pricing Page"
          nullable: true
        disable_cookie_popup:
          type: boolean
          description: "disable the cookie popup \noptional field\nset to true if you want to disable the popup requesting
            cookie consent from the user;\ndefault value:\nfalse"
          nullable: true
        return_despite_timeout:
          type: boolean
          description: "return data on pages despite the timeout error\noptional field\nif true, the data will be provided
            on pages that failed to load within 120 seconds and responded with a timeout error;\ndefault value: false"
          nullable: true
        enable_xhr:
          type: boolean
          description: "enable XMLHttpRequest on a page\noptional field\nset to true if you want our crawler to request data
            from a web server using the XMLHttpRequest object\ndefault value:\nfalseif you use this field, enable_javascript
            must be set to true;"
          nullable: true
        custom_js:
          type: string
          description: "custom javascript\noptional fieldNote that the execution time for the script you enter here should
            be 700 ms maximum;\nfor example, you can use the following JS snippet to check if the website contains Google
            Tag Manager as a scr attribute:\nlet meta = { haveGoogleAnalytics: false, haveTagManager: false };\\r\\nfor (var
            i = 0; i < document.scripts.length; i++) {\\r\\n let src = document.scripts[i].getAttribute(\\\"src\\\");\\r\\
            n if (src != undefined) {\\r\\n if (src.indexOf(\\\"analytics.js\\\") >= 0)\\r\\n      meta.haveGoogleAnalytics
            = true;\\r\\n\\tif (src.indexOf(\\\"gtm.js\\\") >= 0)\\r\\n      meta.haveTagManager = true;\\r\\n  }\\r\\n}\\
            r\\nmeta;the returned value depends on what you specified in this field. For instance, if you specify the following
            script:\nmeta = {}; meta.url = document.URL; meta.test = 'test'; meta;\nas a response you will receive the following
            data:\n\"custom_js_response\": {\n\"url\": \"https://dataforseo.com/\",\n\"test\": \"test\"\n}\nNote: if you use
            this parameter, additional charges will apply; learn more about the cost of tasks with this parameter in our help
            article; the cost can be calculated on the Pricing Page"
          nullable: true
        validate_micromarkup:
          type: boolean
          description: "enable microdata validation\noptional field\nif set to true, you can use the OnPage API Microdata
            endpoint with the id of the task;\ndefault value: false"
          nullable: true
        check_spell:
          type: boolean
          description: "check spelling\noptional field\nset to true to check spelling on a website using Hunspell library\n\
            default value: false"
          nullable: true
        checks_threshold:
          type: object
          additionalProperties:
            type: integer
            format: int64
            nullable: true
          description: "custom threshold values for checks\noptional field\nyou can specify custom threshold values for the
            parameters included in the checks array of OnPage API responses;\nNote: only integer threshold values can be modified;"
          nullable: true
        switch_pool:
          type: boolean
          description: "switch proxy pool\noptional field\nif true, additional proxy pools will be used to obtain the requested
            data;\nthe parameter can be used if a multitude of tasks is set simultaneously, resulting in occasional rate-limit
            and/or site_unreachable errors"
          nullable: true
        ip_pool_for_scan:
          type: string
          description: "proxy pool\noptional field\nyou can choose a location of the proxy pool that will be used to obtain
            the requested data;\nthe parameter can be used if page content is inaccessible in one of the locations, resulting
            in occasional site_unreachable errors\npossible values: us, de"
          nullable: true
      example:
      - url: https://dataforseo.com/blog
        enable_javascript: true
        custom_js: 'meta = {}; meta.url = document.URL; meta;'
    OnPageDuplicateTagsRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: "ID of the task\nrequired field\nyou can get this ID in the response of the Task POST endpoint\nexample:\n\
            “07131248-1535-0216-1000-17384017ad04”"
        type:
          type: string
          description: type of element
        accumulator:
          type: string
          description: "tag value\noptional field\nspecify a title or description here if you want to receive a list of duplicate
            pages that contains this tag"
          nullable: true
        limit:
          type: integer
          description: "the maximum number of returned pages\noptional field\ndefault value: 100\nmaximum value: 1000"
          nullable: true
        offset:
          type: integer
          description: "offset in the results array of returned pages\noptional field\ndefault value: 0\nif you specify the
            10 value, the first ten pages in the results array will be omitted and the data will be provided for the successive
            pages"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - id: 07281559-0695-0216-0000-c269be8b7592
        type: duplicate_description
        limit: 10
