openapi: 3.0.1
info:
  title: DataForSEO Merchant API
  description: DataForSEO API is the starting point on your journey towards building powerful SEO software. With 
    DataForSEO you can get all the data you need to build an efficient application while also saving your time and 
    budget. DataForSEO API is using the REST technology for interchanging data between your application and our service.
    The data exchange is made through the widely used HTTP protocol, which allows applying our API to almost all 
    programming languages.
  version: 1.0.0
servers:
- url: https://api.dataforseo.com
- url: https://sandbox.dataforseo.com
paths:
  /v3/merchant/id_list:
    post:
      tags:
      - Merchant
      description: "This endpoint is designed to provide you with a list of IDs and metadata for all Merchant tasks created
        within the specified time period, including both successful and uncompleted tasks.\nfor more info please visit 'https://docs.dataforseo.com/v3/merchant/id_list/?bash'"
      operationId: MerchantIdList
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantIdListRequestInfo'
                nullable: true
              example:
              - datetime_from: '2026-04-12 04:39:39 +00:00'
                datetime_to: '2026-04-14 04:39:39 +00:00'
                limit: 100
                offset: 0
                sort: desc
                include_metadata: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantIdListResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/merchant/errors:
    post:
      tags:
      - Merchant
      description: "By calling this endpoint you will receive information about the Merchant API tasks that returned an error
        within the past 7 days.\nfor more info please visit 'https://docs.dataforseo.com/v3/merchant/errors/?bash'"
      operationId: MerchantErrors
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantErrorsRequestInfo'
                nullable: true
              example:
              - limit: 10
                offset: 0
                filtered_function: pingback_url
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantErrorsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/merchant/google/languages:
    get:
      tags:
      - Merchant
      description: "You will receive the list of supported Google Shopping languages by calling this API.\nfor more info please
        visit 'https://docs.dataforseo.com/v3/merchant/google/languages/?bash'"
      operationId: MerchantGoogleLanguages
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantGoogleLanguagesResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/merchant/google/locations:
    get:
      tags:
      - Merchant
      description: for more info please visit 'https://docs.dataforseo.com/v3/merchant/google/locations/?bash'
      operationId: MerchantGoogleLocations
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantGoogleLocationsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  '/v3/merchant/google/locations/{country}':
    get:
      tags:
      - Merchant
      description: for more info please visit 'https://docs.dataforseo.com/v3/merchant/google/locations/?bash'
      operationId: MerchantGoogleLocationsCountry
      parameters:
      - name: country
        in: path
        description: "country ISO code\noptional field\nspecify the ISO code if you want to filter the list of locations by
          country\nexample:\nus"
        required: true
        schema:
          type: string
        example: us
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantGoogleLocationsCountryResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/merchant/google/products/task_post:
    post:
      tags:
      - Merchant
      description: "Google Shopping Products endpoint will provide you with the list of products found on Google Shopping
        for the specified query. The results include product title, description in Google Shopping SERP, product rank, price,
        reviews and rating as well as the related domain.\nfor more info please visit 'https://docs.dataforseo.com/v3/merchant/google/products/task_post/?bash'"
      operationId: GoogleProductsTaskPost
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantGoogleProductsTaskPostRequestInfo'
                nullable: true
              example:
              - language_code: en
                location_code: 2840
                keyword: iphone
                price_min: 5
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantGoogleProductsTaskPostResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/merchant/google/products/tasks_ready:
    get:
      tags:
      - Merchant
      description: "The ‘Tasks Ready’ endpoint is designed to provide you with the list of completed tasks, which haven’t
        been collected yet. If you use the Standard method without specifying the postback_url, you can receive the list of
        id for all completed tasks using this endpoint. Then, you can collect the results using the ‘Task GET’ endpoint.\n\
        for more info please visit 'https://docs.dataforseo.com/v3/merchant/google/products/tasks_ready/?bash'"
      operationId: GoogleProductsTasksReady
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
