                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantAmazonSellersTaskPostRequestInfo'
                nullable: true
              example:
              - language_code: en_US
                location_code: 2840
                asin: B085RFFC9Q
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantAmazonSellersTaskPostResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/merchant/amazon/sellers/tasks_ready:
    get:
      tags:
      - Merchant
      description: "The ‘Tasks Ready’ endpoint is designed to provide you with the list of completed tasks, which haven’t
        been collected yet. If you use the Standard method without specifying the postback_url, you can receive the list of
        id for all completed tasks using this endpoint. Then, you can collect the results using the ‘Task GET’ endpoint.\n\
        for more info please visit 'https://docs.dataforseo.com/v3/merchant/amazon/sellers/tasks_ready/?bash'"
      operationId: AmazonSellersTasksReady
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantAmazonSellersTasksReadyResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  '/v3/merchant/amazon/sellers/task_get/advanced/{id}':
    get:
      tags:
      - Merchant
      description: "This endpoint provides a list of sellers of the specified product on Amazon. The data provided for each
        seller includes related product condition, pricing, shipment, and rating details.\nfor more info please visit 'https://docs.dataforseo.com/v3/merchant/amazon/sellers/task_get/advanced/?bash'"
      operationId: AmazonSellersTaskGetAdvanced
      parameters:
      - name: id
        in: path
        description: "task identifier\nunique task identifier in our system in the UUID format\nyou will be able to use it
          within 30 days to request the results of the task at any time"
        required: true
        schema:
          type: string
        example: 00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantAmazonSellersTaskGetAdvancedResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  '/v3/merchant/amazon/sellers/task_get/html/{id}':
    get:
      tags:
      - Merchant
      description: "Description of the fields for sending a request:\nfor more info please visit 'https://docs.dataforseo.com/v3/merchant/amazon/sellers/task_get/html/?bash'"
      operationId: AmazonSellersTaskGetHtml
      parameters:
      - name: id
        in: path
        description: "task identifier\nunique task identifier in our system in the UUID format\nyou will be able to use it
          within 7 days to request the results of the task at any time"
        required: true
        schema:
          type: string
        example: 00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/MerchantAmazonSellersTaskGetHtmlResponseInfo'
                nullable: true
      security:
      - basicAuth: []
