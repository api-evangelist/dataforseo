    MerchantAmazonProductsTaskPostRequestInfo:
      type: object
      properties:
        keyword:
          type: string
          description: "keyword\nrequired field\nyou can specify up to 700 characters in this field\nall %## will be decoded
            (plus character ‘+’ will be decoded to a space character)\nif you need to use the “%” character for your keyword,
            please specify it as “%25”;\nlearn more about rules and limitations of keyword and keywords fields in DataForSEO
            APIs in this Help Center article"
        url:
          type: string
          description: "direct URL of the search query\noptional field\nyou can specify a direct URL and we will sort it out
            to the necessary fields. Note that this method is the most difficult for our API to process and also requires
            you to specify the exact language and location in the URL. In most cases, we wouldn’t recommend using this method.\n\
            example:\nhttps://www.amazon.com/s/?field-keywords=shoes&language=en_US"
          nullable: true
        priority:
          type: integer
          description: "task priority\noptional field\ncan take the following values:\n1 – normal execution priority (set
            by default)\n2 – high execution priority\nYou will be additionally charged for the tasks with high execution priority.\n\
            The cost can be calculated on the Pricing page."
          nullable: true
        location_name:
          type: string
          description: "full name of search engine location\nrequired field if you don’t specify location_code or location_coordinate\n\
            if you use this field, you don’t need to specify location_code or location_coordinate\nyou can receive the list
            of available locations with their location_name parameters by making a separate request to the https://api.dataforseo.com/v3/merchant/amazon/locations\n\
            example:\nHA1,England,United Kingdom"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\nrequired field if you don’t specify location_name or location_coordinate\n\
            if you use this field, you don’t need to specify location_name or location_coordinate\nyou can receive the list
            of available locations with their location_code parameters by making a separate request to the\nhttps://api.dataforseo.com/v3/merchant/amazon/locations\n\
            example:\n9045969"
          nullable: true
        location_coordinate:
          type: string
          description: "GPS coordinates of a location\nrequired field if you don’t specify location_name or location_code\n\
            if you use this field, you don’t need to specify location_name or location_code\nlocation_coordinate parameter
            should be specified in the “latitude,longitude,radius” format\nthe maximum number of decimal digits for “latitude”
            and “longitude”: 7\nthe minimum value for “radius”: 199.9\nexample:\n53.476225,-2.243572,200"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\nrequired field if you don’t specify language_code\nif you use
            this field, you don’t need to specify language_code\nyou can receive the list of available languages with their
            language_name parameters by making a separate request to the\nhttps://api.dataforseo.com/v3/merchant/amazon/languages\n\
            example:\nEnglish (United Kingdom)"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\nrequired field if you don’t specify language_name\nif you use this field,
            you don’t need to specify language_name\nyou can receive the list of available languages with their language_code parameters
            by making a separate request to the https://api.dataforseo.com/v3/merchant/amazon/languages\nexample:\nen_GB"
          nullable: true
        se_domain:
          type: string
          description: "search engine domain\noptional field\nwe choose the relevant search engine domain automatically according
            to the location and language you specify\nhowever, you can set a custom search engine domain in this field\nexample:\n\
            amazon.com, amazon.co.uk, amazon.fr, etc."
          nullable: true
        depth:
          type: integer
          description: "parsing depth\noptional field\nnumber of results to be retrieved from the Amazon results page\ndefault
            value: 100\nmax value: 700\nYour account will be billed per each SERP containing up to 100 results;\nSetting depth
            above 100 may result in additional charges if the search engine returns more than 100 results;\nThe cost can be
            calculated on the Pricing page."
          nullable: true
        max_crawl_pages:
          type: integer
          description: "page crawl limit\noptional field\nnumber of search results pages to crawl\nmax value: 7\nNote: the
            max_crawl_pages and depth parameters complement each other;\nlearn more at our help center"
          nullable: true
        department:
          type: string
          description: "amazon product department\noptional field\nspecify one of the following amazon departments for extracting
            product listings:\n\"Arts & Crafts\", \"Automotive\", \"Baby\", \"Beauty & Personal Care\", \"Books\", \"Computers\"\
            , \"Digital Music\", \"Electronics\", \"Kindle Store\", \"Prime Video\", \"Women's Fashion\", \"Men's Fashion\"\
            , \"Girls' Fashion\", \"Boys' Fashion\", \"Deals\", \"Health & Household\", \"Home & Kitchen\", \"Industrial &
            Scientific\", \"Luggage\", \"Movies & TV\", \"Music, CDs & Vinyl\", \"Pet Supplies\", \"Software\", \"Sports &
            Outdoors\", \"Tools & Home Improvement\", \"Toys & Games\", \"Video Games\""
          nullable: true
        search_param:
          type: string
          description: "additional parameters of the search query\noptional field\nyou can use the following Amazon search
            URL parameters for customizing the search\nexample:\n&low-price=52 – search for products that cost more than 52
            USD;\n&high-price=45 – search for products that cost less than 45 USD;\n&sort=relevancerank – sort results by
            relevance;\n&sort=featured-rank – sort results by featured products;\n&sort=price-asc-rank – sort by ascending
            price;\n&sort=price-desc-rank – sort by descending price;\n&sort=review-rank – sort by the average customer reviews
            value;\n&sort=date-desc-rank – sort by the newest arrival\nNote that search_param values will be ignored if any
            of the following parameters is used: price_min, price_max, sort_by"
          nullable: true
        price_min:
          type: integer
          description: "minimum product price\noptional field\nminimum price of the returned products listed on Amazon for
            the specified query\nexample:\n5\nNote: if you specify price_min, the search_param parameter will be ignored"
          nullable: true
        price_max:
          type: integer
          description: "maximum product price\noptional field\nmaximum price of the returned products listed on Amazon for
            the specified query\nexample:\n100\nNote: if you specify price_max, the search_param parameter will be ignored"
          nullable: true
        sort_by:
          type: string
          description: "results sorting rules\noptional field\nthe following sorting rules are supported:\nrelevance, price_low_to_high,
            price_high_to_low, featured, avg_customer_review, newest_arrival\nexample:\nsort_by:\"relevance\"\nNote: if you
            specify sort_by, the search_param parameter will be ignored"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
        postback_url:
          type: string
          description: "URL for sending task results\noptional field\nonce the task is completed, we will send a POST request
            with its results compressed in the gzip format to the postback_url you specified\nyou can use the ‘$id’ string
            as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the
            request.\nexample:\nhttp://your-server.com/postbackscript?id=$id\nhttp://your-server.com/postbackscript?id=$id&tag=$tag\n\
            Note: special characters in postback_url will be urlencoded;\ni.a., the # character will be encoded into %23\n\
            learn more on our Help Center"
          nullable: true
        postback_data:
          type: string
          description: "postback_url datatype\nrequired field if you specify postback_url\ncorresponds to the datatype that
            will be sent to your server\npossible values:\nadvanced, html"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified\nyou can use the ‘$id’ string as a $id variable and ‘$tag’ as
            urlencoded $tag variable. We will set the necessary values before sending the request.\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23\nlearn more on our Help Center"
          nullable: true
      example:
      - language_code: en_US
        location_code: 2840
        keyword: shoes
