      type: object
      properties:
        keyword:
          type: string
          description: 'keyword received in a POST array

            the keyword is returned with decoded %## (plus symbol ‘+’ will be decoded to a space character)'
          nullable: true
        type:
          type: string
          description: type of element
          nullable: true
