          type: string
          description: 'target match type

            required field if stop_crawl_on_match is specified

            type of match for the match_value

            possible values:

            domain – specific domain or subdomain

            with_subdomains – main domain and subdomains

            wildcard –  wildcard pattern'
          nullable: true
        match_value:
          type: string
          description: 'target domain, subdomain, or wildcard value

            required field if stop_crawl_on_match is specified

            specify a target domain, subdomain, or wildcard value;

            Note: domain or subdomain must be specified without a request protocol;

            example: "match_value": "dataforseo.com",

            "match_value": "/blog/post-*"'
          nullable: true
        max_crawl_pages:
          type: integer
          description: 'page crawl limit

            optional field

            number of search results pages to crawl

            default value: 1

            max value: 100

            Note: the max_crawl_pages and depth parameters complement each other;

            learn more at our help center'
          nullable: true
        search_param:
          type: string
          description: 'additional parameters of the search query

            optional field

            get the list of available parameters and additional details here'
          nullable: true
        calculate_rectangles:
          type: boolean
          description: 'calculate pixel rankings for SERP elements in advanced results

            optional field

            pixel ranking refers to the distance between the result snippet and top left corner of the screen;

            Visit Help Center to learn more>>

            by default, the parameter is set to false

            Note: you will be charged extra $0.002 for using this parameter'
          nullable: true
        browser_screen_width:
          type: integer
          description: 'browser screen width

            optional field

            you can set a custom browser screen width to calculate pixel rankings for a particular device;

            can be specified within the following range: 240-9999;

            by default, the parameter is set to:

            1920 for desktop;

            360 for mobile on android;

            375 for mobile on iOS;

            Note: to use this parameter, set calculate_rectangles to true'
          format: int64
          nullable: true
        browser_screen_height:
          type: integer
          description: 'browser screen height

            optional field

            you can set a custom browser screen height to calculate pixel rankings for a particular device;

            can be specified within the following range: 240-9999;

            by default, the parameter is set to:

            1080 for desktop;

            640 for mobile on android;

            812 for mobile on iOS;

            Note: to use this parameter, set calculate_rectangles to true'
          nullable: true
        browser_screen_resolution_ratio:
          type: integer
          description: 'browser screen resolution ratio

            optional field

            you can set a custom browser screen resolution ratio to calculate pixel rankings for a particular device;

            can be specified within the following range: 0.5-3;

            by default, the parameter is set to:

            1 for desktop;

            3 for mobile on android;

            3 for mobile on iOS;

            Note: to use this parameter, set calculate_rectangles to true'
          nullable: true
        url:
          type: string
          description: 'direct URL of the search query

            optional field

            you can specify a direct URL and we will sort it out to the necessary fields. Note that this method is the most difficult for our API to process and also requires you to specify the exact language and location in the URL. In most cases, we wouldn’t recommend using this method.

            example:

            https://www.bing.com/search?q=rank%20checker&count=50&first=1&setlang=en&cc=US&safesearch=Moderate&FORM=SEPAGE'
          nullable: true
        location_coordinate:
          type: string
          description: 'GPS coordinates of a location

            required field if you don''t specify location_name or location_code

            if you use this field, you don''t need to specify location_name or location_code

