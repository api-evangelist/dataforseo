            example:

            "stop_crawl_on_match":[{"match_value":"dataforseo.com","match_type":"with_subdomains"}]

            learn more about this parameter on our Help Center - https://dataforseo.com/help-center/using-the-stop_crawl_on_match-parameter-in-serp-api

            Your account will be billed per each SERP crawled through the specified targets'
          nullable: true
        match_type:
          type: string
          description: target match typerequired field if stop_crawl_on_match is specifiedtype of match for the match_valuepossible values:domain – specific domain or subdomainwith_subdomains – main domain and subdomainswildcard –  wildcard pattern
          nullable: true
        match_value:
          type: string
          description: 'target domain, subdomain, or wildcard valuerequired field if stop_crawl_on_match is specifiedspecify a target domain, subdomain, or wildcard value;Note: domain or subdomain must be specified without a request protocol;example: "match_value": "dataforseo.com","match_value": "/blog/post-*"'
          nullable: true
        max_crawl_pages:
          type: integer
          description: 'page crawl limitoptional fieldnumber of search results pages to crawlmax value: 100Note: you will be charged for each page crawled (10 organic results per page);learn more about pricing on our Pricing page;Note#2: the max_crawl_pages and depth parameters complement each other;learn more at our help center'
          nullable: true
