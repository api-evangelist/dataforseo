    SerpSeznamOrganicTaskPostRequestInfo:
      type: object
      properties:
        keyword:
          type: string
          description: 'keyword

            required field

            you can specify up to 700 characters in the keyword field

            all %## will be decoded (plus character ‘+’ will be decoded to a space character)

            if you need to use the “%” character for your keyword, please specify it as “%25”;

            if you need to use the “+” character for your keyword, please specify it as “%2B”

            learn more about rules and limitations of keyword and keywords fields in DataForSEO APIs in this Help Center article'
        location_name:
          type: string
          description: 'full name of search engine location

            required field if you don’t specify location_code

            if you use this field, you don’t need to specify location_code

            you can receive the list of available locations of the search engine with their location_name by making a separate request to the https://api.dataforseo.com/v3/serp/seznam/locations

            example:

            London,England,United Kingdom'
          nullable: true
        location_code:
          type: integer
          description: 'search engine location code

            required field if you don’t specify location_name

            if you use this field, you don’t need to specify location_name

            you can receive the list of available locations of the search engines with their location_code by making a separate request to the https://api.dataforseo.com/v3/serp/seznam/locations

            example:

            2840'
          nullable: true
        language_name:
          type: string
          description: 'full name of search engine language

            required field if you don’t specify language_code

            if you use this field, you don’t need to specify language_code

            you can receive the list of available languages of the search engine with their language_name by making a separate request to the https://api.dataforseo.com/v3/serp/seznam/languages

            example:

            Czech'
          nullable: true
        language_code:
          type: string
          description: 'search engine language code

            required field if you don’t specify language_name

            if you use this field, you don’t need to specify language_name

            you can receive the list of available languages of the search engine with their language_code by making a separate request to the https://api.dataforseo.com/v3/serp/seznam/languages

            example:

            cs'
          nullable: true
        url:
          type: string
          description: 'direct URL of the search query

            optional field

            you can specify a direct URL and we will sort it out to the necessary fields;

            note that this method is the most difficult for our API to process and also requires you to specify the exact language and location in the URL;

            in most cases, we wouldn’t recommend using this method.'
          nullable: true
        priority:
          type: integer
          description: 'task priority

            optional field

            can take the following values:

            1 – normal execution priority (set by default)

            2 – high execution priority

            You will be additionally charged for the tasks with high execution priority.

            The cost can be calculated on the Pricing page.'
          nullable: true
        depth:
          type: integer
          description: 'parsing depth

            optional field

            number of results in SERP

            default value: 10;

            maximum value: 500;

            Your account will be billed per each SERP containing up to 10 results;

            Setting depth above 10 may result in additional charges if the search engine returns more than 10 results;

            The cost can be calculated on the Pricing page.'
          nullable: true
        max_crawl_pages:
          type: integer
          description: 'page crawl limit

            optional field

            number of search results pages to crawl

            default value: 1

            max value: 10

            Note: the max_crawl_pages and depth parameters complement each other;

            learn more at our help center'
          nullable: true
        device:
          type: string
          description: 'device type

            optional field

            return results for a specific device type

            can take the values:desktop, mobile

            default value: desktop'
          nullable: true
        os:
          type: string
          description: 'device operating system

            optional field

            if you specify desktop in the device field, choose from the following values: windows, macos

            default value: windows

            if you specify mobile in the device field, choose from the following values: android, ios

            default value: android'
          nullable: true
        se_domain:
          type: string
          description: 'search engine domain

            optional field

            we choose the relevant search engine domain automatically

            however, you can set a custom search engine domain in this field

            example:

            search.seznam.cz'
          nullable: true
        search_param:
          type: string
          description: 'additional parameters of the search query

            optional field'
          nullable: true
        calculate_rectangles:
          type: boolean
          description: 'calculate pixel rankings for SERP elements in advanced results

            optional field

            pixel ranking refers to the distance between the result snippet and top left corner of the screen;

            Visit Help Center to learn more>>

            by default, the parameter is set to false

            Note: if set to true, the charge per task will be multiplied by 2'
          nullable: true
        stop_crawl_on_match:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/SerpApiStopCrawlOnMatchInfo'
            nullable: true
          description: 'array of targets to stop crawling

            optional field

            if specified, the response will contain SERP results up to and including the specified match_value;

            you can specify up to 10 target values in this array

            example:

            "stop_crawl_on_match":[{"match_value":"dataforseo.com","match_type":"with_subdomains"}]

            learn more about this parameter on our Help Center - https://dataforseo.com/help-center/using-the-stop_crawl_on_match-parameter-in-serp-api

            Your account will be billed per each SERP crawled through the specified targets'
          nullable: true
        match_value:
          type: string
          description: 'target domain, subdomain, or wildcard value

            required field if stop_crawl_on_match is specified

            specify a target domain, subdomain, or wildcard value;

            Note: domain or subdomain must be specified without a request protocol;

            example: "match_value": "dataforseo.com",

            "match_value": "/blog/post-*"'
          nullable: true
        match_type:
          type: string
          description: 'target match type

            required field if stop_crawl_on_match is specified

            type of match for the match_value

            possible values:

            domain – specific domain or subdomain

            with_subdomains – main domain and subdomains

            wildcard –  wildcard pattern'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
        postback_url:
          type: string
          description: 'URL for sending task results

            optional field

            once the task is completed, we will send a POST request with its results compressed in the gzip format to the postback_url you specified

            you can use the ‘$id’ string as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the request.

            example:

            http://your-server.com/postbackscript?id=$id

            http://your-server.com/postbackscript?id=$id&tag=$tag

            Note: special characters in postback_url will be urlencoded;

            i.a., the # character will be encoded into %23

            learn more on our Help Center'
          nullable: true
        postback_data:
          type: string
          description: 'postback_url datatype

            required field if you specify postback_url

            corresponds to the function you used for setting a task

            possible values:

            regular, advanced, html'
          nullable: true
        pingback_url:
          type: string
          description: 'notification URL of a completed task

            optional field

            when a task is completed we will notify you by GET request sent to the URL you have specified

            you can use the ‘$id’ string as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the request.

            example:

            http://your-server.com/pingscript?id=$id

            http://your-server.com/pingscript?id=$id&tag=$tag

            Note: special characters in pingback_url will be urlencoded;

            i.a., the # character will be encoded into %23

            learn more on our Help Center'
          nullable: true
      example:
      - language_code: cs
        location_code: 2203
        keyword: albert einstein
