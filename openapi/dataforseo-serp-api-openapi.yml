            if you need to use the “+” character for your keyword, please specify it as “%2B”;

            learn more about rules and limitations of keyword and keywords fields in DataForSEO APIs in this Help Center article'
        location_code:
          type: integer
          description: 'search engine location code

            required field if you don''t specify location_name

            if you use this field, you don''t need to specify location_name

            you can receive the list of available locations of the search engines with their location_code by making a separate request to the https://api.dataforseo.com/v3/serp/youtube/locations

            example:

            2840'
          nullable: true
        language_code:
          type: string
          description: 'search engine language code

            required field if you don''t specify language_name

            if you use this field, you don''t need to specify language_name

            you can receive the list of available languages of the search engine with their language_code by making a separate request to the https://api.dataforseo.com/v3/serp/youtube/languages

            example:

            en'
          nullable: true
        device:
          type: string
          description: 'device type

            optional field

            return results for a specific device type

            available values: desktop, mobile'
          nullable: true
        priority:
          type: integer
          description: 'task priority

            optional field

            can take the following values:

            1 – normal execution priority (set by default)

            2 – high execution priority

            You will be additionally charged for the tasks with high execution priority.

            The cost can be calculated on the Pricing page.'
          nullable: true
        pingback_url:
          type: string
          description: 'notification URL of a completed task

            optional field

            when a task is completed we will notify you by GET request sent to the URL you have specified

            you can use the ‘$id’ string as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the request.

            example:

            http://your-server.com/pingscript?id=$id

            http://your-server.com/pingscript?id=$id&tag=$tag

            Note: special characters in pingback_url will be urlencoded;

            i.a., the # character will be encoded into %23

            learn more on our Help Center'
          nullable: true
        postback_url:
          type: string
          description: 'return URL for sending task results

            optional field

            once the task is completed, we will send a POST request with its results compressed in the gzip format to the postback_url you specified

            you can use the ‘$id’ string as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the request.

            example:

            http://your-server.com/postbackscript?id=$id

            http://your-server.com/postbackscript?id=$id&tag=$tag

            Note: special characters in postback_url will be urlencoded;

            i.a., the # character will be encoded into %23

            learn more on our Help Center'
          nullable: true
        postback_data:
          type: string
          description: 'postback_url datatype

            required field if you specify postback_url

            corresponds to the datatype that will be sent to your server

            possible value:

            advanced'
          nullable: true
        location_name:
          type: string
          description: 'full name of search engine location

            required field if you don''t specify location_code

            if you use this field, you don''t need to specify location_code

            you can receive the list of available locations of the search engine with their location_name by making a separate request to the https://api.dataforseo.com/v3/serp/youtube/locations

            example:

            United States'
          nullable: true
        language_name:
          type: string
          description: 'full name of search engine language

            required field if you don''t specify language_code

            if you use this field, you don''t need to specify language_code

            you can receive the list of available languages of the search engine with their language_name by making a separate request to the https://api.dataforseo.com/v3/serp/youtube/languages

            example:

            English'
          nullable: true
        os:
          type: string
          description: 'device operating system

            optional field

            if you specify desktop in the device field, choose from the following values: windows, macos

            default value: windows

            if you specify mobile in the device field, choose from the following values: android, ios

            default value: android'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
        search_param:
          type: string
          description: 'additional parameters of the search query

            optional field

            example:

            sp=EgIQAg%253D%253D'
          nullable: true
        block_depth:
          type: integer
          description: 'parsing depth

            optional field

            number of blocks of results in SERP

            default value: 20

            max value: 700

            Note: your account will be billed per each SERP containing up to 20 blocks of results;

            thus, setting a block depth above 20 may result in additional charges if the search engine returns more than 20 results;

            if the specified block depth is higher than the number of results in the response, the difference will be refunded automatically to your account balance'
