          type: string
          description: 'direct URL to search engine results

            you can use it to make sure that we provided accurate results'
          nullable: true
        datetime:
          type: string
          description: 'date and time when the result was received

            in the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”

            example:

            2019-11-15 12:57:46 +00:00'
          nullable: true
        spell:
          type: object
          oneOf:
          - $ref: '#/components/schemas/SpellInfo'
          description: 'autocorrection of the search engine

