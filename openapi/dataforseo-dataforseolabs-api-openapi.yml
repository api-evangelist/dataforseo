            you can receive the list of available locations with their location_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            ignore this field to get the results for all available locations

            example:

            2840'
          nullable: true
        language_name:
          type: string
          description: 'full name of the language

            optional field

            if you use this field, you don’t need to specify language_code

            you can receive the list of available languages with their language_name by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            ignore this field to get the results for all available languages

            example:

            English'
          nullable: true
        language_code:
          type: string
          description: 'language code

            optional field

            if you use this field, you don’t need to specify language_name

            you can receive the list of available languages with their language_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            ignore this field to get the results for all available languages

            example:

            en'
          nullable: true
        ignore_synonyms:
          type: boolean
          description: 'ignore highly similar keywords

            optional field

            if set to true only core keywords will be returned, all highly similar keywords will be excluded;

            default value: false'
          nullable: true
        item_types:
          type: array
          items:
            type: string
          description: 'display results by item type

            optional field

            indicates the type of search results included in the response

            Note: if the item_types array contains item types that are different from organic, the results will be ordered by the first item type in the array; you will not be able to sort and filter results by the types of search results not included in the response;

            possible values:

            ["organic", "paid", "featured_snippet", "local_pack", "ai_overview_reference"]

            default value:

            ["organic", "paid"]'
          nullable: true
        include_clickstream_data:
          type: boolean
          description: 'include or exclude data from clickstream-based metrics in the result

            optional field

            if the parameter is set to true, you will receive clickstream_keyword_info, clickstream_etv, clickstream_gender_distribution, clickstream_age_distribution, keyword_info_normalized_with_clickstream, and keyword_info_normalized_with_bing fields in the response

            default value: false

            with this parameter enabled, you will be charged double the price for the request

            learn more about how clickstream-based metrics are calculated in this help center article'
          nullable: true
        limit:
          type: integer
          description: 'the maximum number of returned keywords

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        offset:
          type: integer
          description: 'offset in the results array of returned keywords

            optional field

            default value: 0

            if you specify the 10 value, the first ten keywords in the results array will be omitted and the data will be provided for the successive keywords'
          nullable: true
        load_rank_absolute:
          type: boolean
          description: 'return rankings distribution by rank_absolute

            optional field

            default value: false

            if set to true, we will return the field metrics_absolute containing rankings distribution by the rank_absolute parameter that indicates the result’s position among all SERP elements'
          nullable: true
        historical_serp_mode:
          type: string
          description: 'data collection mode

            optional field

            you can use this field to filter the results;

            possible types of filtering:

            live — return keywords for which the specified target currently has ranking results in SERP;

            lost — return keywords for which the specified target had previously had ranking results in SERP, but didn’t have them during the last check;

            all — return both types of keywords.

            default value: live'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, <, <=, >, >=, =, <>, in, not_in, match, not_match, ilike, not_ilike, like, not_like

            you can use the % operator with like and not_like, as well as ilike and not_ilike to match any string of zero or more characters

            example:

            ["ranked_serp_element.serp_item.rank_group","<=",10]

            [["ranked_serp_element.serp_item.rank_group","<=",10],

            "and",

            ["ranked_serp_element.serp_item.type","<>","paid"]]

            [["keyword_data.keyword_info.search_volume","<>",0],

            "and",

            [["ranked_serp_element.serp_item.type","<>","paid"],"or",["ranked_serp_element.serp_item.is_malicious","=",false]]]

            if you want to get the keywords a particular webpage ranks for, you can use a target field or filter by the ranked_serp_element.serp_item.relative_url parameter

            example:

            ["ranked_serp_element.serp_item.relative_url", "=", "/apis/rank-tracker-api"]

            for more information about filters, please refer to Dataforseo Labs – Filters or this help center guide'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            you should use a comma to set up a sorting type

            example:

            ["keyword_data.keyword_info.competition,desc"]

            default rule:

            ["ranked_serp_element.serp_item.rank_group,asc"]

            note that you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["keyword_data.keyword_info.search_volume,desc","keyword_data.keyword_info.cpc,desc"]'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - target: dataforseo.com
        language_name: English
        location_name: United States
        load_rank_absolute: true
        limit: 3
