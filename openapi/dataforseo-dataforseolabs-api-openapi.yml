    DataforseoLabsGoogleKeywordSuggestionsLiveRequestInfo:
      type: object
      properties:
        keyword:
          type: string
          description: 'keyword

            required field

            UTF-8 encoding

            the keywords will be converted to lowercase format;

            learn more about rules and limitations of keyword and keywords fields in DataForSEO APIs in this Help Center article'
        location_name:
          type: string
          description: 'full name of the location

            optional field

            if you use this field, you don’t need to specify location_code

            you can receive the list of available locations with their location_name by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            ignore this field to get the results for all available locations

            example:

            United Kingdom'
          nullable: true
        location_code:
          type: integer
          description: 'location code

            optional field

            if you use this field, you don’t need to specify location_name

            you can receive the list of available locations with their location_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            ignore this field to get the results for all available locations

            example:

            2840'
          nullable: true
        language_name:
          type: string
          description: 'full name of the language

            optional field

            if you use this field, you don’t need to specify language_code

            you can receive the list of available languages with their language_name by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            English

            Note: if omitted, results default to the language with the most keyword records in the specified location;

            refer to the available_languages.keywords field of the Locations and Languages endpoint to determine the default language'
          nullable: true
        language_code:
          type: string
          description: 'language code

            optional field

            if you use this field, you don’t need to specify language_name

            you can receive the list of available languages with their language_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            en

            Note: if omitted, results default to the language with the most keyword records in the specified location;

            refer to the available_languages.keywords field of the Locations and Languages endpoint to determine the default language'
          nullable: true
        include_seed_keyword:
          type: boolean
          description: 'include data for the seed keyword

            optional field

            if set to true, data for the seed keyword specified in the keyword field will be provided in the seed_keyword_data array of the response

            default value: false'
          nullable: true
        include_serp_info:
          type: boolean
          description: 'include data from SERP for each keyword

            optional field

            if set to true, we will return a serp_info array containing SERP data (number of search results, relevant URL, and SERP features) for every keyword in the response

            default value: false'
          nullable: true
        include_clickstream_data:
          type: boolean
          description: 'include or exclude data from clickstream-based metrics in the result

            optional field

            if the parameter is set to true, you will receive clickstream_keyword_info, keyword_info_normalized_with_clickstream, and keyword_info_normalized_with_bing fields in the response

            default value: false

            with this parameter enabled, you will be charged double the price for the request

            learn more about how clickstream-based metrics are calculated in this help center article'
          nullable: true
        exact_match:
          type: boolean
          description: 'search for the exact phrase

            optional field

            if set to true, the returned keywords will include the exact keyword phrase you specified, with potentially other words before or after that phrase

            default value: false'
          nullable: true
        ignore_synonyms:
          type: boolean
          description: 'ignore highly similar keywords

            optional field

            if set to true only core keywords will be returned, all highly similar keywords will be excluded;

            default value: false'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, <, <=, >, >=, =, <>, in, not_in, match, not_match, ilike, not_ilike, like, not_like

            you can use the % operator with like and not_like, as well as ilike and not_ilike to match any string of zero or more characters

            example:

            ["keyword_info.search_volume",">",0]

            [["keyword_info.search_volume","in",[0,1000]],

            "and",

            ["keyword_info.competition_level","=","LOW"]][["keyword_info.search_volume",">",100],

            "and",

            [["keyword_info.cpc","<",0.5],

            "or",

            ["keyword_info.high_top_of_page_bid","<=",0.5]]]

            for more information about filters, please refer to Dataforseo Labs – Filters or this help center guide'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            a comma is used as a separator

            example:

            ["keyword_info.competition,desc"]

            default rule:

            ["keyword_info.search_volume,desc"]

            note that you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["keyword_info.search_volume,desc","keyword_info.cpc,desc"]'
          nullable: true
        limit:
          type: integer
          description: 'the maximum number of returned keywords

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        offset:
          type: integer
          description: 'offset in the results array of returned keywords

            optional field

            default value: 0

            if you specify the 10 value, the first ten keywords in the results array will be omitted and the data will be provided for the successive keywords

            Note: we recommend using this parameter only when retrieving up to 10,000 results

            for retrieving over 10,000 results, use the offset_token instead.'
          nullable: true
        offset_token:
          type: string
          description: 'offset token for subsequent requests

            optional field

            provided in the identical filed of the response to each request;

            use this parameter to avoid timeouts while trying to obtain over 10,000 results in a single request;

            by specifying the unique offset_token value from the response array, you will get the subsequent results of the initial task;

            offset_token values are unique for each subsequent task

            Note: if the offset_token is specified in the request, all other parameters except limit will not be taken into account when processing a task.

            learn more about this parameter on our Help Center'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - keyword: phone
        location_code: 2840
        language_code: en
        include_serp_info: true
        include_seed_keyword: true
        limit: 1
