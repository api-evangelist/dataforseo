components:
  schemas:
    BaseResponseTaskInfo:
      properties:
        id:
          type: string
          description: 'task identifier

            unique task identifier in our system in the UUID format'
          nullable: true
        status_code:
          type: integer
          description: 'status code of the task

            generated by DataForSEO, can be within the following range: 10000-60000

            you can find the full list of the response codes here'
          nullable: true
        status_message:
          type: string
          description: 'informational message of the task

            you can find the full list of general informational messages here'
          nullable: true
        time:
          type: string
          description: execution time, seconds
          nullable: true
        cost:
          type: number
          description: total tasks cost, USD
          format: double
          nullable: true
        result_count:
          type: integer
          description: number of elements in the result array
          format: int64
          nullable: true
        path:
          type: array
          items:
            type: string
            nullable: true
          description: URL path
          nullable: true
        data:
          type: object
          additionalProperties:
            type: object
            nullable: true
          description: contains the same parameters that you specified in the POST request
          nullable: true
    DataforseoLabsleAppCompetitorsLiveItem:
      type: object
      properties:
        se_type:
          type: string
          description: search engine type
          nullable: true
        app_id:
          type: string
          description: id of the competitor app
          nullable: true
        avg_position:
          type: number
          description: 'average position of the app in Google Play SERP

            Note: average position is calculated for intersected keywords only;

            the value for a given application may differ when combined with different target applications'
          format: float
          nullable: true
        sum_position:
          type: integer
          description: 'sum of all app positions in Google Play SERP

            Note: sum position is calculated for intersected keywords only;

            the value for a given application may differ when combined with different target applications'
          nullable: true
        intersections:
          type: integer
          description: number of intersecting keywords
          nullable: true
        competitor_metrics:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AppMetricsInfo'
          description: 'metrics for intersecting keywords

            ranking data relevant to the keywords that the provided competitor application shares with the app in a POST request;

            note: in this array ranking data is provided for the returned competitor’s app_id'
          nullable: true
        full_metrics:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AppMetricsInfo'
          description: 'metrics for all keywords of the application

            full overview of ranking data relevant to all keywords that the provided app_id is ranking for'
          nullable: true
    KeywordInfoNormalizedWithInfo:
      type: object
      properties:
        last_updated_time:
          type: string
          description: 'date and time when the dataset was updated

            in the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”

            example:

            2019-11-15 12:57:46 +00:00'
          nullable: true
        search_volume:
          type: integer
          description: current search volume rate of a keyword
          nullable: true
        is_normalized:
          type: boolean
          description: 'keyword info is normalized

            if true, values are normalized with Bing data'
          nullable: true
        monthly_searches:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/MonthlySearchesInfo'
            nullable: true
          description: 'monthly search volume rates

            array of objects with search volume rates in a certain month of a year'
          nullable: true
    DataforseoLabsGoogleAppIntersectionLiveTaskInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseTaskInfo'
      - type: object
        properties:
          result:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/DataforseoLabsGoogleAppIntersectionLiveResultInfo'
              nullable: true
            description: array of results
            nullable: true
    DataforseoLabsGoogleBulkKeywordDifficultyLiveResponseInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseInfo'
      - type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/DataforseoLabsGoogleBulkKeywordDifficultyLiveTaskInfo'
              nullable: true
            description: array of tasks
            nullable: true
    DataforseoLabsGoogleKeywordsForSiteLiveRequestInfo:
      type: object
      properties:
        target:
          type: string
          description: 'target domain

            required field

            the domain name of the target website

            the domain should be specified without https://'
        location_name:
          type: string
          description: 'full name of the location

            required field if you don’t specify location_code

            Note: it is required to specify either location_name or location_code

            you can receive the list of available locations with their location_name by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            United Kingdom'
          nullable: true
        location_code:
          type: integer
          description: 'unique location identifier

            required field if you don’t specify location_name

            Note: it is required to specify either location_name or location_code

            you can receive the list of available locations with their location_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            2840'
          nullable: true
        language_name:
          type: string
          description: 'full name of the language

            optional field

            if you use this field, you don’t need to specify language_code

            you can receive the list of available languages with their language_name by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            English

            Note: if omitted, results default to the language with the most keyword records in the specified location;

            refer to the available_languages.keywords field of the Locations and Languages endpoint to determine the default language'
          nullable: true
        language_code:
          type: string
          description: 'language code

            optional field

            if you use this field, you don’t need to specify language_name

            you can receive the list of available languages with their language_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            en

            Note: if omitted, results default to the language with the most keyword records in the specified location;

            refer to the available_languages.keywords field of the Locations and Languages endpoint to determine the default language'
          nullable: true
        include_serp_info:
          type: boolean
          description: 'include data from SERP for each keyword

            optional field

            if set to true, we will return a serp_info array containing SERP data (number of search results, relevant URL, and SERP features) for every keyword in the response

            default value: false'
          nullable: true
        include_subdomains:
          type: boolean
          description: 'indicates if the subdomains will be included in the search

            optional field

            if set to false, the subdomains will be ignored

            default value: true'
          nullable: true
        include_clickstream_data:
          type: boolean
          description: 'include or exclude data from clickstream-based metrics in the result

            optional field

            if the parameter is set to true, you will receive clickstream_keyword_info, keyword_info_normalized_with_clickstream, and keyword_info_normalized_with_bing fields in the response

            default value: false

            with this parameter enabled, you will be charged double the price for the request

            learn more about how clickstream-based metrics are calculated in this help center article'
          nullable: true
        limit:
          type: integer
          description: 'the maximum number of keywords in the results array

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        offset:
          type: integer
          description: 'offset in the results array of returned keywords

            optional field

            default value: 0

            if you specify the 10 value, the first ten keywords in the results array will be omitted and the data will be provided for the successive keywords

            Note: we recommend using this parameter only when retrieving up to 10,000 results

            for retrieving over 10,000 results, use the offset_token instead.'
          nullable: true
        offset_token:
          type: string
          description: 'offset token for subsequent requests

            optional field

            provided in the identical filed of the response to each request;

            use this parameter to avoid timeouts while trying to obtain over 10,000 results in a single request;

            by specifying the unique offset_token value from the response array, you will get the subsequent results of the initial task;

            offset_token values are unique for each subsequent task

            Note: if the offset_token is specified in the request, all other parameters except limit will not be taken into account when processing a task.

            learn more about this parameter on our Help Center'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, <, <=, >, >=, =, <>, in, not_in, match, not_match, ilike, not_ilike, like, not_like

            you can use the % operator with like and not_like, as well as ilike and not_ilike to match any string of zero or more characters

            note that you can not filter the results by relevance

            example:

            ["keyword_info.search_volume",">",0]

            for more information about filters, please refer to Dataforseo Labs – Filters or this help center guide'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            you should use a comma to set up a sorting parameter

            default rule:

            ["relevance,desc"]

            relevance is used as the default sorting rule to provide you with the closest keyword ideas. We recommend using this sorting rule to get highly-relevant search terms. Note that relevance is only our internal system identifier, so it can not be used as a filter, and you will not find this field in the result array. The relevance score is based on a similar principle as used in the Keywords For Keywords endpoint.note that you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["relevance,desc","keyword_info.search_volume,desc"]'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - target: apple.com
        language_code: en
        location_code: 2840
        include_serp_info: true
        include_subdomains: true
        filters:
        - serp_info.se_results_count
        - '>'
        - 0
        limit: 3
