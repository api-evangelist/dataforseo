        limit:
          type: integer
          description: 'the maximum number of returned pages

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        offset:
          type: integer
          description: 'offset in the results array of returned pages

            optional field

            default value: 0

            if you specify the 10 value, the first ten pages in the results array will be omitted and the data will be provided for the successive pages'
          nullable: true
        historical_serp_mode:
          type: string
          description: 'data collection mode

            optional field

            you can use this field to filter the results;

            possible types of filtering:

            live — return metrics for SERPs in which the specified target currently has ranking results;

            lost — return metrics for SERPs in which the specified target had previously had ranking results, but didn’t have them during the last check;

            all — return metrics for both types of SERPs.

            default value: live'
          nullable: true
        ignore_synonyms:
          type: boolean
          description: 'ignore highly similar keywords

            optional field

            if set to true, only core keywords will be returned, all highly similar keywords will be excluded;

            default value: false'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, <, <=, >, >=, =, <>, in, not_in

            example:

            ["metrics.paid.count",">",0]

            [["metrics.organic.count",">",50],"and",["metrics.organic.pos_1","<>",0]]

            [[""metrics.organic.count",">",50"],

            "and",

            [["metrics.organic.pos_1","<>",0],"or",["metrics.organic.pos_2_3","<>",0]]]

            for more information about filters, please refer to Dataforseo Labs – Filters or this help center guide'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            you should use a comma to specify a sorting type

            example:

            ["metrics.paid.etv,asc"]

            Note: you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["metrics.organic.etv,desc","metrics.paid.count,asc"]

            default rule:

            ["metrics.organic.count,desc"]

            Note: if the item_types array contains item types that are different from organic, the results will be ordered by the first item type in the array'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - target: amazon.com
        language_name: English
        location_code: 2840
        filters:
        - - metrics.organic.pos_1
          - <>
          - 0
        - or
        - - metrics.organic.pos_2_3
          - <>
          - 0
        limit: 3
