    DataforseoLabsGoogleDomainIntersectionLiveRequestInfo:
      type: object
      properties:
        target1:
          type: string
          description: 'domain

            required field

            the domain name of the first target website

            the domain should be specified without https:// and www.'
        target2:
          type: string
          description: 'domain

            required field

            the domain name of the second target website

            the domain should be specified without https:// and www.'
        location_name:
          type: string
          description: 'full name of the location

            required field if you don’t specify location_code

            Note: it is required to specify either location_name or location_code

            you can receive the list of available locations with their location_name by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            United Kingdom'
          nullable: true
        location_code:
          type: integer
          description: 'location code

            required field if you don’t specify location_name

            Note: it is required to specify either location_name or location_code

            you can receive the list of available locations with their location_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            2840'
          nullable: true
        language_name:
          type: string
          description: 'full name of the language

            required field if you don’t specify language_code

            Note: it is required to specify either language_name or language_code

            you can receive the list of available languages with their language_name by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            English'
          nullable: true
        language_code:
          type: string
          description: 'language code

            required field if you don’t specify language_name

            Note: it is required to specify either language_name or language_code

            you can receive the list of available languages with their language_code by making a separate request to the

            https://api.dataforseo.com/v3/dataforseo_labs/locations_and_languages

            example:

            en'
          nullable: true
        intersections:
          type: boolean
          description: 'domain intersections in SERP

            optional field

            if you set intersections to true, you will get the keywords for which both target domains specified as target1 and target2 have results within the same SERP; the corresponding SERP elements for both domains will be provided in the results array

            Note: this endpoint will not provide results if the number of intersecting keywords exceeds 10 million

            if you specify intersections: false, you will get the keywords for which the domain specified as target1 has results in SERP, and the domain specified as target2 doesn’t;

            thus, the corresponding SERP elements and other data will be provided for the domain specified as target1only

            default value: true'
          nullable: true
        item_types:
          type: array
          items:
            type: string
          description: 'search results type

            indicates type of search results included in the response

            optional field

            possible values:

            ["organic", "paid", "featured_snippet", "local_pack"]

            default value:

            ["organic", "paid"]'
          nullable: true
        include_serp_info:
          type: boolean
          description: 'include data from SERP for each keyword

            optional field

            if set to true, we will return a serp_info array containing SERP data (number of search results, relevant URL, and SERP features) for every keyword in the response

            default value: false'
          nullable: true
        include_clickstream_data:
          type: boolean
          description: 'include or exclude data from clickstream-based metrics in the result

            optional field

            if the parameter is set to true, you will receive clickstream_keyword_info, clickstream_etv, keyword_info_normalized_with_clickstream, and keyword_info_normalized_with_bing fields in the response

            default value: false

            with this parameter enabled, you will be charged double the price for the request

            learn more about how clickstream-based metrics are calculated in this help center article'
          nullable: true
        limit:
          type: integer
          description: 'the maximum number of returned keywords

            optional field

            default value: 100

            maximum value: 1000'
          nullable: true
        offset:
          type: integer
          description: 'offset in the items array of returned keywords

            optional field

            default value: 0

            if you specify the 10 value, the first ten keywords in the results array will be omitted and the data will be provided for the successive keywords'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: 'array of results filtering parameters

            optional field

            you can add several filters at once (8 filters maximum)

            you should set a logical operator and, or between the conditions

            the following operators are supported:

            regex, not_regex, <, <=, >, >=, =, <>, in, not_in, match, not_match, ilike, not_ilike, like, not_like

            you can use the % operator with like and not_like, as well as ilike and not_ilike to match any string of zero or more characters

            example:

            ["keyword_data.keyword_info.search_volume","in",[100,1000]]

            [["first_domain_serp_element.etv",">",0],"and",["first_domain_serp_element.description","like","%goat%"]]

            [["keyword_data.keyword_info.search_volume",">",100],

            "and",

            [["first_domain_serp_element.description","like","%goat%"],

            "or",

            ["second_domain_serp_element.type","=","organic"]]]

            for more information about filters, please refer to Dataforseo Labs – Filters or this help center guide'
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: 'results sorting rules

            optional field

            you can use the same values as in the filters array to sort the results

            possible sorting types:

            asc – results will be sorted in the ascending order

            desc – results will be sorted in the descending order

            you should use a comma to set up a sorting parameter

            example:

            ["keyword_data.keyword_info.competition,desc"]

            default rule:

            ["keyword_data.keyword_info.search_volume,desc"]

            note that you can set no more than three sorting rules in a single request

            you should use a comma to separate several sorting rules

            example:

            ["keyword_data.keyword_info.search_volume,desc","keyword_data.keyword_info.cpc,desc"]'
          nullable: true
        tag:
          type: string
          description: 'user-defined task identifier

            optional field

            the character limit is 255

            you can use this parameter to identify the task and match it with the result

            you will find the specified tag value in the data object of the response'
          nullable: true
      example:
      - target1: mom.com
        target2: quora.com
        language_code: en
        location_code: 2840
        include_serp_info: true
        limit: 3
