openapi: 3.0.1
info:
  title: DataForSEO DomainAnalytics API
  description: DataForSEO API is the starting point on your journey towards building powerful SEO software. With 
    DataForSEO you can get all the data you need to build an efficient application while also saving your time and 
    budget. DataForSEO API is using the REST technology for interchanging data between your application and our service.
    The data exchange is made through the widely used HTTP protocol, which allows applying our API to almost all 
    programming languages.
  version: 1.0.0
servers:
- url: https://api.dataforseo.com
- url: https://sandbox.dataforseo.com
paths:
  /v3/domain_analytics/id_list:
    post:
      tags:
      - DomainAnalytics
      description: "This endpoint is designed to provide you with a list of IDs and metadata for all Domain Analytics tasks
        created within the specified time period, including both successful and uncompleted tasks.\nfor more info please visit
        'https://docs.dataforseo.com/v3/domain_analytics/id_list/?bash'"
      operationId: DomainAnalyticsIdList
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsIdListRequestInfo'
                nullable: true
              example:
              - datetime_from: '2026-04-12 04:39:39 +00:00'
                datetime_to: '2026-04-14 04:39:39 +00:00'
                limit: 100
                offset: 0
                sort: desc
                include_metadata: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsIdListResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/errors:
    post:
      tags:
      - DomainAnalytics
      description: "By calling this endpoint you will receive information about the Domain Analytics API tasks that returned
        an error within the past 7 days.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/errors/?bash'"
      operationId: DomainAnalyticsErrors
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsErrorsRequestInfo'
                nullable: true
              example:
              - limit: 10
                offset: 0
                filtered_function: pingback_url
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsErrorsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/available_filters:
    get:
      tags:
      - DomainAnalytics
      description: "Here you will find all the necessary information about filters that can be used with Domain Analytics
        Technologies API endpoints.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/filters/?bash'"
      operationId: TechnologiesAvailableFilters
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesAvailableFiltersResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/locations:
    get:
      tags:
      - DomainAnalytics
      description: "You will receive the list of locations by this API call.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/locations/?bash'"
      operationId: TechnologiesLocations
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesLocationsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/languages:
    get:
      tags:
      - DomainAnalytics
      description: "You will receive the list of languages by calling this API.\n \nAs a response of the API server, you will
        receive JSON-encoded data containing a tasks array with the information specific to the set tasks.\nfor more info
        please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/languages/?bash'"
      operationId: TechnologiesLanguages
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesLanguagesResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/technologies:
    get:
      tags:
      - DomainAnalytics
      description: "This endpoint will provide you with the full list of available technologies structured by technology groups
        and categories each particular technology belongs to.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/technologies/?bash'"
      operationId: TechnologiesTechnologies
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesTechnologiesResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/aggregation_technologies/live:
    post:
      tags:
      - DomainAnalytics
      description: "The Aggregation Technologies endpoint will provide you with a list of the most popular technologies websites
        use alongside the technologies you specify. Alternatively, you can specify technology categories or groups to obtain
        wider stats.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/aggregation_technologies/live/?bash'"
      operationId: TechnologiesAggregationTechnologiesLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesAggregationTechnologiesLiveRequestInfo'
                nullable: true
              example:
              - mode: entry
                technology: Nginx
                keyword: WordPress
                filters:
                - - country_iso_code
                  - =
                  - US
                - and
                - - domain_rank
                  - '>'
                  - 800
                order_by:
                - 'groups_count,desc'
                limit: 10
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesAggregationTechnologiesLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/technologies_summary/live:
    post:
      tags:
      - DomainAnalytics
      description: "The Technologies Summary endpoint will provide you with the number of domains across different countries
        and languages that use the specified technology names, technology groups, or technology categories.\nfor more info
        please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/technologies_summary/live/?bash'"
      operationId: TechnologiesTechnologiesSummaryLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesTechnologiesSummaryLiveRequestInfo'
                nullable: true
              example:
              - mode: entry
                technologies:
                - Ngi
                keywords:
                - WordPress
                filters:
                - - country_iso_code
                  - =
                  - US
                - and
                - - domain_rank
                  - '>'
                  - 800
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesTechnologiesSummaryLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/technology_stats/live:
    post:
      tags:
      - DomainAnalytics
      description: "The Technology Stats endpoint will provide you with historical data on the number of domains across different
        countries and languages that use the specified technology.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/technology_stats/live/?bash'"
      operationId: TechnologiesTechnologyStatsLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesTechnologyStatsLiveRequestInfo'
                nullable: true
              example:
              - technology: jQuery
                date_from: '2026-01-15'
                date_to: '2026-03-15'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesTechnologyStatsLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/domains_by_technology/live:
    post:
      tags:
      - DomainAnalytics
      description: "This endpoint provides domains based on the technology they use. In addition to the list of domains, you
        will also get their technology profiles, the country and language they belong to, and other related data.\nfor more
        info please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/domains_by_technology/live/?bash'"
      operationId: TechnologiesDomainsByTechnologyLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainsByTechnologyLiveRequestInfo'
                nullable: true
              example:
              - technologies:
                - Nginx
                filters:
                - - country_iso_code
                  - =
                  - US
                - and
                - - domain_rank
                  - '>'
                  - 800
                order_by:
                - 'last_visited,desc'
                limit: 10
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainsByTechnologyLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/domains_by_html_terms/live:
    post:
      tags:
      - DomainAnalytics
      description: "This endpoint provides domains based on the HTML terms they use on their homepage. In addition to the
        list of domains, you will also get their technology profiles, the country and language they belong to, and other related
        data.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/domains_by_html_terms/live/?bash'"
      operationId: TechnologiesDomainsByHtmlTermsLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainsByHtmlTermsLiveRequestInfo'
                nullable: true
              example:
              - search_terms:
                - data-attrid
                order_by:
                - 'last_visited,desc'
                limit: 10
                offset: 0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainsByHtmlTermsLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/technologies/domain_technologies/live:
    post:
      tags:
      - DomainAnalytics
      description: "Using this endpoint you will get a list of technologies used in a particular domain.\nfor more info please
        visit 'https://docs.dataforseo.com/v3/domain_analytics/technologies/domain_technologies/live/?bash'"
      operationId: TechnologiesDomainTechnologiesLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainTechnologiesLiveRequestInfo'
                nullable: true
              example:
              - target: dataforseo.com
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainTechnologiesLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/whois/available_filters:
    get:
      tags:
      - DomainAnalytics
      description: "Here you will find all the necessary information about filters that can be used with Domain Analytics
        Whois API.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/whois/filters/?bash'"
      operationId: WhoisAvailableFilters
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsWhoisAvailableFiltersResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/domain_analytics/whois/overview/live:
    post:
      tags:
      - DomainAnalytics
      description: "This endpoint will provide you with Whois data enriched with backlink stats, and ranking and traffic info
        from organic and paid search results. Using this endpoint you will be able to get all these data for the domains matching
        the parameters you specify in the request.\nfor more info please visit 'https://docs.dataforseo.com/v3/domain_analytics/whois/overview/live/?bash'"
      operationId: WhoisOverviewLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsWhoisOverviewLiveRequestInfo'
                nullable: true
              example:
              - limit: 2
                filters:
                - - epp_status_codes
                  - in
                  - - client_transfer_prohibited
                    - client_update_prohibited
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/DomainAnalyticsWhoisOverviewLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
components:
  schemas:
    DomainAnalyticsWhoisAvailableFiltersResponseInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseInfo'
      - type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/DomainAnalyticsWhoisAvailableFiltersTaskInfo'
              nullable: true
            nullable: true
    DomainAnalyticsWhoisAvailableFiltersTaskInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseTaskInfo'
      - type: object
        properties:
          result:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/DomainAnalyticsWhoisAvailableFiltersResultInfo'
              nullable: true
            nullable: true
    DomainAnalyticsWhoisAvailableFiltersResultInfo:
      type: object
      properties:
        overview:
          type: object
          additionalProperties:
            type: string
            nullable: true
          nullable: true
    BaseResponseTaskInfo:
      properties:
        id:
          type: string
          description: "task identifier\nunique task identifier in our system in the UUID format"
          nullable: true
        status_code:
          type: integer
          description: "status code of the task\ngenerated by DataForSEO, can be within the following range: 10000-60000\n\
            you can find the full list of the response codes here"
          nullable: true
        status_message:
          type: string
          description: "informational message of the task\nyou can find the full list of general informational messages here"
          nullable: true
        time:
          type: string
          description: 'execution time, seconds'
          nullable: true
        cost:
          type: number
          description: 'total tasks cost, USD'
          format: double
          nullable: true
        result_count:
          type: integer
          description: number of elements in the result array
          format: int64
          nullable: true
        path:
          type: array
          items:
            type: string
            nullable: true
          description: URL path
          nullable: true
        data:
          type: object
          additionalProperties:
            type: object
            nullable: true
          description: contains the same parameters that you specified in the POST request
          nullable: true
    BaseResponseInfo:
      properties:
        version:
          type: string
          description: the current version of the API
          nullable: true
        status_code:
          type: integer
          description: "general status code\nyou can find the full list of the response codes here"
          nullable: true
        status_message:
          type: string
          description: "general informational message\nyou can find the full list of general informational messages here"
          nullable: true
        time:
          type: string
          description: 'total execution time, seconds'
          nullable: true
        cost:
          type: number
          description: 'total tasks cost, USD'
          format: double
          nullable: true
        tasks_count:
          type: integer
          description: the number of tasks in the tasks array
          format: int64
          nullable: true
        tasks_error:
          type: integer
          description: the number of tasks in the tasks array returned with an error
          format: int64
          nullable: true
    DomainAnalyticsTechnologiesDomainsByTechnologyLiveResponseInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseInfo'
      - type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainsByTechnologyLiveTaskInfo'
              nullable: true
            description: array of tasks
            nullable: true
    DomainAnalyticsTechnologiesDomainsByTechnologyLiveTaskInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseTaskInfo'
      - type: object
        properties:
          result:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainsByTechnologyLiveResultInfo'
              nullable: true
            description: array of results
            nullable: true
    DomainAnalyticsTechnologiesDomainsByTechnologyLiveResultInfo:
      type: object
      properties:
        total_count:
          type: integer
          description: total number of relevant items in the database
          format: int64
          nullable: true
        items_count:
          type: integer
          description: number of items in the results array
          format: int64
          nullable: true
        offset:
          type: integer
          description: specified offset value
          nullable: true
        offset_token:
          type: string
          description: "token for subsequent requests\nby specifying the unique offset_token when setting a new task, you
            will get the subsequent results of the initial task;\noffset_token values are unique for each subsequent task"
          nullable: true
        items:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/DomainAnalyticsTechnologiesDomainsByLiveItem'
            nullable: true
          description: items array
          nullable: true
    DomainAnalyticsTechnologiesDomainsByLiveItem:
      type: object
      properties:
        type:
          type: string
          description: type of element
          nullable: true
        domain:
          type: string
          description: specified domain name
          nullable: true
        title:
          type: string
          description: domain meta title
          nullable: true
        description:
          type: string
          description: domain meta description
          nullable: true
        meta_keywords:
          type: array
          items:
            type: string
            nullable: true
          description: domain meta keywords
          nullable: true
        domain_rank:
          type: integer
          description: "backlink rank of the target domain\nlearn more about the metric and how it is calculated in this help
            center article"
          nullable: true
        last_visited:
          type: string
          description: "most recent date when our crawler visited the domain\nin the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”\n\
            example:\n2022-10-10 12:57:46 +00:00"
          nullable: true
        country_iso_code:
          type: string
          description: "domain ISO code\nISO code of the country that target domain is determined to belong to"
          nullable: true
        language_code:
          type: string
          description: "domain language\ncode of the language that target domain is determined to be associated with"
          nullable: true
        content_language_code:
          type: string
          description: "content language\ncode of the language that content on the target domain is written with"
          nullable: true
        phone_numbers:
          type: array
          items:
            type: string
            nullable: true
          description: "phone numbers of the target\ncontact phone numbers indicated on the target website"
          nullable: true
        emails:
          type: array
          items:
            type: string
            nullable: true
          description: "emails of the target\nemails indicated on the target website"
          nullable: true
        social_graph_urls:
          type: array
          items:
            type: string
            nullable: true
          description: "social media links and handles\nsocial media URLs detected in the social graphs of the target website"
          nullable: true
        technologies:
          type: object
          oneOf:
          - $ref: '#/components/schemas/TechnologiesInfo'
          description: "technologies used by target domain\ncontains objects with the names of technologies used on the website;\n\
            to get a full list of technologies and their structure, refer to the technologies endpoint"
          nullable: true
      description: items array
    TechnologiesInfo:
      type: object
      properties:
        add_ons:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        analytics:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        web_development:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        security:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        business_tools:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        sales:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        other:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        user_generated_content:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        booking:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        privacy:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        servers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        location:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        content:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        media:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        marketing:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        communication:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
        utilities:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              nullable: true
            nullable: true
          nullable: true
    DomainAnalyticsTechnologiesTechnologiesSummaryLiveRequestInfo:
      type: object
      properties:
        technology_paths:
          type: array
          items:
            type: string
          description: "target technology paths\nrequired field if you don’t specify groups, technologies and categories\n\
            each technology path should be specified as a separate object containing “path” and “name”, where “path” is specified
            as “$group_id.$category_id” and “name” – as the name of the target technology;\neach object with a technology
            path should be separated with a comma\nyou can find the full list of technology group ids, category ids and technology
            names on this page\nnote: you can specify up to 10 technology paths in this array\nexample:\n[{\"path\": \"content.cms\"\
            ,\"name\": \"wordpress\"}, {\"path\": \"marketing.crm\",\"name\": \"salesforce\"}]"
          nullable: true
        groups:
          type: array
          items:
            type: string
          description: "ids of the target technology groups\nrequired field if you don’t specify technologies, technology_paths,
            categories, or keywords\nyou can find the full list of technology group ids on this page\nnote: you can specify
            up to 10 technology groups in this array\nexample:\n[\"sales\", \"marketing\"]"
          nullable: true
        categories:
          type: array
          items:
            type: string
          description: "ids of the target technology categories\nrequired field if you don’t specify groups, technology_paths,
            technologies, or keywords\nyou can find the full list of technology category ids on this page\nnote: you can specify
            up to 10 technology categories in this array\nexample:\n[\"payment_processors\",\"crm\"]"
          nullable: true
        technologies:
          type: array
          items:
            type: string
          description: "target technologies\nrequired field if you don’t specify groups, technology_paths, categories, or
            keywords\nyou can find the full list of technologies you can specify here on this page\nnote: you can specify
            up to 10 technologies in this array\nexample:\n[\"Google Pay\",\"Salesforce\"]"
          nullable: true
        keywords:
          type: array
          items:
            type: string
          description: "target keywords in the domain’s title, description or meta keywords\nrequired field if you don’t specify
            groups, technology_paths, categories, or technologies\nyou can specify the maximum of 10 keywords;\nUTF-8 encoding;\n\
            example:\n[\"seo\",\"software\"]\nlearn more about rules and limitations of keyword and keywords fields in DataForSEO
            APIs in this Help Center article"
          nullable: true
        mode:
          type: string
          description: "search mode\noptional field\npossible search mode types:\nas_is – search for results exactly matching
            the specified group ids, category ids, or technology names\nentry – search for results matching a part of the
            specified group ids, category ids, or technology names\ndefault value: as_is"
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: "array of results filtering parameters\noptional field\nyou can add several filters at once (8 filters
            maximum)\nyou should set a logical operator and, or between the conditions\nthe following operators are supported:\n\
            <, <=, >, >=, =, <>, in, not_in, like,not_like\nyou can use the % operator with like and not_like to match any
            string of zero or more characters\nyou can use the following parameters to filter the results: domain_rank, last_visited,
            country_iso_code, language_code, content_language_code\nexample:\n[[\"country_iso_code\",\"=\",\"US\"],\n\"and\"\
            ,\n[\"domain_rank\",\">\",800]]\nfor more information about filters, please refer to Domain Analytics Technologies
            API – Filters"
          nullable: true
        internal_list_limit:
          type: integer
          description: "maximum number of elements within internal arrays\noptional field\nyou can use this field to limit
            the number of elements within the following arrays:\ncountries, languages, content_languages, keywords\ndefault
            value: 10\nminimum value: 1\nmaximum value: 10000"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - mode: entry
        technologies:
        - Ngi
        keywords:
        - WordPress
        filters:
        - - country_iso_code
          - =
          - US
        - and
        - - domain_rank
          - '>'
          - 800
