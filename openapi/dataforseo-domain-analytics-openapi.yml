            <, <=, >, >=, =, <>, in, not_in, like, not_like\nyou can use the % operator with like and not_like to match any
            string of zero or more characters\nexample:\n[\"country_iso_code\",\"=\",\"US\"]\n[[\"country_iso_code\",\"=\"\
            ,\"US\"],\n\"and\",\n[\"domain_rank\",\">\",100]]\n[[\"domain_rank\",\">\",100],\n\"and\",\n[[\"country_iso_code\"\
            ,\"=\",\"US\"],\"or\",[\"country_iso_code\",\"=\",\"CA\"]]]\nfor more information about filters, please refer
            to Domain Analytics Technologies API – Filters"
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: "results sorting rules\noptional field\navailable fields:\ndomain_rank, domain, last_visited, country_iso_code,
            language_code, content_language_code\npossible sorting types:\nasc – results will be sorted in the ascending order\n\
            desc – results will be sorted in the descending order\nyou should use a comma to set up a sorting type\nexample:\n\
            [\"last_visited,desc\"]\ndefault rule:\n[\"domain_rank,desc\"]\nnote that you can set no more than three sorting
            rules in a single request\nyou should use a comma to separate several sorting rules\nexample:\n[\"last_visited,desc\"\
            ,\"domain_rank,desc\"]"
