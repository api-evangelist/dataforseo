          type: array
          items:
            type: string
          description: "results sorting rules\noptional field\nyou can use the following values to sort the results: groups_count,
            categories_count, technologies_count\npossible sorting types:\nasc – results will be sorted in the ascending order\n\
            desc – results will be sorted in the descending order\nyou should use a comma to set up a sorting type\nexample:\n\
            [\"groups_count,desc\"]\nnote that you can set no more than three sorting rules in a single request\nyou should
            use a comma to separate several sorting rules\nexample:\n[\"groups_count,desc\",\"technologies_count,desc\"]\n\
            default value:\n[\"groups_count,desc\",\"categories_count,desc\",\"technologies_count,desc\"]"
          nullable: true
        internal_groups_list_limit:
          type: integer
          description: "maximum number of returned technology groups\noptional field\nyou can use this field to limit the
            number of items with identical \"group\" in the results\ndefault value: 5\nminimum value: 1\nmaximum value: 10000"
          nullable: true
        internal_categories_list_limit:
          type: integer
          description: "maximum number of returned technology categories within the same group\noptional field\nyou can use
            this field to limit the number of items with identical \"category\" in the results\ndefault value: 5\nminimum
            value: 1\nmaximum value: 10000"
          nullable: true
        internal_technologies_list_limit:
          type: integer
          description: "maximum number of returned technologies within the same category\noptional field\nyou can use this
            field to limit the number of items with identical \"technology\" in the results\ndefault value: 10\nminimum value:
            1\nmaximum value: 10000"
          nullable: true
        internal_list_limit:
          type: integer
          description: "maximum number of items with identical \"category\", \"group\", and \"technology\"\noptional field\n\
            if you use this field, the values specified in internal_groups_list_limit, internal_categories_list_limit and
            internal_technologies_list_limit will be ignored;\nyou can use this field to limit the number of items with identical
            \"category\", \"group\", or \"technology\"\ndefault value: 10\nminimum value: 1\nmaximum value: 10000"
          nullable: true
        limit:
          type: integer
          description: "the maximum number of returned technologies\noptional field\ndefault value: 100\nmaximum value: 10000"
          nullable: true
        offset:
          type: integer
          description: "offset in the results array of returned domains\noptional field\ndefault value: 0\nmaximum value:
            9999\nif you specify the 10 value, the first ten technologies in the results array will be omitted and the data
            will be provided for the successive technologies"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
