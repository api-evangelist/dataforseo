      properties:
        rating_type:
          type: string
          description: "the type of rating\nhere you can find the following elements: Max5, Percents, CustomMax"
          nullable: true
        value:
          type: number
          description: the value of the rating
          format: double
          nullable: true
        votes_count:
          type: integer
          description: the amount of feedback
          format: int64
          nullable: true
        rating_max:
          type: integer
          description: the maximum value for a rating_type
          nullable: true
    AppStoreReviewsSearch:
      type: object
      properties:
        type:
          type: string
          description: type of element
          nullable: true
        rank_group:
          type: integer
          description: "position within a group of elements with identical type values\npositions of elements with different
            type values are omitted from rank_group"
          nullable: true
        rank_absolute:
          type: integer
          description: "absolute rank among all the listed reviews\nabsolute position among all reviews on the list"
          nullable: true
        position:
          type: string
          description: "the alignment of the review in SERP\ncan take the following values: left"
          nullable: true
