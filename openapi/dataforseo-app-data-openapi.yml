openapi: 3.0.1
info:
  title: DataForSEO AppData API
  description: DataForSEO API is the starting point on your journey towards building powerful SEO software. With 
    DataForSEO you can get all the data you need to build an efficient application while also saving your time and 
    budget. DataForSEO API is using the REST technology for interchanging data between your application and our service.
    The data exchange is made through the widely used HTTP protocol, which allows applying our API to almost all 
    programming languages.
  version: 1.0.0
servers:
- url: https://api.dataforseo.com
- url: https://sandbox.dataforseo.com
paths:
  /v3/app_data/id_list:
    post:
      tags:
      - AppData
      description: "This endpoint is designed to provide you with a list of IDs and metadata for all App Data tasks created
        within the specified time period, including both successful and uncompleted tasks.\nfor more info please visit 'https://docs.dataforseo.com/v3/app_data/id_list/?bash'"
      operationId: AppDataIdList
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/AppDataIdListRequestInfo'
                nullable: true
              example:
              - datetime_from: '2026-04-12 04:39:39 +00:00'
                datetime_to: '2026-04-14 04:39:39 +00:00'
                limit: 100
                offset: 0
                sort: desc
                include_metadata: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/AppDataIdListResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/app_data/errors:
    post:
      tags:
      - AppData
      description: "By calling this endpoint you will receive information about the App Data API tasks that returned an error
        within the past 7 days.\nfor more info please visit 'https://docs.dataforseo.com/v3/app_data/errors/?bash'"
      operationId: AppDataErrors
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/AppDataErrorsRequestInfo'
                nullable: true
              example:
              - limit: 10
                offset: 0
                filtered_function: pingback_url
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/AppDataErrorsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/app_data/google/categories:
    get:
      tags:
      - AppData
      description: "This endpoint will provide you with a full list of app categories available on Google Play.\nfor more
        info please visit 'https://docs.dataforseo.com/v3/app_data/google/categories/?bash'"
      operationId: GoogleCategories
      responses:
