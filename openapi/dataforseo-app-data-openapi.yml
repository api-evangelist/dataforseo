    AppDataGoogleAppListTaskPostRequestInfo:
      type: object
      properties:
        app_collection:
          type: string
          description: "app collection\nrequired field\napp collection on Google Play from which apps will be collected;\n\
            you can specify the following values:\nfeatured, topselling_paid, topselling_free, topselling_new_free, topselling_new_paid,
            topgrossing, movers_shakers\nNote: if featured is selected, the app_category parameter cannot be used"
        location_name:
          type: string
          description: "full name of search engine location\nrequired field if you don’t specify location_code\nif you use
            this field, you don’t need to specify location_code\nyou can receive the list of available locations of the search
            engine with their location_name by making a separate request to https://api.dataforseo.com/v3/app_data/google/locations\n\
            example:\nWest Los Angeles,California,United States"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\nrequired field if you don’t specify location_name\nif you use this field,
            you don’t need to specify location_name\nyou can receive the list of available locations of the search engine
            with their location_code by making a separate request to https://api.dataforseo.com/v3/app_data/google/locations\n\
            example:\n9061121"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\nrequired field if language_code is not specified\nif you use
            this field, you don’t need to specify language_code\nyou can receive the list of available languages with language_name
            by making a separate request to https://api.dataforseo.com/v3/app_data/google/languages\nexample:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\nrequired field if language_name is not specified\nif you use this field,
            you don’t need to specify language_name\nyou can receive the list of available languages with their language_code by
            making a separate request to https://api.dataforseo.com/v3/app_data/google/languages\nexample:\nen"
          nullable: true
        priority:
          type: integer
          description: "task priority\noptional field\ncan take the following values:\n1 – normal execution priority (set
            by default)\n2 – high execution priority\nYou will be additionally charged for the tasks with high execution priority.\n\
            The cost can be calculated on the Pricing page."
          nullable: true
        depth:
          type: integer
          description: "parsing depth\noptional field\nnumber of apps to be returned in the API response;\nwe strongly recommend
            setting the parsing depth in the multiples of 100, because our system processes 100 results in a row;\ndefault
            value: 100;\nmaximum value: 200;\nYour account will be billed per each SERP containing up to 100 results;\nSetting
            depth above 100 may result in additional charges if the search engine returns more than 100 results;\nThe cost
            can be calculated on the Pricing page."
          nullable: true
        app_category:
          type: string
          description: "application category on Google Play\noptional field\nyou can filter the results by app category;\n\
            example:\nfamily;\nyou can receive the full list of available categories by making a separate request to https://api.dataforseo.com/v3/app_data/google/categories\n\
            Note: app_category cannot be used if app_collection parameter is set to featured"
          nullable: true
        age_rating:
          type: string
          description: "filter results by age rating\noptional field\nyou can use this field to filter the results by age
            rating;\npossible types of filtering:\nages_up_to_5 — return apps approved for children up to 5 years old;\nages_6_8
            — return apps approved for children from 6 to 8 years old;\nages_9_12 — return apps approved for children from
            9 to 12 years old;\nby default, the API returns apps for all ages;\nNote: this filter works only in conjunction
            with the \"category\": \"family\" parameter"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
        postback_url:
          type: string
          description: "URL for sending task results\noptional field\nonce the task is completed, we will send a POST request
            with its results compressed in the gzip format to the postback_url you specified\nyou can use the ‘$id’ string
            as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the
            request.\nexample:\nhttp://your-server.com/postbackscript?id=$id\nhttp://your-server.com/postbackscript?id=$id&tag=$tag\n\
            Note: special characters in postback_url will be urlencoded;\ni.a., the # character will be encoded into %23"
          nullable: true
        postback_data:
          type: string
          description: "postback_url datatype\nrequired field if you specify postback_url\ncorresponds to the datatype that
            will be sent to your server\npossible values:\nadvanced, html"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified\nyou can use the ‘$id’ string as a $id variable and ‘$tag’ as
            urlencoded $tag variable. We will set the necessary values before sending the request.\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23"
          nullable: true
      example:
      - app_collection: topselling_free
        location_code: 2840
        language_code: en
        depth: 100
