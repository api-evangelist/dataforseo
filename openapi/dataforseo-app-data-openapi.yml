          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/AppDataGoogleAppSearchesTaskPostResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/app_data/google/app_searches/tasks_ready:
