              nullable: true
            description: array of results
            nullable: true
    AppDataAppleAppReviewsTaskGetAdvancedResultInfo:
      type: object
      properties:
        app_id:
          type: string
          description: application id received in a POST array
          nullable: true
        type:
          type: string
          description: type of element
          nullable: true
        se_domain:
          type: string
          description: search engine domain in a POST array
          nullable: true
        location_code:
          type: integer
          description: location code in a POST array
          nullable: true
        language_code:
          type: string
          description: language code in a POST array
          nullable: true
        check_url:
          type: string
          description: "direct URL to search engine results\nyou can use it to make sure that we provided accurate results"
          nullable: true
        datetime:
          type: string
          description: "date and time when the result was received\nin the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”\nexample:\n\
            2019-11-15 12:57:46 +00:00"
          nullable: true
        title:
          type: string
          description: "title of the app\ntitle of the application for which the reviews are collected"
          nullable: true
        rating:
          type: object
          oneOf:
          - $ref: '#/components/schemas/RatingInfo'
          description: "rating of the app\nrating of the application for which the reviews are collected"
          nullable: true
        reviews_count:
          type: integer
          description: "the total number of reviews\nin this case, the value will be null as App Store does not indicate the
            total number of app reviews"
          format: int64
          nullable: true
        items_count:
          type: integer
          description: "the number of reviews items in the results array\nyou can get more results by using the depth parameter
            when setting a task"
          format: int64
          nullable: true
        items:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/AppStoreReviewsSearch'
            nullable: true
          description: found reviews
          nullable: true
