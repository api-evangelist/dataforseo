    AppDataAppleAppListTaskPostRequestInfo:
      type: object
      properties:
        app_collection:
          type: string
          description: "app collection\nrequired field\napp collection on App Store from which apps will be collected;\nyou
            can specify the following values:\ntop_free_ios, top_paid_ios, top_grossing_ios, new_ios, new_free_ios, new_paid_ios"
        location_name:
          type: string
          description: "full name of search engine location\nrequired field if you don’t specify location_code\nif you use
            this field, you don’t need to specify location_code\nyou can receive the list of available locations of the search
            engine with their location_name by making a separate request to https://api.dataforseo.com/v3/app_data/apple/locations\n\
            example:\nWest Los Angeles,California,United States"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\nrequired field if you don’t specify location_name\nif you use this field,
            you don’t need to specify location_name\nyou can receive the list of available locations of the search engine
            with their location_code by making a separate request to https://api.dataforseo.com/v3/app_data/apple/locations\n\
            example:\n9061121"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\nrequired field if you don’t specify language_code\nif you use
            this field, you don’t need to specify language_code\nyou can receive the list of available languages with language_name
            by making a separate request to https://api.dataforseo.com/v3/app_data/apple/languages\nexample:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\nrequired field if you don’t specify language_name\nif you use this field,
            you don’t need to specify language_name\nyou can receive the list of available languages with their language_code by
            making a separate request to https://api.dataforseo.com/v3/app_data/apple/languages\nexample:\nen"
          nullable: true
        priority:
          type: integer
          description: "task priority\noptional field\ncan take the following values:\n1 – normal execution priority (set
            by default)\n2 – high execution priority\nYou will be additionally charged for the tasks with high execution priority.\n\
            The cost can be calculated on the Pricing page."
          nullable: true
        depth:
          type: integer
          description: "parsing depth\noptional field\nnumber of apps to be returned from the App Store SERP;\nwe strongly
            recommend setting the parsing depth in the multiples of 100, because our system processes 100 results in a row;\n\
            default value: 100\nmaximum value: 1000\nYour account will be billed per each SERP containing up to 100 results;\n\
            Setting depth above 100 may result in additional charges if the search engine returns more than 100 results;\n\
            The cost can be calculated on the Pricing page."
          nullable: true
        app_category:
          type: string
          description: "application category on the App Store\noptional field\nyou can filter the results by app category;\n\
            example:\nlifestyle;\nyou can review the full list of available categories here or by making a separate request
            to https://api.dataforseo.com/v3/app_data/apple/categories"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
        postback_url:
          type: string
          description: "URL for sending task results\noptional field\nonce the task is completed, we will send a POST request
            with its results compressed in the gzip format to the postback_url you specified\nyou can use the ‘$id’ string
            as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the
            request.\nexample:\nhttp://your-server.com/postbackscript?id=$id\nhttp://your-server.com/postbackscript?id=$id&tag=$tag\n\
            Note: special characters in postback_url will be urlencoded;\ni.a., the # character will be encoded into %23\n\
            learn more on our Help Center"
          nullable: true
        postback_data:
          type: string
          description: "postback_url datatype\nrequired field if you specify postback_url\ncorresponds to the datatype that
            will be sent to your server\npossible values:\nadvanced"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified\nyou can use the ‘$id’ string as a $id variable and ‘$tag’ as
            urlencoded $tag variable. We will set the necessary values before sending the request.\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23\nlearn more on our Help Center"
          nullable: true
      example:
      - app_collection: top_free_ios
        location_code: 2840
        language_code: en
        depth: 200
        app_category: games
