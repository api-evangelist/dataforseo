        more info please visit 'https://docs.dataforseo.com/v3/app_data/google/locations/?bash'"
      operationId: AppDataGoogleLocationsCountry
      parameters:
      - name: country
        in: path
        description: "country ISO code\noptional field\nspecify the ISO code if you want to filter the list of locations by
          country\nexample:\nus"
        required: true
        schema:
          type: string
          nullable: true
        example: us
      responses:
