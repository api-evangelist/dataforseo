        for more info please visit ''https://docs.dataforseo.com/v3/business_data/tripadvisor/reviews/tasks_ready/?bash'''
      operationId: TripadvisorReviewsTasksReady
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataTripadvisorReviewsTasksReadyResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/business_data/tripadvisor/reviews/task_get/{id}:
    get:
      tags:
      - BusinessData
      description: 'This endpoint provides feedback data on businesses listed on the Tripadvisor platform, including their locations, ratings, review content and count. The results are specific to the URL path indicated in the POST request.

        for more info please visit ''https://docs.dataforseo.com/v3/business_data/tripadvisor/reviews/task_get/?bash'''
      operationId: TripadvisorReviewsTaskGet
      parameters:
      - name: id
        in: path
        description: 'task identifier

          unique task identifier in our system in the UUID format

          you will be able to use it within 30 days to request the results of the task at any time'
        required: true
        schema:
          type: string
        example: 00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataTripadvisorReviewsTaskGetResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/business_data/social_media/pinterest/live:
    post:
      tags:
      - BusinessData
      description: 'Social Media Pinterest API will provide you with data on pins made from the specified URLs. Pins on Pinterest correspond to content saves. For each specified page URL, you will get the number of content saves to Pinterest made using the Pinterest Save Button placed on that page.

        for more info please visit ''https://docs.dataforseo.com/v3/business_data/social_media/pinterest/live/?bash'''
      operationId: SocialMediaPinterestLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataSocialMediaPinterestLiveRequestInfo'
                nullable: true
              example:
              - targets:
                - https://www.simplyrecipes.com/recipes/grilled_salmon_with_cucumber_mango_salsa/
                - https://tasty.co/recipe/classic-lasagna
                - https://www.allrecipes.com/recipe/255263/sicilian-roasted-chicken/
                tag: some_string_123
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataSocialMediaPinterestLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/business_data/social_media/reddit/live:
    post:
      tags:
      - BusinessData
      description: 'Social Media Reddit API provides information for each share of the target webpage on Reddit. For each specified Reddit URL, you will get subreddit and author names, permalink, title, and the number of subreddit members.

