            off, the location_name won’t be appended to the keyword during search\nlearn more about this parameter on our
            Help Center"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\nrequired field if you don’t specify language_code\nif you use
            this field, you don’t need to specify language_code\nyou can receive the list of available languages with language_name
            by making a separate request to https://api.dataforseo.com/v3/business_data/google/languages\nexample:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\nrequired field if you don’t specify language_name\nif you use this field,
            you don’t need to specify language_name\nyou can receive the list of available languages with their language_code by
            making a separate request to https://api.dataforseo.com/v3/business_data/google/languages\nexample:\nen"
          nullable: true
        depth:
          type: integer
          description: "parsing depth\noptional field\nnumber of results in Google Hotels\ndefault value: 20 organic results\n\
            max value: 140\nNote: your account will be billed per each 20 organic results regardless of paid listings in the
            response;\nthus, setting a depth above 20 may result in additional charges if Google Hotels return more than 20
            results;\nif the specified depth is higher than the number of results in the response, the difference will be
            refunded automatically to your account balance"
          nullable: true
        check_in:
          type: string
          description: "check-in date\noptional field\nif you don’t specify this field, tomorrow’s date will be used by default;\n\
            date format: \"yyyy-mm-dd\"\nexample:\n\"2019-01-15\"\nNote: the value cannot precede the today’s date"
          nullable: true
        check_out:
          type: string
          description: "check-out date\noptional field\nif you don’t specify this field, our system will apply the date of
            two days from now by default;\ndate format: \"yyyy-mm-dd\"\nexample:\n\"2019-01-15\"\nNote: the value cannot be
            less than or equal to check_in;\nthe range between check_in and check_out values cannot exceed 30 days"
          nullable: true
        currency:
          type: string
          description: "currency\noptional field\nexample:\n\"USD\""
          nullable: true
        adults:
          type: integer
          description: "number of adults\noptional field\nif you don’t specify this field, the default value of 2 will be
            applied;\nnote that you can specify up to 6 persons including both adults and children\nexample:\n1"
          nullable: true
        children:
          type: array
          items:
            type: string
          description: "number and age of children\noptional field\nif you don’t specify this field, no children will be included
            in the search;\nage of child can be from 0 to 17;\nnote that you can specify up to 6 persons including both adults
            and children\nset the following value if you want to include one 14-year-old child:\n[14]\nset the following value
            if you want to include one 13-year-old child and one 8-year-old child:\n[13,8]"
          nullable: true
        stars:
          type: array
          items:
            type: string
          description: "hotel stars\noptional field\nset this field to [5] if you want to get the list of 5-star hotels only\n\
            example:\n[3,4,5]"
          nullable: true
        min_rating:
          type: number
          description: "minimum rating\noptional field\nyou can use this field to specify guest rating higher than a certain
            value\nexample:\n2.5"
          nullable: true
        sort_by:
          type: string
          description: "results sorting parameters\noptional field\nyou can use this field to sort the results\npossible types
            of sorting:\nrelevance – sort by most relevant\nlowest_price – sort by the lowest price\nhighest_rating – sort
            by highest rating\nmost_reviewed – sort by most reviewed\ndefault value: relevance"
          nullable: true
        min_price:
          type: integer
          description: "minimum price per night\noptional field\nthe currency of this value depends on the currency field\n\
            example:\n100"
          nullable: true
        max_price:
          type: integer
          description: "maximum price per night\noptional field\nthe currency of this value depends on the currency field\n\
            example:\n600"
          nullable: true
        free_cancellation:
          type: boolean
          description: "hotels with a free cancellation\noptional field\nset this field to true if you want to get the list
            of hotels with free cancellation of reservations\ndefault value: false"
          nullable: true
        is_vacation_rentals:
          type: boolean
          description: "search for vacation rentals\noptional field\nset this field to true if you want to get the list of
            vacation rentals instead of hotels\ndefault value: false"
          nullable: true
        amenities:
          type: array
          items:
            type: string
          description: "hotel amenities\noptional field\nyou can use this field to specify different hotel amenities\nexample:\n\
            \  [\n            \"free_parking\",\n            \"pets_allowed\"\n        ]\n\npossible values:\n\"air_conditioning\"\
            ,\n\"all_inclusive_available\",\n\"bar\",\n\"free_breakfast\",\n\"fitness_center\",\n\"kid_friendly\",\n\"free_parking\"\
            ,\n\"pets_allowed\",\n\"pool\",\n\"restaurant\",\n\"room_service\",\n\"spa\",\n\"free_wifi\",\n\"parking\",\n\"\
            indoor_pool\",\n\"outdoor_pool\",\n\"wheelchair_accessible\",\n\"beach_access\""
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
        postback_url:
          type: string
          description: "URL for sending task results\noptional field\nonce the task is completed, we will send a POST request
            with its results compressed in the gzip format to the postback_url you specified\nyou can use the ‘$id’ string
            as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the
            request.\nexample:\nhttp://your-server.com/postbackscript?id=$id\nhttp://your-server.com/postbackscript?id=$id&tag=$tag\n\
            Note: special characters in postback_url will be urlencoded;\ni.a., the # character will be encoded into %23\n\
            learn more on our Help Center"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified\nyou can use the ‘$id’ string as a $id variable and ‘$tag’ as
            urlencoded $tag variable. We will set the necessary values before sending the request.\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23\nlearn more on our Help Center"
          nullable: true
      example:
      - language_code: en
        location_name: 'New York,New York,United States'
        keyword: cheap hotel
        check_in: '2026-05-15'
        check_out: '2026-05-16'
        currency: USD
        adults: 2
        children:
        - 14
        sort_by: highest_rating
        priority: 2
        tag: example
