    BusinessDataGoogleReviewsTaskPostRequestInfo:
      type: object
      properties:
        keyword:
          type: string
          description: "keyword\nrequired field if you don’t specify cid or place_id\nthe keyword you specify should indicate
            the name of the local establishment;\nyou can specify up to 700 characters in the keyword filed;\nall %## will
            be decoded (plus character ‘+’ will be decoded to a space character)\nif you need to use the “%” character for
            your keyword, please specify it as “%25”;\nif this field contains such parameters as ‘allinanchor:’, ‘allintext:’,
            ‘allintitle:’, ‘allinurl:’, ‘define:’, ‘filetype:’, ‘id:’, ‘inanchor:’, ‘info:’, ‘intext:’, ‘intitle:’, ‘inurl:’,
            ‘link:’, ‘related:’, ‘site:’, the charge per task will be multiplied by 5\nNote: queries containing the ‘cache:’
            parameter are not supported and will return a validation error\nlearn more about rules and limitations of keyword
            and keywords fields in DataForSEO APIs in this Help Center article"
          nullable: true
        cid:
          type: string
          description: "unique, google-defined id of the business entity\nrequired field if you don’t specify keyword or place_id\n\
            example:\n194604053573767737\nlearn more about the identifier in this help center article"
          nullable: true
        place_id:
          type: string
          description: "identifier of the business entity in Google Maps\nrequired field if you don’t specify keyword or cid\n\
            example:\nGhIJQWDl0CIeQUARxks3icF8U8A\nlearn more about the identifier in this help center article"
          nullable: true
        priority:
          type: integer
          description: "task priority\noptional field\ncan take the following values:\n1 – normal execution priority (set
            by default)\n2 – high execution priority\nYou will be additionally charged for the tasks with high execution priority.\n\
            The cost can be calculated on the Pricing page."
          nullable: true
        location_name:
          type: string
          description: "full name of search engine location\nrequired field if you don’t specify location_code or location_coordinate\n\
            if you use this field, you don’t need to specify location_code or location_coordinate\nyou can receive the list
            of available locations with location_name by making a separate request to the https://api.dataforseo.com/v3/business_data/google/locations\n\
            example:\nLondon,England,United Kingdom"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\nrequired field if you don’t specify location_name or location_coordinate\n\
            if you use this field, you don’t need to specify location_name or location_coordinate\nyou can receive the list
            of available locations with location_code by making a separate request to the https://api.dataforseo.com/v3/business_data/google/locations\n\
            example:\n2840"
          nullable: true
        location_coordinate:
          type: string
          description: "GPS coordinates of a location\nrequired field if you don’t specify location_name or location_code\n\
            if you use this field, you don’t need to specify location_name or location_code\nlocation_coordinate parameter
            should be specified in the “latitude,longitude,radius” format\nthe maximum number of decimal digits for “latitude”
            and “longitude”: 7\nthe minimum value for “radius”: 199.9\nexample:\n53.476225,-2.243572,200"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\nrequired field if you don’t specify language_code\nif you use
            this field, you don’t need to specify language_code\nyou can receive the list of available languages with language_name
            by making a separate request to the https://api.dataforseo.com/v3/business_data/google/languages\nexample:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\nrequired field if you don’t specify language_name\nif you use this field,
            you don’t need to specify language_name\nyou can receive the list of available languages with their language_code by
            making a separate request to the https://api.dataforseo.com/v3/business_data/google/languages\nexample:\nen"
          nullable: true
        depth:
          type: integer
          description: "parsing depth\noptional field\nnumber of reviews in SERP\nwe strongly recommend setting the parsing
            depth in the multiples of ten, because our systems processes ten reviews in a row\ndefault value: 10\nmaximum
            value: 4490\nYour account will be billed per each SERP containing up to 10 results;\nSetting depth above 10 may
            result in additional charges if the search engine returns more than 10 results;\nThe cost can be calculated on
            the Pricing page."
          nullable: true
        sort_by:
          type: string
          description: "results sorting parameters\noptional field\nyou can use this field to sort the results\npossible types
            of sorting:\nnewest – sort by newest first\nhighest_rating – sort by highest rating\nlowest_rating – sort by lowest
            rating\nrelevant – sort by relevance\ndefault value: relevant"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
        postback_url:
          type: string
          description: "URL for sending task results\noptional field\nonce the task is completed, we will send a POST request
            with its results compressed in the gzip format to the postback_url you specified\nyou can use the ‘$id’ string
            as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the
            request.\nexample:\nhttp://your-server.com/postbackscript?id=$id\nhttp://your-server.com/postbackscript?id=$id&tag=$tag\n\
            Note: special characters in postback_url will be urlencoded;\ni.a., the # character will be encoded into %23\n\
            learn more on our Help Center"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified\nyou can use the ‘$id’ string as a $id variable and ‘$tag’ as
            urlencoded $tag variable. We will set the necessary values before sending the request.\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23\nlearn more on our Help Center"
          nullable: true
      example:
      - location_name: 'London,England,United Kingdom'
        language_name: English
        keyword: hedonism wines
        depth: 50
        sort_by: highest_rating
