          description: "parsing depth\noptional field\nnumber of question rows in the result\ndefault value: 20\nmax value:
            700\nYour account will be billed per each SERP containing up to 20 results;\nSetting depth above 20 may result
            in additional charges if the search engine returns more than 20 results;\nIf the specified depth is higher than
