            \ \n\"place_topics\": {\n\"egg roll\": 48,\n\"birthday\": 33\n}"
          nullable: true
        rating:
          type: object
          oneOf:
          - $ref: '#/components/schemas/RatingInfo'
          description: "the element’s rating \nthe popularity rate based on reviews and displayed in SERP"
          nullable: true
        hotel_rating:
          type: string
          description: "hotel class rating\nclass ratings range between 1-5 stars, learn more\nif there is no hotel class
            rating information, the value will be null"
          nullable: true
        price_level:
          type: string
          description: "property price level\ncan take values: inexpensive, moderate, expensive, very_expensive\nif there
            is no price level information, the value will be null"
          nullable: true
        rating_distribution:
          type: object
          additionalProperties:
            type: integer
            format: Int64
            nullable: true
          description: "the distribution of ratings of the business entity\nthe object displays the number of 1-star to 5-star
            ratings, as reviewed by users"
          nullable: true
        people_also_search:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/PeopleAlsoSearch'
            nullable: true
          description: related business entities
          nullable: true
        work_time:
          type: object
          oneOf:
          - $ref: '#/components/schemas/BusinessWorkHoursInfo'
          description: "work time details\ninformation related to operational hours of the business entity"
          nullable: true
        popular_times:
          type: object
          description: "popular times\ninformation related to busy hours of the business entity"
          nullable: true
        local_business_links:
          type: object
          description: "available interactions with the business\nlist of options to interact with the business directly from
            search results"
          nullable: true
        is_directory_item:
          type: boolean
          description: "business establishment is a part of the directory\nindicates whether the business establishment is
            a part of the directory;\nif true, the item is a part of the larger directory of businesses with the same address
            (e.g., a mall or a business centre);\nnote: if the business establishment is a parent item in the directory, the
            value will be null"
          nullable: true
        directory:
          type: object
          description: "items of the directory\nincludes information about businesses that are located within the target business
            establishment and have the same address"
          nullable: true
    BusinessDataGoogleHotelInfoTaskPostRequestInfo:
      type: object
      properties:
        hotel_identifier:
          type: string
          description: "unique hotel identifier\nrequired field if you don’t specify keyword\nif you use this field, you don’t
            need to specify keyword\nunique identifier of a hotel entity in Google search;\nyou can obtain the value by making
            a request to Advanced Google SERP API (enclosed in the hotels_pack element of the response), or the Hotel Searches
            endpoint of Business Data API\nexample:\nChYIq6SB--i6p6cpGgovbS8wN2s5ODZfEAE"
          nullable: true
        keyword:
          type: string
          description: "keyword\nrequired field if you don’t specify hotel_identifier\nif you use this field, you don’t need
            to specify hotel_identifier\nthe keyword you specify should indicate the name of the hotel entity\nyou can specify
            up to 700 characters in the keyword filed\nall %## will be decoded (plus character ‘+’ will be decoded to a space
            character)\nif you need to use the “%” character for your keyword, please specify it as “%25”"
          nullable: true
        priority:
          type: integer
          description: "task priority\noptional field\ncan take the following values:\n1 – normal execution priority (set
            by default)\n2 – high execution priority\nYou will be additionally charged for the tasks with high execution priority.\n\
            The cost can be calculated on the Pricing page."
          nullable: true
        location_name:
          type: string
          description: "full name of search engine location\nrequired field if you don’t specify location_code or location_coordinate\n\
            if you use this field, you don’t need to specify location_code or location_coordinate\nyou can receive the list
            of available locations with location_name by making a separate request to https://api.dataforseo.com/v3/business_data/google/locations\n\
            example:\nLondon,England,United Kingdom"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\nrequired field if you don’t specify location_name or location_coordinate\n\
            if you use this field, you don’t need to specify location_name or location_coordinate\nyou can receive the list
            of available locations with location_code by making a separate request to the https://api.dataforseo.com/v3/business_data/google/locations\n\
            example:\n2840"
          nullable: true
        location_coordinate:
          type: string
          description: "GPS coordinates of a location\nrequired field if you don’t specify location_name or location_code\n\
            if you use this field, you don’t need to specify location_name or location_code\nlocation_coordinate parameter
            should be specified in the “latitude,longitude” format\nthe maximum number of decimal digits for “latitude” and
            “longitude”: 7\nNote: if the coordinates are used to set a location, the search will occur in the nearest settlement;\n\
            example:\n53.476225,-2.243572"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\nrequired field if you don’t specify language_code\nif you use
            this field, you don’t need to specify language_code\nyou can receive the list of available languages with language_name
            by making a separate request to https://api.dataforseo.com/v3/business_data/google/languages\nexample:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\nrequired field if you don’t specify language_name\nif you use this field,
            you don’t need to specify language_name\nyou can receive the list of available languages with their language_code by
            making a separate request to https://api.dataforseo.com/v3/business_data/google/languages\nexample:\nen"
          nullable: true
        check_in:
          type: string
          description: "check-in date\noptional field\nif you don’t specify this field, tomorrow’s date will be used by default;\n\
            the value must not be earlier than today’s date\ndate format: \"yyyy-mm-dd\"\nexample:\n\"2019-01-15\""
          nullable: true
        check_out:
          type: string
          description: "check-out date\noptional field\nif you don’t specify this field, our system will apply the date of
            two days from now by default;\nNote: the value cannot be less than or equal to check_in;\nthe range between check_in
            and check_out values cannot exceed 30 days\ndate format: \"yyyy-mm-dd\"\nexample:\n\"2019-01-15\""
          nullable: true
        currency:
          type: string
          description: "currency\noptional field\nexample:\n\"USD\""
          nullable: true
        adults:
          type: integer
          description: "number of adults\noptional field\nif you don’t specify this field, two adults will be used by default\n\
            example:\n1"
          nullable: true
        children:
          type: array
          items:
            type: string
          description: "number and age of children\noptional field\nif you don’t specify this field, no children will be included
            in the search;\nset the following value if you want to include one 14-years-old child:\n[14]\nset the following
            value if you want to include one 13-years-old child and one 8-years-old child:\n[13,8]"
          nullable: true
        load_prices_by_dates:
          type: boolean
          description: "load hotel stay prices by dates\noptional field\nif you specify this parameter with true, the response
            will include the prices_by_dates array with hotel stay prices divided by dates\nif you use this parameter, you
            will be charged double the base price for a request"
          nullable: true
        prices_start_date:
          type: string
          description: "start date to load prices by dates\noptional field\nto use this parameter, you must specify load_prices_by_dates
            with true\nif this parameter is not specified, the start date is set to check_in date\ndate format: yyyy-mm-dd\n\
            example:\n2025-05-20"
          nullable: true
        prices_end_date:
          type: string
          description: "end date to load prices by dates\noptional field\nto use this parameter, you must specify load_prices_by_dates
            with true\nif this parameter is not specified, you will get prices by date for the month\ndate format: yyyy-mm-dd\n\
            example:\n2025-05-21"
          nullable: true
        prices_date_range:
          type: string
          description: "predefined period for retrieving daily price data\noptional field\nto use this parameter, you must
            specify load_prices_by_dates with true\nif the prices_start_date is not specified, the start date is set to check_in
            date\npossible values: month, three_months, six_months, year\ndefault value: month"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255;\nyou can use this parameter
            to identify the task and match it with the result;\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
        postback_url:
          type: string
          description: "URL for sending task results\noptional field\nonce the task is completed, we will send a POST request
            with its results compressed in the gzip format to the postback_url you specified;\nyou can use the ‘$id’ string
            as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the
            request;\nexample:\nhttp://your-server.com/postbackscript?id=$id\nhttp://your-server.com/postbackscript?id=$id&tag=$tag\n\
            Note: special characters in postback_url will be urlencoded;\ni.a., the # character will be encoded into %23\n\
            learn more on our Help Center"
          nullable: true
        postback_data:
          type: string
          description: "postback_url datatype\nrequired field if you specify postback_url\ncorresponds to the datatype that
            will be sent to your server\npossible values:\nadvanced, html"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified;\nyou can use the ‘$id’ string as a $id variable and ‘$tag’
            as urlencoded $tag variable;\nwe will set the necessary values before sending the request;\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23\nlearn more on our Help Center"
          nullable: true
      example:
      - language_code: en
        location_name: 'New York,New York,United States'
        hotel_identifier: ChYIq6SB--i6p6cpGgovbS8wN2s5ODZfEAE
        tag: some_string_123
        postback_url: https://your-server.com/postbackscript.php
        postback_data: advanced
