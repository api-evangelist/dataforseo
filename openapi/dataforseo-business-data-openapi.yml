      description: "You will receive the list of locations by this API call. You can also download the full list of supported
        locations in the CSV format (last updated 2026-04-06).\nfor more info please visit 'https://docs.dataforseo.com/v3/business_data/business_listings/locations/?bash'"
      operationId: BusinessListingsLocations
