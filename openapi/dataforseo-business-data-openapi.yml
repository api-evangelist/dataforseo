openapi: 3.0.1
info:
  title: DataForSEO BusinessData API
  description: DataForSEO API is the starting point on your journey towards building powerful SEO software. With 
    DataForSEO you can get all the data you need to build an efficient application while also saving your time and 
    budget. DataForSEO API is using the REST technology for interchanging data between your application and our service.
    The data exchange is made through the widely used HTTP protocol, which allows applying our API to almost all 
    programming languages.
  version: 1.0.0
servers:
- url: https://api.dataforseo.com
- url: https://sandbox.dataforseo.com
paths:
  /v3/business_data/id_list:
    post:
      tags:
      - BusinessData
      description: "This endpoint is designed to provide you with a list of IDs and metadata for all Business Data tasks created
        within the specified time period, including both successful and uncompleted tasks.\nfor more info please visit 'https://docs.dataforseo.com/v3/business_data/id_list/?bash'"
      operationId: BusinessDataIdList
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataIdListRequestInfo'
                nullable: true
              example:
              - datetime_from: '2026-04-12 04:39:39 +00:00'
                datetime_to: '2026-04-14 04:39:39 +00:00'
                limit: 100
                offset: 0
                sort: desc
                include_metadata: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataIdListResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/business_data/errors:
    post:
      tags:
      - BusinessData
      description: "By calling this endpoint you will receive information about the Business Data API tasks that returned
        an error within the past 7 days.\nfor more info please visit 'https://docs.dataforseo.com/v3/business_data/errors/?bash'"
      operationId: BusinessDataErrors
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataErrorsRequestInfo'
                nullable: true
              example:
              - limit: 10
                offset: 0
                filtered_function: pingback_url
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataErrorsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/business_data/business_listings/locations:
    get:
      tags:
