            if you use this field, you don’t need to specify location_name or location_coordinate\nyou can receive the list
            of available locations with location_code by making a separate request to the https://api.dataforseo.com/v3/business_data/google/locations\n\
            example:\n2840"
          nullable: true
        location_coordinate:
          type: string
