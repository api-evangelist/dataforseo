  /v3/business_data/business_listings/search/live:
    post:
      tags:
      - BusinessData
      description: "Business Listings Search API provides results containing information about business entities listed on
        Google Maps in the specified categories. You will receive the address, contacts, rating, working hours, and other
        relevant data. The provided results are specific to the selected location (see the List of Locations) settings.\n\
        for more info please visit 'https://docs.dataforseo.com/v3/business_data/business_listings/search/live/?bash'"
      operationId: BusinessListingsSearchLive
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataBusinessListingsSearchLiveRequestInfo'
                nullable: true
              example:
              - categories:
                - pizza_restaurant
                description: pizza
                title: pizza
                is_claimed: true
                location_coordinate: '53.476225,-2.243572,10'
                order_by:
                - 'rating.value,desc'
                filters:
                - - rating.value
                  - '>'
                  - 3
                limit: 3
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/BusinessDataBusinessListingsSearchLiveResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/business_data/business_listings/categories_aggregation/live:
