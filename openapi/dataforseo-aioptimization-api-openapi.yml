          nullable: true
        language_name:
          type: string
          description: 'full name of search languageoptional fieldif you use this field, you don''t need to specify language_code;if you don''t specify this field, the language_code with en value will be used by default;you can receive the list of available languages of the search engine with their language_name by making a separate request to the https://api.dataforseo.com/v3/ai_optimization/llm_mentions/locations_and_languagesNote: chat_gpt data is available for English only'
          nullable: true
        language_code:
          type: string
          description: 'search language codeoptional fieldif you use this field, you don''t need to specify language_name;you can receive the list of available languages of the search engine with their language_code_by making a separate request to the https://api.dataforseo.com/v3/ai_optimization/llm_mentions/locations_and_languagesdefault value: enNote: chat_gpt data is available for en onlyn'
          nullable: true
        platform:
          type: string
          description: 'target platformoptional fieldpossible values:chat_gpt, googledefault value: googleNote: the data returned depends on the selected platformNote #2:chat_gpt data is available for the United States and English only'
          nullable: true
        filters:
          type: array
          items:
            type: object
            nullable: true
          description: array of results filtering parametersoptional fieldyou can add several filters at once (8 filters maximum)you should set a logical operator and, or between the conditionsthe following operators are supported:=, <>, in, not_in, like, not_like, ilike, not_ilike, match, not_matchyou can use the % operator with like and not_like to match any string of zero or more charactersexample:["ai_search_volume",">","1000"]The full list of possible filters is available here.
          nullable: true
        order_by:
          type: array
          items:
            type: string
          description: results sorting rulesoptional fieldyou can use the same values as in the filters array to sort the resultspossible sorting types:asc - results will be sorted in the ascending orderdesc - results will be sorted in the descending orderyou should use a comma to set up a sorting typeexample:["ai_search_volume,desc"]note that you can set no more than three sorting rules in a single requestyou should use a comma to separate several sorting rules
          nullable: true
        offset:
          type: integer
          description: 'offset in the results array of the returned mentions dataoptional fielddefault value: 0example: if you specify the 10 value, the first ten mentions objects in the results array will be omitted and the data will be provided for the successive objects;Note: the maximum value is 9,000, use the search_after_token if you would like to offset more results'
          nullable: true
        search_after_token:
          type: string
          description: 'token for subsequent requestsoptional fieldprovided in the identical filed of the response to each request;use this parameter to avoid timeouts while trying to obtain over 20,000 results in a single request;by specifying the unique search_after_token value from the response array, you will get the subsequent results of the initial task;search_after_token values are unique for each subsequent task ;Note: if the search_after_token is specified in the request, all other parameters should be identical to the previous request'
          nullable: true
        limit:
          type: integer
          description: 'the maximum number of returned objectsoptional fielddefault value: 100maximum value: 1000'
          nullable: true
        tag:
          type: string
          description: user-defined task identifieroptional fieldthe character limit is 255you can use this parameter to identify the task and match it with the resultyou will find the specified tag value in the data object of the response
          nullable: true
      example:
      - language_name: English
        location_code: 2840
        target:
        - domain: dataforseo.com
          search_filter: exclude
        - keyword: bmw
          search_scope:
          - answer
        platform: google
        filters:
        - - ai_search_volume
          - '>'
          - 1000
        order_by:
        - ai_search_volume,desc
        offset: 0
        limit: 3
