components:
  schemas:
    BaseResponseTaskInfo:
      properties:
        id:
          type: string
          description: 'task identifier

            unique task identifier in our system in the UUID format'
          nullable: true
        status_code:
          type: integer
          description: 'status code of the task

            generated by DataForSEO, can be within the following range: 10000-60000

            you can find the full list of the response codes here'
          nullable: true
        status_message:
          type: string
          description: 'informational message of the task

            you can find the full list of general informational messages here'
          nullable: true
        time:
          type: string
          description: execution time, seconds
          nullable: true
        cost:
          type: number
          description: total tasks cost, USD
          format: double
          nullable: true
        result_count:
          type: integer
          description: number of elements in the result array
          format: int64
          nullable: true
        path:
          type: array
          items:
            type: string
            nullable: true
          description: URL path
          nullable: true
        data:
          type: object
          additionalProperties:
            type: object
            nullable: true
          description: contains the same parameters that you specified in the POST request
          nullable: true
    AiOptimizationGeminiLlmScraperTasksReadyResponseInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseInfo'
      - type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/AiOptimizationGeminiLlmScraperTasksReadyTaskInfo'
              nullable: true
            description: array of tasks
            nullable: true
    AiOptimizationGeminiLlmResponsesLiveResultInfo:
      type: object
      properties:
        model_name:
          type: string
          description: name of the AI model used
          nullable: true
        input_tokens:
          type: integer
          description: number of tokens in the inputtotal count of tokens processed
          nullable: true
        output_tokens:
          type: integer
          description: number of tokens in the outputtotal count of tokens generated in the AI response
          nullable: true
        reasoning_tokens:
          type: integer
          description: number of reasoning tokenstotal count of tokens used to generate reasoning content
          nullable: true
        web_search:
          type: boolean
          description: indicates if web search was used
          nullable: true
        money_spent:
          type: number
          description: cost of AI tokens, USDthe price charged by the third-party AI model provider for according to its Pricing
          nullable: true
        datetime:
          type: string
          description: 'date and time when the result was receivedin the UTC format: “yyyy-mm-dd hh-mm-ss +00:00”example:2019-11-15 12:57:46 +00:00'
          nullable: true
        items:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/BaseAiOptimizationLlmResponseElementItem'
            nullable: true
          description: array of response itemscontains structured AI response data
          nullable: true
        fan_out_queries:
          type: array
          items:
            type: string
            nullable: true
          description: array of fan-out queriescontains related search queries derived from the main query to provide a more comprehensive response
          nullable: true
    AiOptimizationLlmMentionsSearchLiveResultInfo:
      type: object
      properties:
        total_count:
          type: integer
          description: total amount of results relevant the request
          format: int64
          nullable: true
        current_offset:
          type: integer
          description: the number of mentions objects that are omitted in the items array
          nullable: true
