    AiOptimizationClaudeLlmResponsesTaskPostRequestInfo:
      type: object
      properties:
        user_prompt:
          type: string
          description: prompt for the AI modelrequired fieldthe question or task you want to send to the AI model;you can specify up to 500 characters in the user_prompt field
        model_name:
          type: string
          description: name of the AI modelrequired fieldmodel_nameconsists of the actual model name and version name;if the basic model name is specified, its latest version will be set by default;for example, if claude-opus-4-0 is specified, the claude-opus-4-20250514 will be set as model_name automatically;you can receive the list of available LLM models by making a separate request to the https://api.dataforseo.com/v3/ai_optimization/claude/llm_responses/models
        max_output_tokens:
          type: integer
          description: 'maximum number of tokens in the AI responseoptional fieldminimum value: 1;maximum value: 4096;default value: 2048;Note: if web_search is set to true or the reasoning model is specified in the request, the output token count may exceed the specified max_output_tokens limitNote #2: if use_reasoning is set to true, the minimum value for max_output_tokens is 1025'
          nullable: true
        temperature:
          type: number
          description: 'randomness of the AI responseoptional fieldhigher values make output more diverse; lower values make output more focused;minimum value: 0maximum value: 1default value: 0.7Note: temperature cannot be used together with top_p in the same request'
          nullable: true
        top_p:
          type: number
          description: 'diversity of the AI responseoptional field controls diversity of the response by limiting token selection;minimum value: 0maximum value: 1 default value: nullNote: top_p cannot be used together with temperature in the same request'
          nullable: true
        web_search:
          type: boolean
          description: 'enable web search for current informationoptional fieldwhen enabled, the AI model can access and cite current web information;Note: refer to the Models endpoint for a list of models that support web_search; default value: false;The cost of the parameter can be calculated on the Pricing page'
          nullable: true
        force_web_search:
          type: boolean
          description: 'force AI agent to use web searchoptional fieldto enable this parameter, web_search must also be enabled;when enabled, the AI model is forced to access and cite current web information;default value: false;Note: even if the parameter is set to true, there is no guarantee web sources will be cited in the response'
          nullable: true
        web_search_country_iso_code:
          type: string
          description: 'ISO country code of the locationoptional fieldpossible values: ''AR'',''AT'',''AU'',''BE'',''BR'',''CA'',''CH'',''CL'',''CN'',''DE'',''DK'',''ES'',''FI'',''FR'',''GB'',''HK'',''ID'',''IN'',''IT'',''JP'',''KR'',''MX'',''MY'',''NL'',''NO'',''NZ'',''PH'',''PL'',''PT'',''RU'',''SA'',''SE'',''TR'',''TW'',''US'',''ZA'''
          nullable: true
        web_search_city:
          type: string
          description: 'city name of the locationoptional fieldNote: specify web_search_country_iso_code to use this parameter'
          nullable: true
        system_message:
          type: string
          description: instructions for the AI behaviouroptional fielddefines the AI's role, tone, or specific behavior;you can specify up to 500 characters in the system_message field
          nullable: true
        message_chain:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/LlmMessageChainItem'
            nullable: true
          description: 'conversation history

            optional field

            array of message objects representing previous conversation turns;

            each object must contain:

            role string with either user or ai role;

            message string with message content (max 500 characters);

            you can specify maximum of 10 message objects in the array;

            Note: for Perplexity models, messages must strictly alternate between user and AI roles (user → ai);

            example:

            "message_chain": [{"role":"user","message":"Hello, what’s up?"},{"role":"ai","message":"Hello! I’m doing well, thank you. How can I assist you today?"}]'
          nullable: true
        use_reasoning:
          type: boolean
          description: 'enable reasoning for the AI modeloptional fieldwhen enabled, the model will perform reasoning before generating a responserefer to the Models endpoint for a list of models that support reasoningdefault value: falseNote: if set to true, the minimum value for max_output_tokens is 1025Note #2: if set to true, force_web_search must be set to falseNote #3: if set to true, the temperature and top_p cannot be used'
          nullable: true
        tag:
          type: string
          description: user-defined task identifieroptional fieldthe character limit is 255you can use this parameter to identify the task and match it with the resultyou will find the specified tag value in the data object of the response
          nullable: true
        postback_url:
          type: string
          description: 'URL for sending task resultsoptional fieldonce the task is completed, we will send a POST request with its results compressed in the gzip format to the postback_url you specifiedyou can use the ‘$id’ string as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the request.example:http://your-server.com/postbackscript?id=$idhttp://your-server.com/postbackscript?id=$id&tag=$tagNote: special character in postback_url will be urlencoded;i.a., the # character will be encoded into %23learn more on our Help Center'
          nullable: true
        pingback_url:
          type: string
          description: 'notification URL of a completed taskoptional fieldwhen a task is completed we will notify you by GET request sent to the URL you have specifiedyou can use the ‘$id’ string as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the requestexample:http://your-server.com/pingscript?id=$idhttp://your-server.com/pingscript?id=$id&tag=$tagNote: special character in pingback_url will be urlencoded;i.a., the # character will be encoded into %23learn more on our Help Center'
          nullable: true
      example:
      - system_message: communicate as if we are in a business meeting
        message_chain:
        - role: user
          message: Hello, what’s up?
        - role: ai
          message: Hello! I’m doing well, thank you. How can I assist you today? Are there any specific topics or projects you’d like to discuss in our meeting?
        max_output_tokens: 1024
        temperature: 0.3
        web_search_country_iso_code: FR
        model_name: claude-sonnet-4-0
        web_search: true
        user_prompt: provide information on how relevant the amusement park business is in France now
