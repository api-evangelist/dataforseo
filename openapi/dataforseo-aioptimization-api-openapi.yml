        required: true
        schema:
          type: string
        example: 00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/AiOptimizationChatGptLlmResponsesTaskGetResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/ai_optimization/claude/llm_responses/models:
    get:
      tags:
