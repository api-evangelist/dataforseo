    KeywordsDataGoogleAdsKeywordsForKeywordsLiveRequestInfo:
      type: object
      properties:
        keywords:
          type: array
          items:
            type: string
          description: "keywords\nrequired field\nThe maximum number of keywords you can specify: 20\nThe maximum number of
            characters for each keyword: 80\nthe keywords you specify will be converted to a lowercase format\nNote: Google
            Ads may return no data for certain groups of keywords\nvisit our Help Center to learn more\nAlso note that Google
            Ads doesn’t allow using certain symbols and characters (e.g., UTF symbols, emojis), so you can’t use them when
            setting a task;\nto learn more about which symbols and characters can be used, please refer to this article\n\
            learn more about rules and limitations of keyword and keywords fields in DataForSEO APIs in this Help Center article"
        location_name:
          type: string
          description: "full name of search engine location\noptional field\nif you do not indicate the location, you will
            receive worldwide results, i.e., for all available locations;\nif you use this field, you don’t need to specify
            location_code or location_coordinate\nyou can receive the list of available locations of the search engine with
            their location_name by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/locations\n\
            example:\nLondon,England,United Kingdom"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\noptional field\nif you do not indicate the location, you will receive
            worldwide results, i.e., for all available locations;\nif you use this field, you don’t need to specify location_name
            or location_coordinate;\nyou can receive the list of available locations of the search engines with their location_code
            by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/locations\nexample:\n2840"
          nullable: true
        location_coordinate:
          type: string
          description: "GPS coordinates of a location\noptional field\nif you do not indicate the location, you will receive
            worldwide results, i.e., for all available locations;\nif you use this field, you don’t need to specify location_name
            or location_code;\nlocation_coordinate parameter should be specified in the “latitude,longitude” format;\nthe
            data will be provided for the country the specified coordinates belong to;\nexample:\n52.6178549,-155.352142"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\noptional field\nyou can receive the list of available languages
            of the search engine with their language_name by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/languages\n\
            example:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\noptional field\nyou can receive the list of available languages of the
            search engine with their language_code by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/languages\n\
            example:\nen"
          nullable: true
        search_partners:
          type: boolean
          description: "include Google search partners\noptional field\nif you specify true, the results will be delivered
            for owned, operated, and syndicated networks across Google and partner sites that host Google search;\ndefault
            value: false – results are returned for Google search sites"
          nullable: true
        date_from:
          type: string
          description: "starting date of the time range\noptional field\ndate format: \"yyyy-mm-dd\"\nminimal value: 4 years
            from the current date\nby default, data is returned for the past 12 months;\nNote: the indicated date cannot be
            greater than that specified in date_to and/or yesterday’s date;if Status endpoint returns false in the actual_data
            field, date_from can be set to the month before last and prior;\nif Status endpoint returns true in the actual_data
            field, date_from can be set to the last month and prior"
          nullable: true
        date_to:
          type: string
          description: "ending date of the time range\noptional field\nNote: the indicated date cannot be greater than yesterday’s
            date;\nif you don’t specify this field, yesterday’s date will be used by default\ndate format: \"yyyy-mm-dd\"\n\
            example:\n\"2022-11-30\""
          nullable: true
        sort_by:
          type: string
          description: "results sorting parameters\noptional field\nUse these parameters to sort the results by relevance,
            search_volume, competition_index, low_top_of_page_bid, or high_top_of_page_bid in descending order\ndefault value:
            relevance"
          nullable: true
        include_adult_keywords:
          type: boolean
          description: "include keywords associated with adult content\noptional field\nif set to true, adult keywords will
            be included in the response\ndefault value: false\nnote that the API may return no data for such keywords due
            to Google Ads restrictions"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - location_code: 2840
        keywords:
        - phone
        - cellphone
