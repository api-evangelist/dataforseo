openapi: 3.0.1
info:
  title: DataForSEO KeywordsData API
  description: DataForSEO API is the starting point on your journey towards building powerful SEO software. With 
    DataForSEO you can get all the data you need to build an efficient application while also saving your time and 
    budget. DataForSEO API is using the REST technology for interchanging data between your application and our service.
    The data exchange is made through the widely used HTTP protocol, which allows applying our API to almost all 
    programming languages.
  version: 1.0.0
servers:
- url: https://api.dataforseo.com
- url: https://sandbox.dataforseo.com
paths:
  /v3/keywords_data/id_list:
    post:
      tags:
      - KeywordsData
      description: "This endpoint is designed to provide you with a list of IDs and metadata for all Keywords Data tasks created
        within the specified time period, including both successful and uncompleted tasks.\nfor more info please visit 'https://docs.dataforseo.com/v3/keywords_data/id_list/?bash'"
      operationId: KeywordsDataIdList
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataIdListRequestInfo'
                nullable: true
              example:
              - datetime_from: '2026-04-12 04:39:39 +00:00'
                datetime_to: '2026-04-14 04:39:39 +00:00'
                limit: 100
                offset: 0
                sort: desc
                include_metadata: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataIdListResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/keywords_data/errors:
    post:
      tags:
      - KeywordsData
      description: "By calling this endpoint you will receive information about the Keywords Data API tasks that returned
        an error within the past 7 days.\nfor more info please visit 'https://docs.dataforseo.com/v3/keywords_data/errors/?bash'"
      operationId: KeywordsDataErrors
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataErrorsRequestInfo'
                nullable: true
              example:
              - limit: 10
                offset: 0
                filtered_function: pingback_url
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataErrorsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/keywords_data/google_ads/status:
    get:
      tags:
      - KeywordsData
      description: "By calling this endpoint, you will know if Google updated keyword data for the previous month. Generally,
        Google updates keyword data in the middle of the month. So, if Google updated its data in October, you would be able
        to see the actual search volume, cost-per-click, competition, and other metrics for September. If Google didn’t update
        its data in October, the latest information would be available for August.\nfor more info please visit 'https://docs.dataforseo.com/v3/keywords_data/google_ads/status/?bash'"
      operationId: GoogleAdsStatus
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataGoogleAdsStatusResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/keywords_data/google_ads/locations:
    get:
      tags:
      - KeywordsData
      description: "We use Google Geographical Targeting. You can refer to Google Ads Target Types page to review the full
        list of possible location types. With Keywords Data API, you can select any location type supported by Google, except
        for “Okrug”.\nPostal Codes can be used to set a task, albeit API response will not return data for such tasks.\nfor
        more info please visit 'https://docs.dataforseo.com/v3/keywords_data/google_ads/locations/?bash'"
      operationId: GoogleAdsLocations
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataGoogleAdsLocationsResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  '/v3/keywords_data/google_ads/locations/{country}':
    get:
      tags:
      - KeywordsData
      description: "We use Google Geographical Targeting. You can refer to Google Ads Target Types page to review the full
        list of possible location types. With Keywords Data API, you can select any location type supported by Google, except
        for “Okrug”.\nPostal Codes can be used to set a task, albeit API response will not return data for such tasks.\nfor
        more info please visit 'https://docs.dataforseo.com/v3/keywords_data/google_ads/locations/?bash'"
      operationId: GoogleAdsLocationsCountry
      parameters:
      - name: country
        in: path
        description: "country ISO code\noptional field\nspecify the ISO code if you want to filter the list of locations by
          country\nexample:\nus"
        required: true
        schema:
          type: string
          nullable: true
        example: us
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataGoogleAdsLocationsCountryResponseInfo'
                nullable: true
      security:
      - basicAuth: []
  /v3/keywords_data/google_ads/languages:
    get:
      tags:
      - KeywordsData
      description: "By calling this API you will receive the list of languages supported by Keywords Data API.\n‌\n‌‌As a
        response of the API server, you will receive JSON-encoded data containing a tasks array with the information about
        available languages.\nfor more info please visit 'https://docs.dataforseo.com/v3/keywords_data/google_ads/languages/?bash'"
      operationId: GoogleAdsLanguages
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataGoogleAdsLanguagesResponseInfo'
                nullable: true
