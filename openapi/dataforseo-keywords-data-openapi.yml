      description: "This endpoint is designed to provide you with a list of completed tasks, which haven’t been collected
        yet. If you use the Standard method without specifying the postback_url, you can receive the list of id for all completed
        tasks using this endpoint. Then, you can collect the results using the ‘Task GET’ endpoint.\nfor more info please
        visit 'https://docs.dataforseo.com/v3/keywords_data/google_ads/search_volume/tasks_ready/?bash'"
