      description: "Note that Google Ads Keywords Data API is based on the latest version of the Google Ads API that has replaced
        legacy Google AdWords API. If you’re using DataForSEO Google AdWords API, you need to upgrade to DataForSEO Google
        Ads API.\nfor more info please visit 'https://docs.dataforseo.com/v3/keywords_data/google_ads/search_volume/task_post/?bash'"
      operationId: GoogleAdsSearchVolumeTaskPost
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataGoogleAdsSearchVolumeTaskPostRequestInfo'
                nullable: true
              example:
              - location_name: United States
                keywords:
                - buy laptop
                - cheap laptops for sale
                - purchase laptop
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                oneOf:
                - $ref: '#/components/schemas/KeywordsDataGoogleAdsSearchVolumeTaskPostResponseInfo'
                nullable: true
      security:
