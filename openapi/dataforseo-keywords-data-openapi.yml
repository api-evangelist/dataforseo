    KeywordsDataGoogleAdsAdTrafficByKeywordsTaskPostRequestInfo:
      type: object
      properties:
        keywords:
          type: array
          items:
            type: string
          description: "keywords\nrequired field\nThe maximum number of keywords you can specify: 1000\nThe maximum number
            of characters for each keyword: 80\nThe maximum number of words for each keyword phrase: 10\nthe keywords you
            specify will be converted to a lowercase format\nNote #1: Google Ads may return no data for certain groups of
            keywords;\nNote #2: Google Ads provides combined search volume values for groups of similar keywords\nto obtain
            search volume for similar keywords, we recommend submitting such keywords in separate requests;\nNote #3: Google
            Ads doesn’t allow using certain symbols and characters (e.g., UTF symbols, emojis), so you can’t use them when
            setting a task;\nto learn more about which symbols and characters can be used, please refer to this article\n\
            learn more about rules and limitations of keyword and keywords fields in DataForSEO APIs in this Help Center article"
        bid:
          type: number
          description: "the maximum custom bid\nrequired field\nthe collected data will be based on this value\nit stands
            for the price you are willing to pay for an ad; the higher value you specify here, the higher values you will
            get in the returned metrics\nlearn more in this help center article"
        match:
          type: string
          description: "keywords match-type\nrequired field\ncan take the following values: exact, broad, phrase"
        search_partners:
          type: boolean
          description: "include Google search partners\noptional field\nif you specify true, the results will be delivered
            for owned, operated, and syndicated networks across Google and partner sites that host Google search;\ndefault
            value: false – results are returned for Google search sites"
          nullable: true
        location_name:
          type: string
          description: "full name of search engine location\noptional field\nif you do not indicate the location, you will
            receive worldwide results, i.e., for all available locations;\nif you use this field, you don’t need to specify
            location_code or location_coordinate\nyou can receive the list of available locations of the search engine with
            their location_name by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/locations\n\
            example:\nLondon,England,United Kingdom"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\noptional field\nif you do not indicate the location, you will receive
            worldwide results, i.e., for all available locations;\nif you use this field, you don’t need to specify location_name
            or location_coordinate;\nyou can receive the list of available locations of the search engines with their location_code
            by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/locations\nexample:\n2840"
          nullable: true
        location_coordinate:
          type: string
          description: "GPS coordinates of a location\noptional field\nif you do not indicate the location, you will receive
            worldwide results, i.e., for all available locations;\nif you use this field, you don’t need to specify location_name
            or location_code;\nlocation_coordinate parameter should be specified in the “latitude,longitude” format;\nthe
            data will be provided for the country the specified coordinates belong to;\nexample:\n52.6178549,-155.352142"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\noptional field\nyou can receive the list of available languages
            of the search engine with their language_name by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/languages\n\
            example:\nEnglish"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\noptional field\nyou can receive the list of available languages of the
            search engine with their language_code by making a separate request to https://api.dataforseo.com/v3/keywords_data/google_ads/languages\n\
            example:\nen"
          nullable: true
        date_from:
          type: string
          description: "starting date of the forecasting time range\nrequired field if you specify date_to\nif you indicate
            date_from and date_to, you don’t need to specify date_interval\nminimum value is tomorrow’s date\nthe value you
            specify in date_from shouldn’t be further than date_to\ndate format: \"yyyy-mm-dd\"\nexample:\n\"2021-10-30\"\
            if Status endpoint returns false in the actual_data field, date_from can be set to the month before last and prior;\n\
            if Status endpoint returns true in the actual_data field, date_from can be set to the last month and prior"
          nullable: true
        date_to:
          type: string
          description: "ending date of the forecasting time range\nrequired field if you specify date_from\nif you indicate
            date_from and date_to, you don’t need to specify date_interval\nminimum value is date_from +1 day\nmaximum value
            is current day and month of the next year\ndate format: \"yyyy-mm-dd\"\nexample:\n\"2022-10-30\""
          nullable: true
        date_interval:
          type: string
          description: "forecasting date interval\noptional field\nif you specify date_interval, you don’t need to indicate
            date_from and date_to\npossible values: next_week, next_month, next_quarter\ndefault value: next_month"
          nullable: true
        sort_by:
          type: string
          description: "results sorting parameters\noptional field\nUse these parameters to sort the results by relevance,
            impressions, ctr, average_cpc, cost, or clicks in the descending order\ndefault value: relevance"
          nullable: true
        postback_url:
          type: string
          description: "URL for sending task results\noptional field\nonce the task is completed, we will send a POST request
            with its results compressed in the gzip format to the postback_url you specified\nyou can use the ‘$id’ string
            as a $id variable and ‘$tag’ as urlencoded $tag variable. We will set the necessary values before sending the
            request.\nexample:\nhttp://your-server.com/postbackscript?id=$id\nhttp://your-server.com/postbackscript?id=$id&tag=$tag\n\
            Note: special characters in postback_url will be urlencoded;\ni.a., the # character will be encoded into %23\n\
            learn more on our Help Center"
          nullable: true
        pingback_url:
          type: string
          description: "notification URL of a completed task\noptional field\nwhen a task is completed we will notify you
            by GET request sent to the URL you have specified\nyou can use the ‘$id’ string as a $id variable and ‘$tag’ as
            urlencoded $tag variable. We will set the necessary values before sending the request.\nexample:\nhttp://your-server.com/pingscript?id=$id\n\
            http://your-server.com/pingscript?id=$id&tag=$tag\nNote: special characters in pingback_url will be urlencoded;\n\
            i.a., the # character will be encoded into %23\nlearn more on our Help Center"
          nullable: true
        tag:
          type: string
          description: "user-defined task identifier\noptional field\nthe character limit is 255\nyou can use this parameter
            to identify the task and match it with the result\nyou will find the specified tag value in the data object of
            the response"
          nullable: true
      example:
      - language_code: en
        location_code: 2840
        bid: 999
        match: exact
        keywords:
        - seo marketing
