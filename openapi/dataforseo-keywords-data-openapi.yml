            example:\nLondon,England,United Kingdom"
          nullable: true
        location_code:
          type: integer
          description: "search engine location code\nrequired field if you don’t specify location_name or location_coordinate\n\
            if you use this field, you don’t need to specify location_name or location_coordinate\nyou can receive the list
            of available locations of the search engines with their location_code by making a separate request to https://api.dataforseo.com/v3/keywords_data/bing/search_volume_history/locations_and_languages\n\
            example:\n2840"
          nullable: true
        location_coordinate:
          type: string
          description: "GPS coordinates of a location\nrequired field if you don’t specify location_name or location_code\n\
            if you use this field, you don’t need to specify location_name or location_code\nlocation_coordinate parameter
            should be specified in the “latitude,longitude” format\nthe data will be provided for the country the specified
            coordinates belong to\nexample:\n52.6178549,-155.352142"
          nullable: true
        language_name:
          type: string
          description: "full name of search engine language\nrequired field if you don’t specify language_code\nif you use
            this field, you don’t need to specify language_code\nyou can receive the list of available languages of the search
            engines with their language_code by making a separate request to https://api.dataforseo.com/v3/keywords_data/bing/search_volume_history/locations_and_languages"
          nullable: true
        language_code:
          type: string
          description: "search engine language code\nrequired field if you don’t specify language_name\nif you use this field,
            you don’t need to specify language_name\nyou can receive the list of available languages of the search engines
            with their language_code by making a separate request to https://api.dataforseo.com/v3/keywords_data/bing/search_volume_history/locations_and_languages"
          nullable: true
        device:
          type: array
          items:
            type: string
          description: "device types\noptional field\nspecify this field if you want to get the data for a particular device
            types\npossible values: mobile, desktop, tablet, non_smartphones\ndefault value:  [\"mobile\", \"desktop\", \"\
            tablet\", \"non_smartphones\"]"
          nullable: true
        period:
          type: string
          description: "aggregates the returned data to a certain time period\noptional field\nspecify this field if you want
            to get the data in monthly, weekly or daily format\npossible values: monthly, weekly, daily\nmonthly – returns
            data up to past 24 months\nweekly – returns data up to past 15 weeks\ndaily – returns data up to past 45 days\n\
            default value:  monthly"
          nullable: true
        date_from:
          type: string
          description: "starting date of the time range\noptional field\nminimum value: 24 months back from today’s date\n\
            maximum value: one day from today’s date\ndate format: \"yyyy-mm-dd\"\nexample:\n\"2020-01-01\"\nNote: we do not
            recommend using a custom time range\nNote 2: if date_from and date_to parameters are not specified, the data will
            be returned for the past 24 months\nif you specify the period parameter:\nwith value weekly, you will get results
            for the past 15 weeks\nwith value daily, you will get results for the past 45 days"
          nullable: true
        date_to:
          type: string
          description: "ending date of the time range\noptional field\nminimum value: two years back from today’s date;\n\
            maximum value: one day from today’s date;\ndate format: \"yyyy-mm-dd\"\nexample:\n\"2020-03-15\"\nNote: we do
            not recommend using a custom time range\nNote 2: if date_from and date_to parameters are not specified, the data
            will be returned for the past 24 months\nif you specify the period parameter:\nwith value weekly, you will get
            results for the past 15 weeks\nwith value daily, you will get results for the past 45 days"
          nullable: true
