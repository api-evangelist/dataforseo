components:
  schemas:
    KeywordsDataBingKeywordPerformanceTaskGetResponseInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseInfo'
      - type: object
        properties:
          tasks:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/KeywordsDataBingKeywordPerformanceTaskGetTaskInfo'
              nullable: true
            description: array of tasks
            nullable: true
    BaseResponseInfo:
      properties:
        version:
          type: string
          description: the current version of the API
          nullable: true
        status_code:
          type: integer
          description: "general status code\nyou can find the full list of the response codes here"
          nullable: true
        status_message:
          type: string
          description: "general informational message\nyou can find the full list of general informational messages here"
          nullable: true
        time:
          type: string
          description: 'total execution time, seconds'
          nullable: true
        cost:
          type: number
          description: 'total tasks cost, USD'
          format: double
          nullable: true
        tasks_count:
          type: integer
          description: the number of tasks in the tasks array
          format: int64
          nullable: true
        tasks_error:
          type: integer
          description: the number of tasks in the tasks array returned with an error
          format: int64
          nullable: true
    KeywordsDataBingKeywordPerformanceTaskGetTaskInfo:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseResponseTaskInfo'
      - type: object
        properties:
          result:
            type: array
            items:
              type: object
              oneOf:
              - $ref: '#/components/schemas/KeywordsDataBingKeywordPerformanceTaskGetResultInfo'
              nullable: true
            description: array of results
            nullable: true
    KeywordsDataBingKeywordPerformanceTaskGetResultInfo:
      type: object
      properties:
        keyword:
          type: string
          description: keyword in a POST array
          nullable: true
        location_code:
          type: integer
          description: "location code in a POST array\nif there is no data, then the value is null"
          nullable: true
        language_code:
          type: string
          description: "language code in a POST array\nif there is no data, then the value is null"
          nullable: true
        year:
          type: integer
          description: "indicates the year for which the data is provided for\nexample:\n2020"
          nullable: true
        month:
          type: integer
          description: "indicates the month for which the data is provided for\nexample:\n10"
          nullable: true
        keyword_kpi:
          type: object
          oneOf:
          - $ref: '#/components/schemas/KeywordKpi'
          description: "object containing keyword metrics\nif there is no data, then the value is null"
          nullable: true
    KeywordKpi:
      type: object
      properties:
        desktop:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/KeywordKpiItemInfo'
            nullable: true
          description: "keyword data aggregated for desktop devices\nif there is no data, then the value is null"
          nullable: true
        mobile:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/KeywordKpiItemInfo'
            nullable: true
          description: "keyword data aggregated for mobile devices\nif there is no data, then the value is null"
          nullable: true
        tablet:
          type: array
          items:
            type: object
            oneOf:
            - $ref: '#/components/schemas/KeywordKpiItemInfo'
            nullable: true
          description: "keyword data aggregated for tablet devices\nif there is no data, then the value is null"
          nullable: true
    KeywordKpiItemInfo:
      type: object
      properties:
        ad_position:
          type: string
          description: "represents the position of the relevant ad in SERP\ncan take the following values:\nFirstPage1: The
            first ad to appear on the right side of the first search results page\nFirstPage2: The second ad to appear on
            the right side of the first search results page\nFirstPage3: The third ad to appear on the right side of the first
            search results page\nFirstPage4: The fourth ad to appear on the right side of the first search results page\n\
            FirstPage5: The fifth ad to appear on the right side of the first search results page\nFirstPage6: The sixth ad
            to appear on the right side of the first search results page\nFirstPage7: The seventh ad to appear on the right
            side of the first search results page\nFirstPage8: The eighth ad to appear on the right side of the first search
            results page\nFirstPage9: The ninth ad to appear on the right side of the first search results page\nFirstPage10:
            The tenth ad to appear on the right side of the first search results page\nMainLine1: The first ad to appear at
            the top of the search results page\nMainLine2: The second ad to appear at the top of the search results page\n\
            MainLine3: The third ad to appear at the top of the search results page\nMainLine4: The fourth ad to appear at
            the top of the search results page"
          nullable: true
        clicks:
          type: integer
          description: "ad clicks\nthe number of clicks that the keyword and match type generated during the last month"
          nullable: true
        impressions:
          type: integer
          description: "ad impressions\nthe number of impressions that the keyword and match type generated during the last
            month"
          nullable: true
        average_cpc:
          type: number
